function renderObjRecension(){
  if(objRecensionTillverkare!==null)return renderObjRecensionByTillverkare();

  var c=document.getElementById("utv-content");
  if(!objRecensionCat||OBJ_CAT_PRESETS.indexOf(objRecensionCat)<0)objRecensionCat=OBJ_CAT_PRESETS[0]||"";
  var catOptions=OBJ_CAT_PRESETS.map(function(catName){return "<option value='"+esc(catName)+"'"+(catName===objRecensionCat?" selected":"")+">"+esc(catName)+"</option>";}).join("");

  var entries=objFardig.filter(function(e){return e.cat===objRecensionCat;});
  var counts={};
  entries.forEach(function(e){
    var key=e.tillverkare?e.tillverkare:OBJ_UNKNOWN_TILLVERKARE;
    counts[key]=(counts[key]||0)+1;
  });
  var tillverkares=Object.keys(counts).filter(function(k){return k!==OBJ_UNKNOWN_TILLVERKARE;}).sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase(),"sv");});
  if(counts[OBJ_UNKNOWN_TILLVERKARE])tillverkares.push(OBJ_UNKNOWN_TILLVERKARE);

  var list=tillverkares.length?tillverkares.map(function(tv){
    var label=tv===OBJ_UNKNOWN_TILLVERKARE?"Okänd tillverkare":tv;
    return "<div class='khist' style='display:flex;align-items:center;gap:8px' data-rectillverkare='"+esc(tv)+"'>"
      +"<div style='flex:1;min-width:0'><div class='kmsg' style='white-space:normal;font-weight:600'>"+esc(label)+"</div>"
      +"<div class='kmeta'><span class='kbadge'>"+counts[tv]+" recensioner</span></div></div>"
      +"</div>";
  }).join(""):"<div class='empty' style='padding:30px 0'><div class='eico'>📝</div>Inga recensioner i denna kategori annu.</div>";

  c.innerHTML="<button class='sec ghost' id='objrec-back' style='margin-bottom:16px'>&#8592; Tillbaka</button>"
    +"<div class='lbl'>Recensioner</div>"
    +"<select id='objrec-cat-select' style='width:100%;background:#161616;border:1px solid #2a2a2a;border-radius:10px;color:#f2f2f2;font-size:14px;padding:10px 12px;cursor:pointer;font-family:inherit;margin-bottom:14px'>"+catOptions+"</select>"
    +"<div class='lbl'>Tillverkare</div>"+list;

  c.querySelector("#objrec-back").onclick=function(){renderObj();};
  var sel=c.querySelector("#objrec-cat-select");
  if(sel)sel.onchange=function(){objRecensionCat=sel.value;renderObjRecension();};
  c.querySelectorAll("[data-rectillverkare]").forEach(function(el){
    el.onclick=function(){objRecensionTillverkare=el.dataset.rectillverkare;renderObjRecension();};
  });
}

function renderObjRecensionByTillverkare(){
  var c=document.getElementById("utv-content");
  var isUnknown=objRecensionTillverkare===OBJ_UNKNOWN_TILLVERKARE;
  var label=isUnknown?"Okänd tillverkare":objRecensionTillverkare;

  var entries=objFardig.filter(function(e){
    return e.cat===objRecensionCat&&(isUnknown?!e.tillverkare:e.tillverkare===objRecensionTillverkare);
  });
  entries.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});

  var list=entries.length?entries.map(function(e){
    var stars=[1,2,3,4,5].map(function(n){return n<=e.rating?"★":"☆";}).join("");
    var idx=objFardig.indexOf(e);
    return "<div style='padding:10px 14px;background:#131313;border:1px solid #2a2a2a;border-radius:10px;margin-bottom:8px'>"
      +"<div style='display:flex;align-items:center;gap:8px'>"
      +"<div style='flex:1;font-size:13px;color:#f2f2f2;font-weight:500'>"+esc(e.title)+"</div>"
      +"<span style='color:#c9a24a;font-size:14px;letter-spacing:1px'>"+stars+"</span>"
      +"<button data-editobjrec='"+idx+"' style='background:none;border:none;color:#5c5c5c;cursor:pointer;font-size:14px;padding:0 4px;flex-shrink:0'>✏️</button>"
      +"</div>"
      +(e.anteckning?"<div style='font-size:11px;color:#5c5c5c;margin-top:2px'>"+esc(e.anteckning)+"</div>":"")
      +(e.comment?"<div style='font-size:12px;color:#5c5c5c;margin-top:4px;line-height:1.5'>"+esc(e.comment)+"</div>":"")
      +"<div style='font-size:10px;color:#5c5c5c;margin-top:4px'>"+fd(e.timestamp)+"</div>"
      +"</div>";
  }).join(""):"<div class='empty' style='padding:30px 0'><div class='eico'>📝</div>Inga recensioner annu.</div>";

  c.innerHTML="<button class='sec ghost' id='objrec-back-tillverkare' style='margin-bottom:16px'>&#8592; Alla tillverkare</button>"
    +"<div class='lbl'>"+esc(label)+"</div>"+list;

  c.querySelector("#objrec-back-tillverkare").onclick=function(){objRecensionTillverkare=null;renderObjRecension();};
  c.querySelectorAll("[data-editobjrec]").forEach(function(btn){
    btn.onclick=function(){
      var e=objFardig[parseInt(btn.dataset.editobjrec)];
      if(e)editObjFardigEntry(e,renderObjRecensionByTillverkare);
    };
  });
}

function editPendingObjItem(cat,idx,onSaved){
  var item=(objList[cat]||[])[idx];
  if(!item)return;
  var title=objItemTitle(item),tillverkare=objItemTillverkare(item),anteckning=objItemAnteckning(item);
  var overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px";
  overlay.innerHTML="<div style='background:#161616;border-radius:16px;border:1px solid #4fa8ff;padding:20px;width:100%;max-width:380px'>"
    +"<div class='lbl' style='margin-bottom:10px'>Ändra titel</div>"
    +"<input class='inp w100' id='edit-obj-inp' value='"+esc(title)+"' style='margin-bottom:10px'/>"
    +"<div class='lbl' style='margin-bottom:10px'>Tillverkare</div>"
    +"<input class='inp w100' id='edit-obj-tillverkare-inp' value='"+esc(tillverkare)+"' style='margin-bottom:10px'/>"
    +"<div class='lbl' style='margin-bottom:10px'>Anteckning</div>"
    +"<textarea class='ta w100' id='edit-obj-anteckning-inp' style='margin-bottom:12px;min-height:70px'>"+esc(anteckning)+"</textarea>"
    +"<div style='display:flex;gap:8px'>"
    +"<button id='edit-obj-save' style='flex:1;padding:10px;border-radius:8px;background:#1c3c5a;border:1px solid #4fa8ff;color:#4fa8ff;font-size:13px;cursor:pointer;font-family:inherit'>Spara</button>"
    +"<button id='edit-obj-cancel' style='flex:1;padding:10px;border-radius:8px;background:#131313;border:1px solid #2a2a2a;color:#5c5c5c;font-size:13px;cursor:pointer;font-family:inherit'>Avbryt</button>"
    +"</div></div>";
  document.body.appendChild(overlay);
  var tInp=overlay.querySelector("#edit-obj-inp");
  var vInp=overlay.querySelector("#edit-obj-tillverkare-inp");
  var oInp=overlay.querySelector("#edit-obj-anteckning-inp");
  tInp.focus();tInp.select();
  overlay.querySelector("#edit-obj-cancel").onclick=function(){overlay.remove();};
  overlay.querySelector("#edit-obj-save").onclick=function(){
    var val=tInp.value.trim();
    var tvVal=vInp.value.trim();
    var anVal=oInp.value.trim();
    if(val&&objList[cat]){
      objList[cat][idx]={title:val,tillverkare:tvVal,anteckning:anVal,timestamp:item.timestamp||new Date().toISOString()};
      saveAndSync("objekt");
      overlay.remove();
      if(onSaved)onSaved();
    }
  };
  tInp.onkeydown=function(e){if(e.key==="Enter")overlay.querySelector("#edit-obj-save").onclick();if(e.key==="Escape")overlay.remove();};
}

function editObjFardigEntry(entry,onSaved){
  var selectedRating=entry.rating||0;
  var overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px";
  overlay.innerHTML="<div style='background:#161616;border-radius:16px;border:1px solid #4fa8ff;padding:20px;width:100%;max-width:400px'>"
    +"<div class='lbl' style='margin-bottom:8px'>Namn</div>"
    +"<input class='inp w100' id='eof-title' value='"+esc(entry.title)+"' style='margin-bottom:12px'/>"
    +"<div class='lbl' style='margin-bottom:8px'>Tillverkare</div>"
    +"<input class='inp w100' id='eof-tillverkare' value='"+esc(entry.tillverkare||"")+"' style='margin-bottom:12px'/>"
    +"<div class='lbl' style='margin-bottom:8px'>Anteckning</div>"
    +"<textarea class='ta w100' id='eof-anteckning' style='margin-bottom:12px;min-height:70px'>"+esc(entry.anteckning||"")+"</textarea>"
    +"<div class='lbl' style='margin-bottom:8px'>Betyg</div>"
    +"<div id='eof-stars' style='display:flex;gap:8px;margin-bottom:14px'>"
    +[1,2,3,4,5].map(function(n){return "<button data-star='"+n+"' style='font-size:28px;background:none;border:none;cursor:pointer;opacity:"+(n<=selectedRating?"1":"0.3")+"'>★</button>";}).join("")
    +"</div>"
    +"<div class='lbl' style='margin-bottom:8px'>Kommentar</div>"
    +"<textarea class='ta' id='eof-comment' style='min-height:70px;margin-bottom:14px'>"+esc(entry.comment||"")+"</textarea>"
    +"<div style='display:flex;gap:8px'>"
    +"<button id='eof-save' style='flex:1;padding:10px;border-radius:8px;background:#1c3c5a;border:1px solid #4fa8ff;color:#4fa8ff;font-size:13px;cursor:pointer;font-family:inherit'>Spara</button>"
    +"<button id='eof-cancel' style='flex:1;padding:10px;border-radius:8px;background:#131313;border:1px solid #2a2a2a;color:#5c5c5c;font-size:13px;cursor:pointer;font-family:inherit'>Avbryt</button>"
    +"</div></div>";
  document.body.appendChild(overlay);
  overlay.querySelectorAll("[data-star]").forEach(function(star){
    star.onclick=function(){
      selectedRating=parseInt(star.dataset.star);
      overlay.querySelectorAll("[data-star]").forEach(function(s){s.style.opacity=parseInt(s.dataset.star)<=selectedRating?"1":"0.3";});
    };
  });
  overlay.querySelector("#eof-cancel").onclick=function(){overlay.remove();};
  overlay.querySelector("#eof-save").onclick=function(){
    var title=overlay.querySelector("#eof-title").value.trim();
    if(!title)return;
    entry.title=title;
    entry.tillverkare=overlay.querySelector("#eof-tillverkare").value.trim();
    entry.anteckning=overlay.querySelector("#eof-anteckning").value.trim();
    entry.rating=selectedRating;
    entry.comment=overlay.querySelector("#eof-comment").value.trim();
    saveAndSync("objekt");
    overlay.remove();
    if(onSaved)onSaved();
  };
}

function renderPlatsRecension(){
  if(platsRecensionKommun!==null)return renderPlatsRecensionByKommun();

  var c=document.getElementById("utv-content");
  if(!platsRecensionCat||PLATS_CAT_PRESETS.indexOf(platsRecensionCat)<0)platsRecensionCat=PLATS_CAT_PRESETS[0]||"";
  var catOptions=PLATS_CAT_PRESETS.map(function(catName){return "<option value='"+esc(catName)+"'"+(catName===platsRecensionCat?" selected":"")+">"+esc(catName)+"</option>";}).join("");

  var entries=platsFardig.filter(function(e){return e.cat===platsRecensionCat;});
  var counts={};
  entries.forEach(function(e){
    var key=e.kommun?e.kommun:PLATS_UNKNOWN_KOMMUN;
    counts[key]=(counts[key]||0)+1;
  });
  var kommuner=Object.keys(counts).filter(function(k){return k!==PLATS_UNKNOWN_KOMMUN;}).sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase(),"sv");});
  if(counts[PLATS_UNKNOWN_KOMMUN])kommuner.push(PLATS_UNKNOWN_KOMMUN);

  var list=kommuner.length?kommuner.map(function(kv){
    var label=kv===PLATS_UNKNOWN_KOMMUN?"Okänd kommun":kv;
    return "<div class='khist' style='display:flex;align-items:center;gap:8px' data-reckommun='"+esc(kv)+"'>"
      +"<div style='flex:1;min-width:0'><div class='kmsg' style='white-space:normal;font-weight:600'>"+esc(label)+"</div>"
      +"<div class='kmeta'><span class='kbadge'>"+counts[kv]+" recensioner</span></div></div>"
      +"</div>";
  }).join(""):"<div class='empty' style='padding:30px 0'><div class='eico'>📝</div>Inga recensioner i denna kategori annu.</div>";

  c.innerHTML="<button class='sec ghost' id='platsrec-back' style='margin-bottom:16px'>&#8592; Tillbaka</button>"
    +"<div class='lbl'>Recensioner</div>"
    +"<select id='platsrec-cat-select' style='width:100%;background:#161616;border:1px solid #2a2a2a;border-radius:10px;color:#f2f2f2;font-size:14px;padding:10px 12px;cursor:pointer;font-family:inherit;margin-bottom:14px'>"+catOptions+"</select>"
    +"<div class='lbl'>Kommuner</div>"+list;

  c.querySelector("#platsrec-back").onclick=function(){renderPlats();};
  var sel=c.querySelector("#platsrec-cat-select");
  if(sel)sel.onchange=function(){platsRecensionCat=sel.value;renderPlatsRecension();};
  c.querySelectorAll("[data-reckommun]").forEach(function(el){
    el.onclick=function(){platsRecensionKommun=el.dataset.reckommun;renderPlatsRecension();};
  });
}

function renderPlatsRecensionByKommun(){
  var c=document.getElementById("utv-content");
  var isUnknown=platsRecensionKommun===PLATS_UNKNOWN_KOMMUN;
  var label=isUnknown?"Okänd kommun":platsRecensionKommun;

  var entries=platsFardig.filter(function(e){
    return e.cat===platsRecensionCat&&(isUnknown?!e.kommun:e.kommun===platsRecensionKommun);
  });
  entries.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});

  var list=entries.length?entries.map(function(e){
    var stars=[1,2,3,4,5].map(function(n){return n<=e.rating?"★":"☆";}).join("");
    var idx=platsFardig.indexOf(e);
    return "<div style='padding:10px 14px;background:#131313;border:1px solid #2a2a2a;border-radius:10px;margin-bottom:8px'>"
      +"<div style='display:flex;align-items:center;gap:8px'>"
      +"<div style='flex:1;font-size:13px;color:#f2f2f2;font-weight:500'>"+esc(e.title)+"</div>"
      +"<span style='color:#c9a24a;font-size:14px;letter-spacing:1px'>"+stars+"</span>"
      +"<button data-editplatsrec='"+idx+"' style='background:none;border:none;color:#5c5c5c;cursor:pointer;font-size:14px;padding:0 4px;flex-shrink:0'>✏️</button>"
      +"</div>"
      +(e.anteckning?"<div style='font-size:11px;color:#5c5c5c;margin-top:2px'>"+esc(e.anteckning)+"</div>":"")
      +(e.comment?"<div style='font-size:12px;color:#5c5c5c;margin-top:4px;line-height:1.5'>"+esc(e.comment)+"</div>":"")
      +"<div style='font-size:10px;color:#5c5c5c;margin-top:4px'>"+fd(e.timestamp)+"</div>"
      +"</div>";
  }).join(""):"<div class='empty' style='padding:30px 0'><div class='eico'>📝</div>Inga recensioner annu.</div>";

  c.innerHTML="<button class='sec ghost' id='platsrec-back-kommun' style='margin-bottom:16px'>&#8592; Alla kommuner</button>"
    +"<div class='lbl'>"+esc(label)+"</div>"+list;

  c.querySelector("#platsrec-back-kommun").onclick=function(){platsRecensionKommun=null;renderPlatsRecension();};
  c.querySelectorAll("[data-editplatsrec]").forEach(function(btn){
    btn.onclick=function(){
      var e=platsFardig[parseInt(btn.dataset.editplatsrec)];
      if(e)editPlatsFardigEntry(e,renderPlatsRecensionByKommun);
    };
  });
}

function editPendingPlatsItem(cat,idx,onSaved){
  var item=(platsList[cat]||[])[idx];
  if(!item)return;
  var title=platsItemTitle(item),kommun=platsItemKommun(item),anteckning=platsItemAnteckning(item);
  var overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px";
  overlay.innerHTML="<div style='background:#161616;border-radius:16px;border:1px solid #4fa8ff;padding:20px;width:100%;max-width:380px'>"
    +"<div class='lbl' style='margin-bottom:10px'>Ändra titel</div>"
    +"<input class='inp w100' id='edit-plats-inp' value='"+esc(title)+"' style='margin-bottom:10px'/>"
    +"<div class='lbl' style='margin-bottom:10px'>Kommun</div>"
    +"<input class='inp w100' id='edit-plats-kommun-inp' value='"+esc(kommun)+"' style='margin-bottom:10px'/>"
    +"<div class='lbl' style='margin-bottom:10px'>Anteckning</div>"
    +"<textarea class='ta w100' id='edit-plats-anteckning-inp' style='margin-bottom:12px;min-height:70px'>"+esc(anteckning)+"</textarea>"
    +"<div style='display:flex;gap:8px'>"
    +"<button id='edit-plats-save' style='flex:1;padding:10px;border-radius:8px;background:#1c3c5a;border:1px solid #4fa8ff;color:#4fa8ff;font-size:13px;cursor:pointer;font-family:inherit'>Spara</button>"
    +"<button id='edit-plats-cancel' style='flex:1;padding:10px;border-radius:8px;background:#131313;border:1px solid #2a2a2a;color:#5c5c5c;font-size:13px;cursor:pointer;font-family:inherit'>Avbryt</button>"
    +"</div></div>";
  document.body.appendChild(overlay);
  var tInp=overlay.querySelector("#edit-plats-inp");
  var vInp=overlay.querySelector("#edit-plats-kommun-inp");
  var oInp=overlay.querySelector("#edit-plats-anteckning-inp");
  tInp.focus();tInp.select();
  overlay.querySelector("#edit-plats-cancel").onclick=function(){overlay.remove();};
  overlay.querySelector("#edit-plats-save").onclick=function(){
    var val=tInp.value.trim();
    var kvVal=vInp.value.trim();
    var anVal=oInp.value.trim();
    if(val&&platsList[cat]){
      platsList[cat][idx]={title:val,kommun:kvVal,anteckning:anVal,timestamp:item.timestamp||new Date().toISOString()};
      saveAndSync("plats");
      overlay.remove();
      if(onSaved)onSaved();
    }
  };
  tInp.onkeydown=function(e){if(e.key==="Enter")overlay.querySelector("#edit-plats-save").onclick();if(e.key==="Escape")overlay.remove();};
}

function renderMediaRecension(){
  if(mediaRecensionCreator!==null)return renderMediaRecensionByCreator();

  var c=document.getElementById("utv-content");
  if(!mediaRecensionCat||MEDIA_CAT_PRESETS.indexOf(mediaRecensionCat)<0)mediaRecensionCat=MEDIA_CAT_PRESETS[0]||"";
  var catOptions=MEDIA_CAT_PRESETS.map(function(catName){return "<option value='"+esc(catName)+"'"+(catName===mediaRecensionCat?" selected":"")+">"+esc(catName)+"</option>";}).join("");

  var entries=mediaFardig.filter(function(e){return e.cat===mediaRecensionCat;});
  var counts={};
  entries.forEach(function(e){
    var key=e.creator?e.creator:MEDIA_UNKNOWN_CREATOR;
    counts[key]=(counts[key]||0)+1;
  });
  var creators=Object.keys(counts).filter(function(k){return k!==MEDIA_UNKNOWN_CREATOR;}).sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase(),"sv");});
  if(counts[MEDIA_UNKNOWN_CREATOR])creators.push(MEDIA_UNKNOWN_CREATOR);

  var list=creators.length?creators.map(function(cr){
    var label=cr===MEDIA_UNKNOWN_CREATOR?"Okänd kreatör":cr;
    return "<div class='khist' style='display:flex;align-items:center;gap:8px' data-reccreator='"+esc(cr)+"'>"
      +"<div style='flex:1;min-width:0'><div class='kmsg' style='white-space:normal;font-weight:600'>"+esc(label)+"</div>"
      +"<div class='kmeta'><span class='kbadge'>"+counts[cr]+" recensioner</span></div></div>"
      +"</div>";
  }).join(""):"<div class='empty' style='padding:30px 0'><div class='eico'>📝</div>Inga recensioner i denna kategori annu.</div>";

  c.innerHTML="<button class='sec ghost' id='rec-back' style='margin-bottom:16px'>&#8592; Tillbaka</button>"
    +"<div class='lbl'>Recensioner</div>"
    +"<select id='rec-cat-select' style='width:100%;background:#161616;border:1px solid #2a2a2a;border-radius:10px;color:#f2f2f2;font-size:14px;padding:10px 12px;cursor:pointer;font-family:inherit;margin-bottom:14px'>"+catOptions+"</select>"
    +"<div class='lbl'>Kreatörer</div>"+list;

  c.querySelector("#rec-back").onclick=function(){renderLogMedia();};
  var sel=c.querySelector("#rec-cat-select");
  if(sel)sel.onchange=function(){mediaRecensionCat=sel.value;renderMediaRecension();};
  c.querySelectorAll("[data-reccreator]").forEach(function(el){
    el.onclick=function(){mediaRecensionCreator=el.dataset.reccreator;renderMediaRecension();};
  });
}

function renderMediaRecensionByCreator(){

  var label=isUnknown?"Okänd kreatör":mediaRecensionCreator;

  var entries=mediaFardig.filter(function(e){

      +"</div>"

      +(e.anteckning?"<div style='font-size:11px;color:#5c5c5c;margin-top:2px'>"+esc(e.anteckning)+"</div>":"")
      +(e.comment?"<div style='font-size:12px;color:#5c5c5c;margin-top:4px;line-height:1.5'>"+esc(e.comment)+"</div>":"")
      +"<div style='font-size:10px;color:#5c5c5c;margin-top:4px'>"+fd(e.timestamp)+"</div>"

function getWeekRange(d){
  var dt=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var dayNum=(dt.getDay()+6)%7; // Mandag=0 ... Sondag=6
  var monday=new Date(dt);monday.setDate(dt.getDate()-dayNum);monday.setHours(0,0,0,0);
  var sunday=new Date(monday);sunday.setDate(monday.getDate()+6);sunday.setHours(23,59,59,999);
  return {start:monday,end:sunday};
}

function openToday(){
  var now=new Date();
  openYear=String(now.getFullYear());
  openMonth=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  openDay=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
}

function isoWeek(d){
  var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var dayNum=(dt.getUTCDay()+6)%7;
  dt.setUTCDate(dt.getUTCDate()-dayNum+3);
  var firstThursday=new Date(Date.UTC(dt.getUTCFullYear(),0,4));
  var weekNum=1+Math.round(((dt-firstThursday)/86400000-3+((firstThursday.getUTCDay()+6)%7))/7);
  return weekNum;
}

function switchHistBetygSubview(sub){
  histBetygSubview=sub;
  var tabMap={media:"media",objekt:"objekt",plats:"plats"};
  var tab=tabMap[sub]||"media";
  document.querySelectorAll("[data-histbetygsub]").forEach(function(btn){btn.classList.toggle("on",btn.dataset.histbetygsub===sub);});
  var bc=document.getElementById("hist-betyg-content");
  if(bc)bc.innerHTML="<div style='padding:30px;text-align:center;color:#5c5c5c;font-size:13px'>⏳ Laddar...</div>";
  loadTab(tab).then(function(){renderHistBetygContent();});
}

function renderHistBetygContent(){
  if(histBetygSubview==="objekt")renderHistObj();

}

function showHistMediaModal(title,idx,cat,creator,genre,anteckning){
  var b=document.getElementById("body");
  var existing=b.querySelector("#hist-media-modal");
  if(existing)existing.remove();
  var overlay=document.createElement("div");
  overlay.id="hist-media-modal";
  overlay.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px";
  var selectedRating=0;
  overlay.innerHTML="<div style='background:#161616;border-radius:16px;border:1px solid #4fa8ff;padding:20px;width:100%;max-width:400px'>"
    +"<div class='lbl'>Klarmarkera</div>"
    +"<div style='font-size:15px;color:#f2f2f2;margin:8px 0 4px;font-weight:500'>"+esc(title)+"</div>"
    +(creator?"<div style='font-size:12px;color:#5c5c5c'>"+esc(creator)+"</div>":"")
    +(genre?"<div style='font-size:12px;color:#5c5c5c'>"+esc(genre)+"</div>":"")
    +(anteckning?"<div style='font-size:12px;color:#5c5c5c;margin-bottom:12px'>"+esc(anteckning)+"</div>":"<div style='margin-bottom:12px'></div>")
    +"<div class='lbl'>Betyg</div>"
    +"<div id='hm-stars' style='display:flex;gap:8px;margin-bottom:14px'>"
    +[1,2,3,4,5].map(function(n){return "<button data-star='"+n+"' style='font-size:28px;background:none;border:none;cursor:pointer;opacity:0.3'>★</button>";}).join("")
    +"</div>"
    +"<div class='lbl'>Kommentar (valfritt)</div>"
    +"<textarea class='ta' id='hm-comment' placeholder='Vad tyckte du?' style='min-height:70px;margin-bottom:12px'></textarea>"
    +"<div style='display:flex;gap:8px'>"
    +"<button class='sec' id='hm-save' style='flex:1'>Spara</button>"
    +"<button class='sec ghost' id='hm-cancel' style='flex:1'>Avbryt</button>"
    +"</div></div>";
  document.body.appendChild(overlay);
  overlay.querySelectorAll("[data-star]").forEach(function(star){
    star.onclick=function(){
      selectedRating=parseInt(star.dataset.star);
      overlay.querySelectorAll("[data-star]").forEach(function(s){s.style.opacity=parseInt(s.dataset.star)<=selectedRating?"1":"0.3";});
    };
  });

  overlay.querySelector("#hm-save").onclick=function(){
    var comment=overlay.querySelector("#hm-comment").value.trim();

    if(mediaList[cat])mediaList[cat].splice(idx,1);
    saveAndSync("media");
    overlay.remove();
    renderHistory();
  };
}

  imageHist.forEach(function(img){

    loadImageBase64(img).then(function(b64){
      if(!b64)return;
      img.base64=b64;
      var wrap=c.querySelector("#imgwrap-"+img.id);
      if(wrap)wrap.innerHTML="<img src='data:"+(img.mtype||"image/jpeg")+";base64,"+b64+"' style='width:100%;max-height:240px;object-fit:cover;display:block'/>";

  c.querySelectorAll("[data-dlimg]").forEach(function(btn){

      var doDownload=function(b64){
        var a=document.createElement("a");

        a.download=btn.dataset.fname;
        document.body.appendChild(a);a.click();document.body.removeChild(a);
      };
      if(img.base64){doDownload(img.base64);}
      else{loadImageBase64(img).then(function(b64){if(b64){img.base64=b64;doDownload(b64);}});}
    };
  });

    };
  });

function bindLogEntryActions(container,onChange){
  container.querySelectorAll(".delbtn[data-id]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();confirmDelete('Vill du ta bort aktiviteten?',function(){logs=logs.filter(function(l){return l.id!==Number(btn.dataset.id);});editingId=null;saveAndSync("aktiviteter");hdr();onChange();});};
  });
  container.querySelectorAll("[data-edit]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();editingId=Number(btn.dataset.edit);onChange();};
  });
  logs.forEach(function(log){
    if(editingId!==log.id)return;
    // Aktiv tid button
    var aktivBtn=container.querySelector("#edit-aktivtid-"+log.id);
    var editTpInp=container.querySelector("#edit-tidpunkt-"+log.id);
    bindTidpunktInp(editTpInp);
    if(aktivBtn)aktivBtn.onclick=function(){
      var now=new Date();
      var hh=String(now.getHours()).padStart(2,"0");
      var mm=String(now.getMinutes()).padStart(2,"0");
      if(editTpInp)editTpInp.value=hh+":"+mm;
    };
    // Place preset
    var placePresetEl=container.querySelector("#edit-place-preset-"+log.id);
    var placeInpEl=container.querySelector("#edit-place-"+log.id);
    if(placePresetEl&&placeInpEl)placePresetEl.onchange=function(){
      if(!placePresetEl.value)return;
      placeInpEl.value=placeInpEl.value.trim()?(placeInpEl.value.trim()+", "+placePresetEl.value):placePresetEl.value;
      placePresetEl.value="";
    };
    // Clock button
    var editClockH=0,editClockM=0;
    var existDispEl=container.querySelector("#edit-clock-disp-"+log.id);
    if(existDispEl&&existDispEl.textContent){
      var ehm=existDispEl.textContent.match(/(\d+)h/);var emm=existDispEl.textContent.match(/(\d+)m/);
      if(ehm)editClockH=parseInt(ehm[1]);if(emm)editClockM=parseInt(emm[1]);
    }
    var clockBtnEl=container.querySelector("#edit-clock-btn-"+log.id);
    if(clockBtnEl)clockBtnEl.onclick=function(){
      showClockOverlayFor(editClockH,editClockM,function(h,m){
        editClockH=h;editClockM=m;
        clockBtnEl.textContent="⏰ "+String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
        var disp=container.querySelector("#edit-clock-disp-"+log.id);
        if(disp)disp.textContent=h+"h "+m+"m";
      });
    };
    var saveBtn=container.querySelector("#save-edit-"+log.id);
    if(saveBtn){
      saveBtn.onclick=function(){
        var nameEl=container.querySelector("#edit-name-"+log.id);
        if(nameEl&&nameEl.value.trim())log.activity=nameEl.value.trim();
        var catEl=container.querySelector("#edit-cat-"+log.id);
        if(catEl)log.category=catEl.value;
        var tp=container.querySelector("#edit-tidpunkt-"+log.id);
        var tpResult=buildLogTimestamp(tp?tp.value:"");
        if(!tpResult.ok){
          showInfoPopup("Ogiltig tidpunkt",tpResult.message);
          return;
        }
        var hh=String(tpResult.date.getHours()).padStart(2,"0");
        var mm=String(tpResult.date.getMinutes()).padStart(2,"0");
        if(tp)tp.value=hh+":"+mm;
        var durVal=(editClockH>0||editClockM>0)?editClockH+"h "+editClockM+"m":"";
        var parts=[hh+":"+mm];if(durVal)parts.push(durVal);
        log.time=parts.join(" | ");
        var placeEl=container.querySelector("#edit-place-"+log.id);
        log.place=placeEl?placeEl.value.trim():"";
        var noteEl=container.querySelector("#edit-note-"+log.id);
        log.note=noteEl?noteEl.value.trim():"";
        var dateEl=container.querySelector("#edit-date-"+log.id);
        var newTimestamp=new Date(log.timestamp);
        if(dateEl&&dateEl.value){
          var dParts=dateEl.value.split("-");
          newTimestamp=new Date(parseInt(dParts[0],10),parseInt(dParts[1],10)-1,parseInt(dParts[2],10));
        }
        newTimestamp.setHours(parseInt(hh,10),parseInt(mm,10),0,0);
        log.timestamp=newTimestamp.toISOString();
        editingId=null;saveAndSync("aktiviteter");onChange();
      };
    }
    if(container.querySelector("#cancel-edit-"+log.id)){
      container.querySelector("#cancel-edit-"+log.id).onclick=function(){editingId=null;onChange();};
    }
  });
}

function renderGroupedByDate(container,items,getDate,renderItem){
  var byYear={};
  var MONTHS=["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"];
  var DAYS=["Sondag","Mandag","Tisdag","Onsdag","Torsdag","Fredag","Lordag"];

  items.forEach(function(item){
    var d=getDate(item);
    var y=d.getFullYear();
    var mo=d.getMonth();
    var day=d.getDate();
    var dayKey=y+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    var moKey=y+"-"+String(mo+1).padStart(2,"0");
    if(!byYear[y])byYear[y]={};
    if(!byYear[y][moKey])byYear[y][moKey]={month:mo,days:{}};
    if(!byYear[y][moKey].days[dayKey])byYear[y][moKey].days[dayKey]={day:day,weekday:DAYS[d.getDay()],week:isoWeek(d),items:[]};
    byYear[y][moKey].days[dayKey].items.push(item);
  });

  var html="";
  var years=Object.keys(byYear).sort(function(a,b){return b-a;});

  years.forEach(function(y){
    var yearCount=0;
    Object.keys(byYear[y]).forEach(function(mk){Object.keys(byYear[y][mk].days).forEach(function(dk){yearCount+=byYear[y][mk].days[dk].items.length;});});
    html+=folderRow(y,"y-"+y,0,"y-"+openYear,yearCount);

    if(openYear==y){
      var months=Object.keys(byYear[y]).sort(function(a,b){return b.localeCompare(a);});
      months.forEach(function(mk){
        var moData=byYear[y][mk];
        var moCount=0;Object.keys(moData.days).forEach(function(dk){moCount+=moData.days[dk].items.length;});
        var moLabel=MONTHS[moData.month];
        html+=folderRow(moLabel,"m-"+mk,1,"m-"+openMonth,moCount);

        if(openMonth==mk){
          var days=Object.keys(moData.days).sort(function(a,b){return b.localeCompare(a);});
          days.forEach(function(dk){
            var dayData=moData.days[dk];
            var dayLabel=dayData.weekday+" "+dayData.day+" <span style='color:#5c5c5c;font-weight:400'>(v."+dayData.week+")</span>";
            html+=folderRow(dayLabel,"d-"+dk,2,"d-"+openDay,dayData.items.length);

            if(openDay==dk){
              var weekActive=(weekViewDay===dk);
              html+="<div style='display:flex;gap:6px;padding:6px 0 10px 24px'>"
                +"<button data-daymode='"+dk+"' style='background:"+(weekActive?"#131313":"#1c3c5a")+";border:1px solid "+(weekActive?"#2a2a2a":"#4fa8ff")+";color:"+(weekActive?"#5c5c5c":"#4fa8ff")+";font-size:11px;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:600'>📆 Dagen</button>"
                +"<button data-weekmode='"+dk+"' style='background:"+(weekActive?"#1c3c5a":"#131313")+";border:1px solid "+(weekActive?"#4fa8ff":"#2a2a2a")+";color:"+(weekActive?"#4fa8ff":"#5c5c5c")+";font-size:11px;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:600'>📅 Hela veckan (v."+dayData.week+")</button>"
                +"</div>";
              if(weekActive){
                var wr=getWeekRange(new Date(dk+"T00:00:00"));
                var weekItems=items.filter(function(it){var d2=getDate(it);return d2>=wr.start&&d2<=wr.end;})
                  .sort(function(a,b){return getDate(a)-getDate(b);});
                var lastDayKey=null;
                weekItems.forEach(function(it){
                  var d2=getDate(it);
                  var dk2=d2.getFullYear()+"-"+String(d2.getMonth()+1).padStart(2,"0")+"-"+String(d2.getDate()).padStart(2,"0");
                  if(dk2!==lastDayKey){
                    lastDayKey=dk2;
                    html+="<div style='padding:8px 0 4px 24px;font-size:11px;font-weight:600;color:#5c5c5c'>"+DAYS[d2.getDay()]+" "+d2.getDate()+" "+MONTHS[d2.getMonth()]+"</div>";
                  }
                  html+=renderItem(it);
                });
              } else {
                dayData.items.forEach(function(item){html+=renderItem(item);});
              }
            }
          });
        }
      });
    }
  });

  container.innerHTML=html;

  container.querySelectorAll("[data-folder]").forEach(function(el){
    el.onclick=function(){
      var key=el.dataset.folder;
      var level=Number(el.dataset.level);
      if(level===0){var y=key.replace("y-","");openYear=(openYear==y?null:y);openMonth=null;openDay=null;weekViewDay=null;}
      else if(level===1){var mk=key.replace("m-","");openMonth=(openMonth==mk?null:mk);openDay=null;weekViewDay=null;}
      else if(level===2){var dk=key.replace("d-","");openDay=(openDay==dk?null:dk);weekViewDay=null;}
      editingId=null;editingFundId=null;renderHistory();
    };
  });
  container.querySelectorAll("[data-daymode]").forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      weekViewDay=null;
      renderHistory();
    };
  });
  container.querySelectorAll("[data-weekmode]").forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      weekViewDay=btn.dataset.weekmode;
      renderHistory();
    };
  });

  // Activity entry actions
  bindLogEntryActions(container,function(){renderHistory();});

  // Funderingar entry actions
  container.querySelectorAll("[data-hdel-fund]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();confirmDelete('Vill du ta bort funderingen?',function(){fundHist=fundHist.filter(function(f){return f.id!==Number(btn.dataset.hdelFund);});editingFundId=null;saveAndSync("funderingar");renderHistory();});};
  });
  container.querySelectorAll("[data-hedit-fund]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();editingFundId=Number(btn.dataset.heditFund);render();};
  });
  fundHist.forEach(function(f){
    var saveBtn=container.querySelector("#hsave-fund-"+f.id);
    var cancelBtn=container.querySelector("#hcancel-fund-"+f.id);
    if(saveBtn){
      saveBtn.onclick=function(){
        var newText=container.querySelector("#hedit-fund-"+f.id).value.trim();
        if(newText)f.text=newText;
        var catSel=container.querySelector("#hedit-fundcat-"+f.id);
        if(catSel)f.category=catSel.value||undefined;
        editingFundId=null;saveAndSync("funderingar");renderHistory();
      };
    }
    if(cancelBtn){cancelBtn.onclick=function(){editingFundId=null;render();};}
  });

  // Samtal entry: click to open conversation
  container.querySelectorAll("[data-hconv]").forEach(function(el){
    el.onclick=function(e){
      e.stopPropagation();
      var cv=sentConvs.find(function(c){return c.id===el.dataset.hconv;});
      if(cv){
        activePersonId=cv.personId;activeConvId=cv.id;sentView="chat";
        setView("samtal");render();
      }
    };
  });
}

function renderForklara(){

  if(fResult){
    ensureFResultChat(fResult);
    var answer=chatContentToText(fResult.chat[1].content)||fResult.text||"";

      +"<div class='copy-ok' id='fcopyok' style='text-align:center;margin-bottom:8px'>Kopierat!</div>"
      +(isDetailed?"":"<div style='margin-bottom:8px'><button class='sec ghost' id='fdetail' style='width:100%'>Mer detaljerat</button></div>")
      +chatContinuationHtml(fResult.chat,"f")
      +"<button class='sec ghost mt12' id='fny' style='width:100%'>Ny fråga</button>";

    b.querySelector("#fanswerbox").onclick=function(){copyText(answer);showCopyOk("fcopyok");};
    if(!isDetailed){
      b.querySelector("#fdetail").onclick=function(){doForklaraDetailed();};
    }
    bindChatContinuation(b,"f","Du ar en pedagog. Fortsätt samtalet och svara på svenska med ren text, inga JSON-taggar.",function(){return fResult.chat;},function(){saveAndSync("sok");renderForklara();});
    b.querySelector("#fny").onclick=function(){fResult=null;fDraft="";renderForklara();};
    return;
  }
  var hist=fHist.slice(0,5).map(function(h,i){return histRow(h,i,"fidx","");}).join("");
  b.innerHTML="<div class='lbl'>Vad vill du forsta?</div>"
    +"<textarea class='ta' id='fta' placeholder='T.ex. Vad ar inflation? Hur fungerar en motor?'>"+esc(fDraft)+"</textarea>"
    +"<button class='sec' id='ffetch'>Sök</button>"
    +"<div style='margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px'>"
    +"<label style='display:block;padding:10px;background:#131313;border:1px solid #2a2a2a;border-radius:10px;text-align:center;cursor:pointer;font-size:13px;color:#f2f2f2'>"
    +"📁 Ladda upp bild"
    +"<input type='file' id='fimgupload' accept='image/*' style='display:none'/></label>"
    +"<button id='fopen-camera-btn' type='button' style='padding:10px;background:#131313;border:1px solid #2a2a2a;border-radius:10px;text-align:center;cursor:pointer;font-size:13px;color:#f2f2f2;font-family:inherit;width:100%'>📷 Ta bild</button>"
    +"</div>"
    +"<div id='fcamera-container' style='display:none;margin-top:8px'>"
    +"<video id='fcamera-video' autoplay playsinline style='width:100%;border-radius:10px;max-height:220px;object-fit:cover;background:#000'></video>"
    +"<div style='display:flex;gap:8px;margin-top:8px'>"
    +"<button id='fsnap-btn' type='button' style='flex:1;padding:10px;border-radius:10px;background:#4fa8ff;border:none;color:#0a0a0a;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit'>📸 Ta foto</button>"
    +"<button id='fclose-camera-btn' type='button' style='padding:10px 14px;border-radius:10px;background:#131313;border:1px solid #2a2a2a;color:#d97a83;font-size:13px;cursor:pointer;font-family:inherit'>✕</button>"
    +"</div>"
    +"</div>"
    +"<canvas id='fsnap-canvas' style='display:none'></canvas>"
    +(hist?"<div class='mt20'><div class='lbl'>Tidigare fragor</div>"+hist+"</div>":"");
  var ta=b.querySelector("#fta");if(ta)ta.oninput=function(){fDraft=ta.value;};
  b.querySelector("#ffetch").onclick=function(){var txt=b.querySelector("#fta").value.trim();if(!txt)return;fDraft=txt;doFetchForklara(txt,false);};
  var fimg=b.querySelector("#fimgupload");
  if(fimg)fimg.onchange=function(){if(fimg.files&&fimg.files[0])doFetchForklaraBild(fimg.files[0]);};

  // Camera for Sök
  var fCamStream=null;
  var fOpenBtn=b.querySelector("#fopen-camera-btn");
  var fCloseBtn=b.querySelector("#fclose-camera-btn");
  var fSnapBtn=b.querySelector("#fsnap-btn");
  var fCamContainer=b.querySelector("#fcamera-container");
  var fCamVideo=b.querySelector("#fcamera-video");
  var fSnapCanvas=b.querySelector("#fsnap-canvas");

  function fStopCamera(){
    if(fCamStream){fCamStream.getTracks().forEach(function(t){t.stop();});fCamStream=null;}
    if(fCamContainer)fCamContainer.style.display="none";
  }

  if(fOpenBtn){
    fOpenBtn.onclick=function(){
      if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){alert("Kameran stöds inte.");return;}
      navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false})
        .then(function(s){fCamStream=s;if(fCamVideo)fCamVideo.srcObject=s;if(fCamContainer)fCamContainer.style.display="block";})
        .catch(function(){
          navigator.mediaDevices.getUserMedia({video:true,audio:false})
            .then(function(s){fCamStream=s;if(fCamVideo)fCamVideo.srcObject=s;if(fCamContainer)fCamContainer.style.display="block";})
            .catch(function(e){alert("Kunde inte starta kameran: "+e.message);});
        });
    };
  }
  if(fCloseBtn)fCloseBtn.onclick=fStopCamera;
  if(fSnapBtn){
    fSnapBtn.onclick=function(){
      if(!fCamVideo||!fSnapCanvas)return;
      fSnapCanvas.width=fCamVideo.videoWidth;fSnapCanvas.height=fCamVideo.videoHeight;
      fSnapCanvas.getContext("2d").drawImage(fCamVideo,0,0);
      fSnapCanvas.toBlob(function(blob){
        fStopCamera();
        var file=new File([blob],"kamera-foto.jpg",{type:"image/jpeg"});
        doFetchForklaraBild(file);
      },"image/jpeg",0.92);
    };
  }

  bindHist(b,"fidx",function(i){fResult=fHist[i];renderForklara();},function(i){fHist.splice(i,1);saveAndSync("sok");renderForklara();});
}

// Fyller i chat-arrayen på äldre sparade sökningar (från innan konversationsfunktionen
// fanns) så de fortfarande går att fortsätta konversera kring.
function ensureFResultChat(r){
  if(r.chat&&r.chat.length)return;
  var text=r.explanations&&r.explanations[0]?r.explanations[0].text:(r.text||"");
  r.chat=[{role:"user",content:"Förklara: "+r.question},{role:"assistant",content:text}];
}

async function doFetchForklara(question,detailed){
  fLoading=true;
  renderForklara();
  var sys="Du ar en pedagog. Ge en kort, enkel och lättförståelig förklaring av ämnet pa svenska. Max 3-4 meningar. Svara med ren text, inga JSON-taggar.";
  try{
    var res=await aiCall(sys,"Förklara: "+question,600);
    var data=await res.json();
    var text=aiText(data)||"Kunde inte hämta förklaring.";
    fResult={id:Date.now(),question:question,text:text,detailed:false,chat:[{role:"user",content:"Förklara: "+question},{role:"assistant",content:text}],timestamp:new Date().toISOString()};
    fHist=[fResult].concat(fHist).slice(0,20);saveAndSync("sok");
  }catch(e){
    fResult={id:Date.now(),question:question,text:"Kunde inte hämta förklaring. Försök igen.",detailed:false,chat:[{role:"user",content:"Förklara: "+question},{role:"assistant",content:"Kunde inte hämta förklaring. Försök igen."}],timestamp:new Date().toISOString()};
  }
  fLoading=false;
  renderForklara();
}

// "Mer detaljerat" skickar hela den befintliga konversationen (chat[0] kan innehålla
// en bild) tillsammans med en följdfråga om att utveckla svaret — så bilden finns
// alltid kvar i sammanhanget, precis som för fria följdfrågor.
async function doForklaraDetailed(){
  fDetailLoading=true;renderForklara();
  ensureFResultChat(fResult);
  fResult.chat.push({role:"user",content:"Ge en mer detaljerad och djupgående förklaring av samma sak."});
  try{
    var res=await aiChat("Du ar en pedagog. Svara pa svenska med ren text, inga JSON-taggar.",fResult.chat,1500);
    var data=await res.json();
    var text=aiText(data)||"Kunde inte hämta förklaring.";
    fResult.chat.push({role:"assistant",content:text});
  }catch(e){
    fResult.chat.push({role:"assistant",content:"Kunde inte hämta förklaring. Försök igen."});
  }
  fResult.detailed=true;
  fDetailLoading=false;
  saveAndSync("sok");
  renderForklara();
}

async function doFetchForklaraBild(file){
  fLoading=true;renderForklara();
  try{
    var dataUrl=await new Promise(function(res,rej){
      var r=new FileReader();
      r.onload=function(){res(r.result);};
      r.onerror=function(){rej(new Error("Filfel"));};
      r.readAsDataURL(file);
    });
    var userMsg={role:"user",content:[
      {type:"image_url",image_url:{url:dataUrl}},
      {type:"text",text:"Du ar en pedagog. Ge en kort, enkel och lättförståelig förklaring pa svenska av vad du ser pa bilden. Max 3-4 meningar."}
    ]};
    var res=await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      model:"anthropic/claude-sonnet-4.6",max_tokens:400,
      messages:[userMsg]
    })});
    var data=await res.json();
    var text=aiText(data)||"Kunde inte analysera bilden.";
    if(data.error){text="Fel: "+JSON.stringify(data.error);}
    // chat[0] behåller bilden så att "Mer detaljerat" och följdfrågor kan referera till den.
    fResult={id:Date.now(),question:"[Bild: "+file.name+"]",text:text,detailed:false,chat:[userMsg,{role:"assistant",content:text}],timestamp:new Date().toISOString()};
    fHist=[fResult].concat(fHist).slice(0,20);saveAndSync("sok");
  }catch(e){
    fResult={id:Date.now(),question:"[Bild]",text:"Kunde inte analysera bilden: "+e.message,detailed:false,chat:[{role:"user",content:"[Bild kunde inte laddas]"},{role:"assistant",content:"Kunde inte analysera bilden: "+e.message}],timestamp:new Date().toISOString()};
  }
  fLoading=false;renderForklara();
}

  } else {
    chatHtml="<div style='text-align:center;padding:32px 0 20px;color:#5c5c5c;font-size:14px;line-height:1.7'>"
      +"<div style='font-size:36px;margin-bottom:12px'>🧠</div>"
      +"Jag ar har for att lyssna och hjalpa dig reflektera.<br>Dela dina tankar, bekymmer eller ideer.</div>";
  }
  var savedHist="";
  if(tHist.length){
    savedHist="<div class='mt20'><div class='lbl'>Sparade samtal</div>"
      +tHist.slice(0,5).map(function(h,i){return histRow(h,i,"tidx","<span class='kbadge'>"+h.messages.length+" meddelanden</span>");}).join("")
      +"</div>";
  }
  var btns=tMessages.length
    ?"<div style='display:flex;gap:8px;margin-bottom:12px'><button class='sec ghost' id='tsave' style='flex:1'>Spara samtal</button><button class='sec ghost' id='tclear' style='flex:1'>Nytt samtal</button></div>"
    :"";
  b.innerHTML=chatHtml+btns
    +"<div class='row'><input class='inp' id='tinp' placeholder='Skriv dina tankar...' value='"+esc(tInput)+"'/><button class='abtn' id='tsend'>&#8594;</button></div>"
    +savedHist;
  var ti=b.querySelector("#tinp");
  if(ti){
    ti.oninput=function(){tInput=ti.value;};
    ti.onkeydown=function(e){if(e.key==="Enter"&&!e.shiftKey&&ti.value.trim()){e.preventDefault();doSendTerapi(ti.value.trim());}};
    if(!tLoading)setTimeout(function(){ti.focus();},50);
  }
  b.querySelector("#tsend").onclick=function(){var v=b.querySelector("#tinp").value.trim();if(v)doSendTerapi(v);};
  if(tMessages.length){
    b.querySelector("#tsave").onclick=function(){
      var summary=tMessages[0]?tMessages[0].content.slice(0,60)+"...":"Samtal";
      tHist=[{id:Date.now(),summary:summary,messages:tMessages.slice(),timestamp:new Date().toISOString()}].concat(tHist).slice(0,20);
      tMessages=[];tInput="";saveAndSync("terapi");renderTerapi();
    };
    b.querySelector("#tclear").onclick=function(){tMessages=[];tInput="";renderTerapi();};
  }
  bindHist(b,"tidx",
    function(i){tMessages=tHist[i].messages.slice();renderTerapi();},
    function(i){tHist.splice(i,1);saveAndSync("terapi");renderTerapi();}
  );
  // Scroll chat to bottom
  var ca=b.querySelector(".chat-area");if(ca)ca.scrollTop=ca.scrollHeight;
}
async function doSendTerapi(text){
  tMessages.push({role:"user",content:text});
  tInput="";tLoading=true;renderTerapi();
  var sys="Du ar en empatisk samtalsstod. Lyssna aktivt, stalla genomtankta foljdfragor och hjalp personen reflektera over sina tankar och ideer. Ge rad nar det frages men fokusera annars pa att hjalpa personen tanka igenom sina egna losningar. Svara pa svenska, var varm. Halla svaren kortfattade (max 3-4 meningar).";
  var history=tMessages.slice(-12).map(function(m){return {role:m.role,content:m.content};});
  try{
    var res=await aiChat(sys,history,600);
    var data=await res.json();
    var reply=data.choices&&data.choices[0]?data.choices[0].message.content||"":"Kunde inte svara. Forsok igen.";
    tMessages.push({role:"assistant",content:reply});
  }catch(e){tMessages.push({role:"assistant",content:"Nagot gick fel. Forsok igen."});}
  tLoading=false;renderTerapi();
}

    var res=await aiCall("Du ar en coach som ger personliga, konkreta tips pa svenska anpassade till amnet anvandaren fragar om. Hall det kort och actionbart.",prompt,1000);
    var data=await res.json();tipText=aiText(data)||"Kunde inte hamta tips.";

      tipsHistory.unshift({topic:tipTopic,text:tipText,timestamp:new Date().toISOString()});

  tipsLoading=false;renderTips();
}

// Validerar/bygger loggens faktiska tidpunkt utifrån "Tidpunkt"-inmatningen.
// Tomt fält -> nu. Ogiltigt format -> ok:false med en förklarande text.
function buildLogTimestamp(tidpunktRaw){
  var tp=(tidpunktRaw||"").trim();
  if(!tp)return {ok:true,date:new Date()};
  var m=tp.match(/^(\d{2}):(\d{2})$/);
  if(!m)return {ok:false,message:"Tidpunkten måste skrivas i formatet HH:MM, t.ex. 14:30."};
  var hh=parseInt(m[1],10),mm=parseInt(m[2],10);
  if(hh<0||hh>23||mm<0||mm>59)return {ok:false,message:"Tidpunkten måste vara ett giltigt klockslag mellan 00:00 och 23:59."};
  var d=new Date();
  d.setHours(hh,mm,0,0);
  return {ok:true,date:d};
}

function importMediaCsv(file,cat){
  var st=document.getElementById("mediastatus");
  if(st)st.innerHTML="<div style='color:#5c5c5c;font-size:13px;margin-top:8px'>Importerar...</div>";
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=e.target.result.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");

      // Split into pending and fardig sections at ->FÄRDIGA<-
      var fardigSplit=text.split("->FÄRDIGA<-");
      var pendingText=fardigSplit[0];
      var fardigText=fardigSplit.length>1?fardigSplit[1]:"";

      function parseSections(txt){
        // Find all -> "Kategori": blocks — category name is used directly as the key
        var result={};
        var regex=/-> "([^"]+)":\n([\s\S]*?)(?=\n-> "|$)/g;
        var m;
        while((m=regex.exec(txt))!==null){
          var catKey=m[1].trim();
          if(!catKey)continue;
          var raw=m[2].trim();
          var items=[];
          if(raw){
            // Each line: "Title","Creator","Genre" (optional trailing fields may be missing for old exports)
            raw.split(/\n/).forEach(function(line){
              line=line.trim().replace(/,$/,"");
              if(!line)return;
              var titleM=line.match(/^"((?:[^"\\]|\\.)*)"/);
              if(!titleM){
                // Fallback: plain unquoted line (old format)
                items.push({title:line.replace(/^,|,$/g,"").trim(),creator:"",genre:""});
                return;
              }
              var title=titleM[1].replace(/""/g,'"');
              var rest=line.slice(titleM[0].length).replace(/^,/,"");
              var creatorM=rest.match(/^"((?:[^"\\]|\\.)*)"/);
              var creator=creatorM?creatorM[1].replace(/""/g,'"'):"";
              var rest2=creatorM?rest.slice(creatorM[0].length).replace(/^,/,""):"";
              var genreM=rest2.match(/^"((?:[^"\\]|\\.)*)"/);
              var genre=genreM?genreM[1].replace(/""/g,'"'):"";
              items.push({title:title,creator:creator,genre:genre});
            });
          }
          result[catKey]=items;
        }
        return result;
      }

      // Parse pending
      var newMedia={};
      var parsed=parseSections(pendingText);
      Object.keys(parsed).forEach(function(k){newMedia[k]=parsed[k];});
      mediaList=newMedia;

      // Parse FÄRDIGA if present
      if(fardigText){
        var newFardig=[];
        var fregex=/-> "([^"]+)":\n([\s\S]*?)(?=\n-> "|$)/g;
        var fm;
        while((fm=fregex.exec(fardigText))!==null){
          var catKey=fm[1].trim();
          if(!catKey)continue;
          fm[2].trim().split(/,?\n/).forEach(function(line){
            line=line.trim();
            if(!line)return;
            // Format: "Titel","Kreatör","Genre", betyg:N, kommentar:"..."
            var titleM=line.match(/^"((?:[^"\\]|\\.)*)"/);
            if(!titleM)return;
            var title=titleM[1].replace(/""/g,'"');
            var rest=line.slice(titleM[0].length).replace(/^,/,"");
            var creatorM=rest.match(/^"((?:[^"\\]|\\.)*)"/);
            var creator=creatorM?creatorM[1].replace(/""/g,'"'):"";
            var rest2=creatorM?rest.slice(creatorM[0].length).replace(/^,/,""):"";
            var genreM=rest2.match(/^"((?:[^"\\]|\\.)*)"/);
            var genre=genreM?genreM[1].replace(/""/g,'"'):"";
            var ratingM=line.match(/betyg:(\d)/);
            var commentM=line.match(/kommentar:"((?:[^"\\]|\\.)*)"/);
            newFardig.push({
              title:title,cat:catKey,creator:creator,genre:genre,
              rating:ratingM?parseInt(ratingM[1]):0,
              comment:commentM?commentM[1]:"",
              timestamp:new Date().toISOString()
            });
          });
        }
        mediaFardig=newFardig;
      }

      saveAndSync("media");
      var totalPending=Object.values(newMedia).reduce(function(s,a){return s+a.length;},0);
      if(st)st.innerHTML="<div style='color:#7fae7f;font-size:13px;margin-top:8px'>✓ "+totalPending+" att konsumera, "+(fardigText?mediaFardig.length:0)+" färdiga inladdade.</div>";
    }catch(err){
      if(st)st.innerHTML="<div style='color:#d97a83;font-size:13px;margin-top:8px'>Fel: "+esc(err.message)+"</div>";
    }
  };
  reader.readAsText(file,"UTF-8");
}

  var data={

    sentConvs:sentConvs.filter(function(cv){return inMonth(cv.timestamp);}),
    sentMsgs:sentMsgs.filter(function(m){
      var cv=sentConvs.find(function(c){return c.id===m.convId;});
      return cv&&inMonth(cv.timestamp);

  var json=JSON.stringify(data,null,2);

  URL.revokeObjectURL(url);
}

    .sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
  var monthFund=fundHist.filter(function(f){return inMonth(f.timestamp);})
    .sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
  var monthConvs=sentConvs.filter(function(cv){return inMonth(cv.timestamp);})
    .sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<title>AI-Assistent - '+monthName+'</title>'
    +'<style>'
    +'body{font-family:Arial,sans-serif;max-width:800px;margin:0 auto;padding:32px;color:#1a1a1a;line-height:1.6;}'
    +'h1{font-size:26px;font-weight:700;border-bottom:3px solid #1a1a1a;padding-bottom:10px;margin-bottom:8px;}'
    +'.meta{font-size:13px;color:#666;margin-bottom:32px;}'
    +'h2{font-size:18px;font-weight:700;margin:32px 0 12px;padding:8px 12px;background:#f2f2f2;border-left:4px solid #1a1a1a;}'
    +'h3{font-size:14px;font-weight:700;margin:16px 0 4px;color:#333;}'
    +'.entry{padding:10px 0;border-bottom:1px solid #e0e0e0;}'
    +'.entry:last-child{border-bottom:none;}'
    +'.timestamp{font-size:11px;color:#888;margin-bottom:2px;}'
    +'.title{font-size:14px;font-weight:600;}'
    +'.note{font-size:13px;color:#555;margin-top:2px;}'
    +'.tag{display:inline-block;padding:2px 8px;border-radius:20px;background:#e8e8e8;font-size:11px;font-weight:600;margin-right:4px;}'
    +'.bubble-me{background:#d4edff;padding:6px 10px;border-radius:8px;margin:4px 0;font-size:13px;}'
    +'.bubble-them{background:#f2f2f2;padding:6px 10px;border-radius:8px;margin:4px 0;font-size:13px;}'
    +'.sender{font-size:11px;font-weight:600;color:#555;margin-bottom:2px;}'
    +'.fund-text{font-size:14px;white-space:pre-wrap;}'
    +'@media print{body{padding:16px;}h2{break-before:auto;}}'
    +'</style></head><body>';

  html+='<h1>AI-Assistent</h1><div class="meta">Export for '+monthName+' &nbsp;|&nbsp; Skapad '+new Date().toLocaleDateString("sv-SE")+'</div>';

  // AKTIVITETER
  if(monthLogs.length){
    html+='<h2>Aktiviteter ('+monthLogs.length+')</h2>';
    // Group by day
    var byDay={};
    monthLogs.forEach(function(l){
      var d=new Date(l.timestamp);
      var dk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
      if(!byDay[dk])byDay[dk]={date:d,items:[]};
      byDay[dk].items.push(l);
    });
    Object.keys(byDay).sort().forEach(function(dk){
      var dd=byDay[dk];
      html+='<h3>'+DAYS[dd.date.getDay()]+' '+dd.date.getDate()+' '+MONTHS[dd.date.getMonth()]+'</h3>';
      dd.items.forEach(function(l){
        var ct=CATS.find(function(c){return c.id===l.category;});
        html+='<div class="entry">'
          +'<div class="timestamp">'+new Date(l.timestamp).toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"})+(l.time?' &middot; '+esc(l.time):'')+'</div>'
          +'<div class="title">'+getCatEmoji(l.category)+' '+esc(l.activity)+'</div>'
          +(l.note?'<div class="note">'+esc(l.note)+'</div>':'')
          +'</div>';
      });
    });
  }

  // FUNDERINGAR
  if(monthFund.length){
    html+='<h2>Funderingar ('+monthFund.length+')</h2>';
    var byDayF={};
    monthFund.forEach(function(f){
      var d=new Date(f.timestamp);
      var dk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
      if(!byDayF[dk])byDayF[dk]={date:d,items:[]};
      byDayF[dk].items.push(f);
    });
    Object.keys(byDayF).sort().forEach(function(dk){
      var dd=byDayF[dk];
      html+='<h3>'+DAYS[dd.date.getDay()]+' '+dd.date.getDate()+' '+MONTHS[dd.date.getMonth()]+'</h3>';
      dd.items.forEach(function(f){
        html+='<div class="entry">'
          +'<div class="timestamp">'+new Date(f.timestamp).toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"})+'</div>'
          +'<div class="fund-text">'+esc(f.text)+'</div>'
          +'</div>';
      });
    });
  }

  // SAMTAL
  if(monthConvs.length){
    html+='<h2>Samtal ('+monthConvs.length+')</h2>';
    monthConvs.forEach(function(cv){
      var person=sentPeople.find(function(p){return p.id===cv.personId;});
      var msgs=sentMsgs.filter(function(m){return m.convId===cv.id;})
        .sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
      html+='<div class="entry"><h3>'+esc(cv.title)+(person?' &mdash; '+esc(person.name):'')+'<span class="tag" style="margin-left:8px">'+(cv.type||"skrivande")+'</span></h3>';
      msgs.forEach(function(m){
        var who=m.sender==="me"?"Jag":(person?person.name:"De");
        var cls=m.sender==="me"?"bubble-me":"bubble-them";
        html+='<div class="sender">'+esc(who)+'</div><div class="'+cls+'">'+esc(m.text)+'</div>';
      });
      html+='</div>';
    });
  }

  if(!monthLogs.length&&!monthFund.length&&!monthConvs.length){
    html+='<p style="color:#888;padding:32px 0">Inga inlagg for '+monthName+'.</p>';
  }

  html+='</body></html>';

  // Open in new window and print
  var win=window.open("","_blank");
  win.document.write(html);
  win.document.close();
  win.onload=function(){win.focus();win.print();};
}

      var site=NYHETER_SITES[k];

        +"text-align:center;cursor:pointer'>"

        +"<div style='font-size:14px;font-weight:600;color:#f2f2f2'>"+site.label.split(" ").slice(1).join(" ")+"</div>"
        +"<div style='font-size:11px;color:#5c5c5c;margin-top:6px'>"+esc(site.url.replace(/https?:\/\//,"").replace(/\/$/,""))+"</div>"
