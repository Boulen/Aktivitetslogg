<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aktivitetslogg</title>
<script>
(function(){
  var hash=location.hash;
  if(hash&&hash.includes("access_token")){
    var p=new URLSearchParams(hash.slice(1));
    var token=p.get("access_token");
    if(token){localStorage.setItem("akt_token",token);localStorage.setItem("token_time",Date.now());history.replaceState(null,"",location.pathname);}
  }
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0f13;color:#e8e6e0;font-family:system-ui,sans-serif;min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding-bottom:80px;}
.hdr{padding:20px 16px 12px;border-bottom:1px solid #1e1e28;display:flex;align-items:center;gap:10px;}
.hdr-info{flex:1;}
.hdr-lbl{font-size:11px;letter-spacing:2px;color:#6b6880;text-transform:uppercase;margin-bottom:2px;}
.hdr-title{font-size:22px;font-weight:600;color:#e8e6e0;}
.sync-btn{padding:7px 13px;border-radius:20px;border:1px solid #2a2a38;background:#1a1a24;color:#888;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.sync-btn.ok{border-color:#2a4a2a;background:#1a2a1a;color:#4ade80;}
.sync-btn.err{border-color:#4a1a1a;background:#2a1a1a;color:#f87171;}
.user-row{padding:8px 16px;background:#1a1a24;border-bottom:1px solid #1e1e28;display:flex;align-items:center;gap:8px;font-size:12px;}
.avatar{width:22px;height:22px;border-radius:50%;background:#2a2040;display:flex;align-items:center;justify-content:center;color:#a78bfa;font-size:11px;font-weight:600;}
.signout{margin-left:auto;color:#4a4860;cursor:pointer;font-size:11px;text-decoration:underline;}
.login-screen{padding:60px 24px;text-align:center;}
.login-icon{font-size:52px;margin-bottom:20px;}
.login-title{font-size:22px;font-weight:600;color:#e8e6e0;margin-bottom:10px;}
.login-sub{font-size:14px;color:#6b6880;line-height:1.6;margin-bottom:36px;}
.login-btn{display:inline-flex;align-items:center;gap:10px;padding:13px 24px;border-radius:12px;background:#fff;border:none;color:#1f1f1f;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.login-btn svg{width:20px;height:20px;flex-shrink:0;}
.tabs{display:flex;border-bottom:1px solid #1e1e28;overflow-x:auto;}
.tab{flex:1;min-width:52px;padding:12px 4px;background:none;border:none;border-bottom:2px solid transparent;color:#6b6880;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;}
.tab.on{color:#a78bfa;font-weight:600;border-bottom-color:#a78bfa;}
.body{padding:16px;}
.lbl{font-size:11px;color:#6b6880;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.chip{padding:7px 13px;border-radius:20px;border:1px solid #2a2a38;background:#1a1a24;color:#888;font-size:12px;cursor:pointer;font-family:inherit;}
.chip.on{background:#a78bfa;color:#fff;border-color:#a78bfa;font-weight:600;}
.qrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.qbtn{padding:9px 14px;border-radius:10px;background:#1a1a24;border:1px solid #2a2a38;color:#c4c0d4;font-size:13px;cursor:pointer;font-family:inherit;}
.row{display:flex;gap:8px;margin-bottom:10px;}
.inp{flex:1;padding:11px 13px;border-radius:10px;background:#1a1a24;border:1px solid #2a2a38;color:#e8e6e0;font-size:14px;outline:none;font-family:inherit;}
.inp::placeholder{color:#4a4860;}
.inp:focus{border-color:#a78bfa;}
.inp.w100{width:100%;flex:none;}
.abtn{padding:11px 18px;border-radius:10px;background:#a78bfa;border:none;color:#fff;font-weight:600;font-size:18px;cursor:pointer;}
.ok-toast{margin-top:12px;padding:11px 14px;border-radius:10px;background:#1a2a1a;border:1px solid #2a4a2a;color:#4ade80;font-size:13px;text-align:center;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.srow{display:flex;align-items:center;gap:10px;padding:10px 13px;background:#1a1a24;border-radius:10px;margin-bottom:6px;border:1px solid #1e1e28;}
.sbadge{font-size:11px;padding:3px 10px;border-radius:20px;background:#2a2040;color:#a78bfa;font-weight:600;}
.entry{padding:13px 15px;background:#1a1a24;border-radius:12px;border:1px solid #1e1e28;display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.etitle{font-weight:600;font-size:14px;color:#e8e6e0;}
.enote{font-size:12px;color:#6b6880;margin-top:2px;}
.etime{font-size:11px;color:#4a4860;margin-top:3px;}
.delbtn{background:none;border:none;color:#4a4860;cursor:pointer;font-size:18px;padding:0 2px;line-height:1;}
.empty{text-align:center;padding:60px 0;color:#6b6880;}
.eico{font-size:40px;margin-bottom:12px;}
.tbox{padding:18px;background:#13131d;border-radius:14px;border:1px solid #2a2040;line-height:1.7;font-size:15px;color:#c4c0d4;white-space:pre-wrap;margin-bottom:14px;}
.spnr{width:32px;height:32px;border-radius:50%;border:3px solid #2a2a38;border-top-color:#a78bfa;animation:spin .8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.ta{width:100%;min-height:110px;padding:13px;border-radius:12px;background:#1a1a24;border:1px solid #2a2a38;color:#e8e6e0;font-size:14px;line-height:1.6;resize:vertical;outline:none;font-family:inherit;margin-bottom:10px;}
.ta:focus{border-color:#a78bfa;}
.ta::placeholder{color:#4a4860;}
.ctx-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.ctx-chip{padding:7px 13px;border-radius:20px;border:1px solid #2a2a38;background:#1a1a24;color:#888;font-size:12px;cursor:pointer;font-family:inherit;}
.ctx-chip.on{background:#2a2040;color:#a78bfa;border-color:#a78bfa;}
.orig{background:#1a1a24;border-left:3px solid #3a3a50;border-radius:0;padding:11px 13px;font-size:13px;color:#888;line-height:1.5;margin-bottom:16px;font-style:italic;}
.scard{background:#13131d;border-radius:14px;border:1px solid #2a2040;padding:16px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.scard:active{border-color:#a78bfa;}
.stone{font-size:10px;letter-spacing:2px;color:#6b6880;text-transform:uppercase;margin-bottom:7px;}
.stext{font-size:14px;color:#e8e6e0;line-height:1.6;margin-bottom:9px;}
.swhy{font-size:12px;color:#6b6880;line-height:1.5;font-style:italic;}
.sec{background:#a78bfa;border:none;color:#fff;width:100%;padding:13px;border-radius:12px;font-size:14px;cursor:pointer;font-weight:600;font-family:inherit;margin-top:4px;}
.sec.ghost{background:#1a1a24;border:1px solid #a78bfa;color:#a78bfa;}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.mt20{margin-top:20px;}
.bubble-them{background:#1a1a24;border:1px solid #2a2a38;color:#e8e6e0;padding:11px 14px;border-radius:4px 12px 12px 12px;font-size:14px;line-height:1.5;max-width:88%;margin-bottom:4px;}
.bubble-lbl{font-size:10px;color:#6b6880;margin-bottom:3px;}
.reply-card{background:#1a1a24;border-radius:12px;border:1px solid #2a2a38;padding:15px 16px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.reply-card:active{border-color:#a78bfa;}
.reply-tone{font-size:10px;letter-spacing:2px;color:#6b6880;text-transform:uppercase;margin-bottom:6px;}
.reply-text{font-size:14px;color:#e8e6e0;line-height:1.6;margin-bottom:6px;}
.reply-why{font-size:12px;color:#6b6880;font-style:italic;}
.copy-ok{font-size:12px;color:#4ade80;margin-top:5px;display:none;}
.copy-ok.vis{display:block;}
.khist{padding:13px 15px;background:#1a1a24;border-radius:12px;border:1px solid #1e1e28;margin-bottom:8px;cursor:pointer;}
.kmsg{font-size:12px;color:#c4c0d4;line-height:1.4;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kmeta{font-size:10px;color:#4a4860;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.kbadge{padding:2px 8px;border-radius:20px;background:#2a2040;color:#a78bfa;font-size:10px;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <div id="login-screen" class="login-screen" style="display:none">
    <div class="login-icon">🔄</div>
    <div class="login-title">Aktivitetslogg</div>
    <div class="login-sub">Logga in med Google för att synka mellan telefon och dator.</div>
    <button class="login-btn" onclick="startLogin()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Logga in med Google
    </button>
    <div id="debug-msg" style="margin-top:20px;font-size:11px;color:#4a4860;"></div>
  </div>
  <div id="main-app" style="display:none">
    <div class="hdr">
      <div class="hdr-info">
        <div class="hdr-lbl">Aktivitetslogg</div>
        <div class="hdr-title" id="htitle">Kom igång</div>
      </div>
      <button class="sync-btn" id="sync-btn" onclick="syncNow()">☁ Synka</button>
    </div>
    <div class="user-row" id="user-row"></div>
    <div class="tabs">
      <button class="tab on" data-v="log">Logga</button>
      <button class="tab" data-v="history">Historik</button>
      <button class="tab" data-v="klarhet">Klarhet</button>
      <button class="tab" data-v="svar">Svar</button>
      <button class="tab" data-v="omforma">Omforma</button>
      <button class="tab" data-v="tips">AI-tips</button>
    </div>
    <div class="body" id="body"></div>
  </div>
</div>
<script>
const CLIENT_ID="801528490569-po9h0jrah67hj3rrpanj0sk25sfkonvm.apps.googleusercontent.com";
const SCOPE="https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/userinfo.profile";
const FILE_NAME="aktivitetslogg_data.json";
const REDIRECT_URI=location.origin+location.pathname.replace(/\/+$/,"/")

const CATS=[
  {id:"träning",label:"Träning",e:"🏃"},
  {id:"mat",label:"Mat & kost",e:"🥗"},
  {id:"sömn",label:"Sömn",e:"😴"},
  {id:"mental",label:"Mental hälsa",e:"🧘"},
  {id:"övrigt",label:"Övrigt",e:"✨"},
];
const QUICK={
  träning:["Löpning","Gympass","Cykling","Yoga","Simning","Promenad"],
  mat:["Frukost","Lunch","Middag","Mellanmål","Drack 2L vatten"],
  sömn:["Sov 8h","Sov 6h","Tupplur","Svår natt"],
  mental:["Meditation","Journaling","Socialt umgänge","Naturvistelse"],
  övrigt:["Läste bok","Lärde mig något","Kreativt projekt"],
};
const CTXS=["Vän","Partner","Familj","Kollega"];
const OTONES=["Vänlig","Professionell","Direkt","Empatisk","Lekfull"];

let accessToken=null,userInfo=null,driveFileId=null;
let logs=[],kHist=[],sHist=[],oHist=[];
let view="log",cat="träning",tipText="",tipsLoading=false;
let kCtx="Vän",kResult=null,kLoading=false,kDraft="";
let sCtx="Vän",sResult=null,sLoading=false,sDraft="",sMyCtx="";
let oCtx="Vän",oTone="Vänlig",oResult=null,oLoading=false,oDraft="";

function fd(iso){return new Date(iso).toLocaleDateString("sv-SE",{weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function loadLocal(){
  try{
    var d=JSON.parse(localStorage.getItem("akt_data")||"{}");
    logs=d.logs||[];kHist=d.kHist||[];sHist=d.sHist||[];oHist=d.oHist||[];
    driveFileId=localStorage.getItem("drive_fid")||null;
    var ui=localStorage.getItem("user_info");
    if(ui)userInfo=JSON.parse(ui);
  }catch{}
}
function saveLocal(){
  try{localStorage.setItem("akt_data",JSON.stringify({logs:logs,kHist:kHist,sHist:sHist,oHist:oHist}));}catch{}
}

function startLogin(){
  var params=new URLSearchParams({client_id:CLIENT_ID,redirect_uri:REDIRECT_URI,response_type:"token",scope:SCOPE,include_granted_scopes:"true",prompt:"select_account"});
  location.href="https://accounts.google.com/o/oauth2/v2/auth?"+params.toString();
}

async function init(){
  loadLocal();
  var savedToken=localStorage.getItem("akt_token");
  var tokenTime=parseInt(localStorage.getItem("token_time")||"0");
  var tokenAge=Date.now()-tokenTime;
  if(savedToken&&tokenAge<55*60*1000){
    accessToken=savedToken;
    var ok=await checkToken();
    if(ok){
      if(!userInfo)await fetchUserInfo();
      showApp();syncNow();return;
    }
  }
  localStorage.removeItem("akt_token");localStorage.removeItem("token_time");
  var dbg=document.getElementById("debug-msg");
  if(dbg)dbg.textContent="Redirect URI: "+REDIRECT_URI;
  showLogin();
}

async function checkToken(){
  try{var r=await fetch("https://www.googleapis.com/oauth2/v3/tokeninfo?access_token="+accessToken);var d=await r.json();return !d.error;}catch{return false;}
}

async function fetchUserInfo(){
  try{var r=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+accessToken}});userInfo=await r.json();localStorage.setItem("user_info",JSON.stringify(userInfo));}catch{}
}

function showLogin(){
  document.getElementById("login-screen").style.display="block";
  document.getElementById("main-app").style.display="none";
}

function showApp(){
  localStorage.setItem("akt_token",accessToken);
  localStorage.setItem("token_time",Date.now());
  document.getElementById("login-screen").style.display="none";
  document.getElementById("main-app").style.display="block";
  renderUserRow();
  document.querySelectorAll(".tab").forEach(function(btn){
    btn.onclick=function(){
      if(btn.dataset.v==="tips"){setView("tips");fetchTips();}
      else{setView(btn.dataset.v);render();}
    };
  });
  setTimeout(function(){setSyncBtn("err","Session utgången");setTimeout(tokenExpired,3000);},58*60*1000);
  render();
}

function tokenExpired(){
  localStorage.removeItem("akt_token");localStorage.removeItem("token_time");
  accessToken=null;
  document.getElementById("main-app").style.display="none";
  document.getElementById("login-screen").style.display="block";
  var dbg=document.getElementById("debug-msg");
  if(dbg)dbg.innerHTML='<span style="color:#f87171">Sessionen gick ut — logga in igen.</span>';
}

function renderUserRow(){
  var r=document.getElementById("user-row");
  if(!r||!userInfo)return;
  var name=userInfo.name||userInfo.email||"Inloggad";
  var initials=name.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
  r.innerHTML='<div class="avatar">'+initials+'</div><span style="color:#c4c0d4;font-size:12px">'+esc(name)+'</span><span class="signout" onclick="signOut()">Logga ut</span>';
}

function signOut(){
  ["akt_token","token_time","user_info","drive_fid"].forEach(function(k){localStorage.removeItem(k);});
  accessToken=null;userInfo=null;driveFileId=null;showLogin();
}

function setSyncBtn(cls,label){
  var b=document.getElementById("sync-btn");
  if(!b)return;
  b.className="sync-btn"+(cls?" "+cls:"");
  b.textContent=label;
}

async function syncNow(){
  if(!accessToken){setSyncBtn("err","Ej inloggad");return;}
  setSyncBtn("","⟳ Synkar...");
  try{
    var remote=await driveRead();
    if(remote){var m=mergeData(remote);logs=m.logs;kHist=m.kHist;sHist=m.sHist;oHist=m.oHist;}
    await driveWrite();saveLocal();
    setSyncBtn("ok","✓ Synkad");
    setTimeout(function(){setSyncBtn("","☁ Synka");},3000);
    hdr();render();
  }catch(e){
    setSyncBtn("err","Synk misslyckades");
    setTimeout(function(){setSyncBtn("","☁ Synka");},3000);
  }
}

function mergeData(remote){
  function mergeArr(a,b){
    var map=new Map();
    (a||[]).concat(b||[]).forEach(function(x){map.set(String(x.id||x.timestamp),x);});
    return Array.from(map.values()).sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});
  }
  return{logs:mergeArr(logs,remote.logs),kHist:mergeArr(kHist,remote.kHist),sHist:mergeArr(sHist,remote.sHist),oHist:mergeArr(oHist,remote.oHist||[])};
}

async function driveRead(){
  if(!driveFileId){
    var r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='"+FILE_NAME+"'&fields=files(id)",{headers:{Authorization:"Bearer "+accessToken}});
    var d=await r.json();
    if(d.files&&d.files.length>0){driveFileId=d.files[0].id;localStorage.setItem("drive_fid",driveFileId);}
    else return null;
  }
  var r2=await fetch("https://www.googleapis.com/drive/v3/files/"+driveFileId+"?alt=media",{headers:{Authorization:"Bearer "+accessToken}});
  if(!r2.ok){driveFileId=null;localStorage.removeItem("drive_fid");return null;}
  return await r2.json();
}

async function driveWrite(){
  var body=JSON.stringify({logs:logs,kHist:kHist,sHist:sHist,oHist:oHist});
  if(driveFileId){
    await fetch("https://www.googleapis.com/upload/drive/v3/files/"+driveFileId+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:body});
  }else{
    var form=new FormData();
    form.append("metadata",new Blob([JSON.stringify({name:FILE_NAME,parents:["appDataFolder"]})],{type:"application/json"}));
    form.append("file",new Blob([body],{type:"application/json"}));
    var r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{method:"POST",headers:{Authorization:"Bearer "+accessToken},body:form});
    var d2=await r.json();driveFileId=d2.id;localStorage.setItem("drive_fid",driveFileId);
  }
}

async function saveAndSync(){
  saveLocal();
  try{await driveWrite();setSyncBtn("ok","✓ Sparad");setTimeout(function(){setSyncBtn("","☁ Synka");},2000);}
  catch{setSyncBtn("err","Synk misslyckades");setTimeout(function(){setSyncBtn("","☁ Synka");},3000);}
}

function hdr(){document.getElementById("htitle").textContent=logs.length>0?(logs.length+" aktiviteter"):"Kom igång";}
function setView(v){view=v;document.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("on",t.dataset.v===v);});}
function render(){hdr();if(view==="log")renderLog();else if(view==="history")renderHistory();else if(view==="klarhet")renderKlarhet();else if(view==="svar")renderSvar();else if(view==="omforma")renderOmforma();else if(view==="tips")renderTips();}

function ctxChips(list,current,attr){
  return list.map(function(c){return '<button class="ctx-chip'+(c===current?" on":"")+'" data-'+attr+'="'+esc(c)+'">'+esc(c)+'</button>';}).join("");
}
function bindCtxChips(b,attr,getCurrent,setCurrent,renderFn){
  b.querySelectorAll("[data-"+attr+"]").forEach(function(btn){
    btn.onclick=function(){
      setCurrent(btn.dataset[attr]);
      b.querySelectorAll("[data-"+attr+"]").forEach(function(x){x.classList.toggle("on",x.dataset[attr]===getCurrent());});
    };
  });
}
function copyText(txt){
  if(navigator.clipboard)navigator.clipboard.writeText(txt).catch(function(){});
  else{var t=document.createElement("textarea");t.value=txt;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}
}
function showCopyOk(id){
  var ok=document.getElementById(id);
  if(ok){ok.classList.add("vis");setTimeout(function(){ok.classList.remove("vis");},2000);}
}
function histItems(arr,attr,fn){
  if(!arr.length)return "";
  var rows=arr.slice(0,4).map(function(h,i){
    return '<div class="khist" data-'+attr+'="'+i+'"><div class="kmsg">'+esc(h.original||h.idea||"")+'</div><div class="kmeta"><span class="kbadge">'+esc(h.context||h.to||"")+'</span><span>'+fd(h.timestamp)+'</span></div></div>';
  }).join("");
  return '<div class="mt20"><div class="lbl">Tidigare</div>'+rows+'</div>';
}
function spin(){return '<div style="text-align:center;padding:60px 0"><div class="spnr"></div><div style="color:#6b6880;font-size:13px;margin-top:14px">Arbetar...</div></div>';}

// ---- LOGGA ----
function renderLog(){
  var b=document.getElementById("body");
  var catChips=CATS.map(function(c){return '<button class="chip'+(c.id===cat?" on":"")+'" data-cat="'+c.id+'">'+c.e+" "+c.label+'</button>';}).join("");
  var quickBtns=QUICK[cat].map(function(a){return '<button class="qbtn" data-act="'+esc(a)+'">'+esc(a)+'</button>';}).join("");
  var stats="";
  if(logs.length){
    stats='<div class="mt20"><div class="lbl">Dina kategorier</div>';
    CATS.forEach(function(c){var n=logs.filter(function(l){return l.category===c.id;}).length;if(n>0)stats+='<div class="srow"><span>'+c.e+'</span><span style="flex:1;font-size:13px;color:#c4c0d4">'+c.label+'</span><span class="sbadge">'+n+'</span></div>';});
    stats+='</div>';
  }
  b.innerHTML='<div class="lbl">Kategori</div><div class="chips">'+catChips+'</div><div class="lbl">Snabbval</div><div class="qrow">'+quickBtns+'</div><div class="lbl">Egen aktivitet</div><div class="row"><input class="inp" id="ci" placeholder="Skriv aktivitet..."/><button class="abtn" id="addbtn">+</button></div><input class="inp w100" id="ni" placeholder="Anteckning (valfritt)..."/><div id="fz"></div>'+stats;
  b.querySelectorAll(".chip").forEach(function(btn){btn.onclick=function(){cat=btn.dataset.cat;renderLog();};});
  b.querySelectorAll(".qbtn").forEach(function(btn){btn.onclick=function(){addAct(btn.dataset.act);};});
  var ci=b.querySelector("#ci");
  ci.onkeydown=function(e){if(e.key==="Enter"&&ci.value.trim())addAct(ci.value.trim());};
  b.querySelector("#addbtn").onclick=function(){if(ci.value.trim())addAct(ci.value.trim());};
}

function addAct(activity){
  var ni=document.querySelector("#ni");
  logs.unshift({id:Date.now(),category:cat,activity:activity,note:ni?ni.value:"",timestamp:new Date().toISOString()});
  saveAndSync();hdr();renderLog();
  var fz=document.getElementById("fz");
  if(fz){fz.innerHTML='<div class="ok-toast">✓ "'+esc(activity)+'" loggad!</div>';setTimeout(function(){if(fz)fz.innerHTML="";},2200);}
}

// ---- HISTORIK ----
function renderHistory(){
  var b=document.getElementById("body");
  if(!logs.length){b.innerHTML='<div class="empty"><div class="eico">📋</div>Inga aktiviteter ännu.</div>';return;}
  b.innerHTML=logs.map(function(log){
    var c=CATS.find(function(x){return x.id===log.category;});
    return '<div class="entry"><span style="font-size:20px">'+(c?c.e:"✨")+'</span><div style="flex:1"><div class="etitle">'+esc(log.activity)+'</div>'+(log.note?'<div class="enote">'+esc(log.note)+'</div>':'')+'<div class="etime">'+fd(log.timestamp)+'</div></div><button class="delbtn" data-id="'+log.id+'">×</button></div>';
  }).join("");
  b.querySelectorAll(".delbtn").forEach(function(btn){btn.onclick=function(){logs=logs.filter(function(l){return l.id!==Number(btn.dataset.id);});saveAndSync();hdr();renderHistory();};});
}

// ---- KLARHET ----
function renderKlarhet(){
  var b=document.getElementById("body");
  if(kLoading){b.innerHTML=spin();return;}
  if(kResult){
    var cards=kResult.suggestions.map(function(s,i){return '<div class="scard"><div class="stone">Förslag '+(i+1)+' · '+esc(s.tone)+'</div><div class="stext">'+esc(s.text)+'</div>'+(s.why?'<div class="swhy">💡 '+esc(s.why)+'</div>':'')+'</div>';}).join("");
    b.innerHTML='<div class="lbl">Ditt meddelande</div><div class="orig">'+esc(kResult.original)+'</div><div class="lbl">Tydligare formuleringar</div>'+cards+'<button class="sec ghost mt12" id="kny">Analysera nytt meddelande</button>';
    b.querySelector("#kny").onclick=function(){kResult=null;kDraft="";renderKlarhet();};
    return;
  }
  b.innerHTML='<div class="lbl">Till vem?</div><div class="ctx-chips">'+ctxChips(CTXS,kCtx,"kctx")+'</div><div class="lbl">Ditt meddelande</div><textarea class="ta" id="kta" placeholder="Klistra in meddelandet du vill göra tydligare...">'+esc(kDraft)+'</textarea><button class="sec" id="kana">Analysera →</button>'+histItems(kHist,"kidx");
  bindCtxChips(b,"kctx",function(){return kCtx;},function(v){kCtx=v;},renderKlarhet);
  var ta=b.querySelector("#kta");if(ta)ta.oninput=function(){kDraft=ta.value;};
  b.querySelector("#kana").onclick=function(){var txt=b.querySelector("#kta").value.trim();if(!txt)return;kDraft=txt;analyseKlarhet(txt);};
  b.querySelectorAll("[data-kidx]").forEach(function(el){el.onclick=function(){kResult=kHist[Number(el.dataset.kidx)];renderKlarhet();};});
}

async function analyseKlarhet(text){
  kLoading=true;renderKlarhet();
  var sys='Du är en kommunikationscoach som hjälper folk formulera sig tydligare till '+kCtx.toLowerCase()+'. Svara BARA med giltig JSON utan backticks: {"suggestions":[{"tone":"Rakt på sak","text":"...","why":"..."},{"tone":"Mjukare","text":"...","why":"..."},{"tone":"Kortfattat","text":"...","why":"..."}]}';
  try{
    var res=await aiCall(sys,'Originalmeddelande:\n"'+text+'"',1000);
    var data=await res.json();
    var raw=data.choices&&data.choices[0]?data.choices[0].message.content||"{}":"{}";
    var parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
    kResult={id:Date.now(),original:text,context:kCtx,suggestions:parsed.suggestions||[],timestamp:new Date().toISOString()};
    kHist=[kResult].concat(kHist).slice(0,20);saveAndSync();
  }catch(e){kResult={id:Date.now(),original:text,context:kCtx,timestamp:new Date().toISOString(),suggestions:[{tone:"Fel",text:"Kunde inte analysera. Försök igen.",why:""}]};}
  kLoading=false;renderKlarhet();
}

// ---- SVAR ----
function renderSvar(){
  var b=document.getElementById("body");
  if(sLoading){b.innerHTML=spin();return;}
  if(sResult){
    var cards=sResult.replies.map(function(r,i){return '<div class="reply-card" data-ri="'+i+'"><div class="reply-tone">'+esc(r.tone)+'</div><div class="reply-text">'+esc(r.text)+'</div><div class="reply-why">'+esc(r.why)+'</div><div class="copy-ok" id="scok'+i+'">✓ Kopierat!</div></div>';}).join("");
    b.innerHTML='<div class="lbl">Deras meddelande</div><div class="bubble-lbl">'+esc(sResult.context)+'</div><div class="bubble-them">'+esc(sResult.original)+'</div><div class="lbl mt12">Svarsförslag — tryck för att kopiera</div>'+cards+'<button class="sec ghost mt12" id="sny">Nytt meddelande</button>';
    b.querySelectorAll(".reply-card").forEach(function(card){card.onclick=function(){copyText(sResult.replies[Number(card.dataset.ri)].text);showCopyOk("scok"+card.dataset.ri);};});
    b.querySelector("#sny").onclick=function(){sResult=null;sDraft="";sMyCtx="";renderSvar();};
    return;
  }
  b.innerHTML='<div class="lbl">Från vem?</div><div class="ctx-chips">'+ctxChips(CTXS,sCtx,"sctx")+'</div><div class="lbl">Deras meddelande</div><textarea class="ta" id="smsg" placeholder="Klistra in meddelandet du fått..." style="min-height:100px">'+esc(sDraft)+'</textarea><div class="lbl mt8">Vad vill du förmedla? (valfritt)</div><textarea class="ta" id="sictx" placeholder="T.ex. vill tacka nej men ändå vara varm..." style="min-height:70px">'+esc(sMyCtx)+'</textarea><button class="sec" id="sfetch">Ge mig svarsförslag →</button>'+histItems(sHist,"sidx");
  bindCtxChips(b,"sctx",function(){return sCtx;},function(v){sCtx=v;},renderSvar);
  var ta=b.querySelector("#smsg"),tc=b.querySelector("#sictx");
  if(ta)ta.oninput=function(){sDraft=ta.value;};
  if(tc)tc.oninput=function(){sMyCtx=tc.value;};
  b.querySelector("#sfetch").onclick=function(){var msg=b.querySelector("#smsg").value.trim();if(!msg)return;sDraft=msg;sMyCtx=b.querySelector("#sictx").value.trim();fetchSvar(sDraft,sMyCtx);};
  b.querySelectorAll("[data-sidx]").forEach(function(el){el.onclick=function(){sResult=sHist[Number(el.dataset.sidx)];renderSvar();};});
}

async function fetchSvar(msg,myIntent){
  sLoading=true;renderSvar();
  var intentPart=myIntent?'\nVad jag vill förmedla: "'+myIntent+'"':"";
  var sys='Du är en kommunikationscoach som hjälper folk svara på meddelanden från '+sCtx.toLowerCase()+'. Svara BARA med giltig JSON utan backticks: {"replies":[{"tone":"Varm och personlig","text":"...","why":"..."},{"tone":"Tydlig och direkt","text":"...","why":"..."},{"tone":"Kortfattad","text":"...","why":"..."},{"tone":"Lekfull","text":"...","why":"..."}]}';
  try{
    var res=await aiCall(sys,'Deras meddelande:\n"'+msg+'"'+intentPart,1200);
    var data=await res.json();
    var raw=data.choices&&data.choices[0]?data.choices[0].message.content||"{}":"{}";
    var parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
    sResult={id:Date.now(),original:msg,context:sCtx,intent:myIntent,replies:parsed.replies||[],timestamp:new Date().toISOString()};
    sHist=[sResult].concat(sHist).slice(0,20);saveAndSync();
  }catch(e){sResult={id:Date.now(),original:msg,context:sCtx,intent:myIntent,timestamp:new Date().toISOString(),replies:[{tone:"Fel",text:"Kunde inte generera svar. Försök igen.",why:""}]};}
  sLoading=false;renderSvar();
}

// ---- OMFORMA ----
function renderOmforma(){
  var b=document.getElementById("body");
  if(oLoading){b.innerHTML=spin();return;}
  if(oResult){
    var cards=oResult.suggestions.map(function(s,i){return '<div class="scard" data-oi="'+i+'"><div class="stone">Förslag '+(i+1)+' · '+esc(s.tone)+'</div><div class="stext">'+esc(s.text)+'</div><div class="swhy">💡 '+esc(s.why)+'</div><div class="copy-ok" id="ocok'+i+'">✓ Kopierat!</div></div>';}).join("");
    b.innerHTML='<div class="lbl">Din idé</div><div class="orig">'+esc(oResult.idea)+'</div><div class="lbl">Förslag — tryck för att kopiera</div>'+cards+'<button class="sec ghost mt12" id="ony">Formulera något nytt</button>';
    b.querySelectorAll("[data-oi]").forEach(function(card){card.onclick=function(){copyText(oResult.suggestions[Number(card.dataset.oi)].text);showCopyOk("ocok"+card.dataset.oi);};});
    b.querySelector("#ony").onclick=function(){oResult=null;oDraft="";renderOmforma();};
    return;
  }
  var hist="";
  if(oHist.length){
    hist='<div class="mt20"><div class="lbl">Tidigare</div>'+oHist.slice(0,4).map(function(h,i){return '<div class="khist" data-oidx="'+i+'"><div class="kmsg">'+esc(h.idea)+'</div><div class="kmeta"><span class="kbadge">'+esc(h.to)+'</span><span class="kbadge">'+esc(h.tone)+'</span><span>'+fd(h.timestamp)+'</span></div></div>';}).join("")+'</div>';
  }
  b.innerHTML='<div class="lbl">Till vem?</div><div class="ctx-chips">'+ctxChips(CTXS,oCtx,"octx")+'</div><div class="lbl">Ton</div><div class="ctx-chips">'+ctxChips(OTONES,oTone,"otone")+'</div><div class="lbl">Beskriv vad du vill säga</div><textarea class="ta" id="ota" placeholder="T.ex. vill be om ursäkt för att jag missade mötet och föreslå en ny tid...">'+esc(oDraft)+'</textarea><button class="sec" id="ofetch">Ge mig formuleringar →</button>'+hist;
  bindCtxChips(b,"octx",function(){return oCtx;},function(v){oCtx=v;},renderOmforma);
  bindCtxChips(b,"otone",function(){return oTone;},function(v){oTone=v;},renderOmforma);
  var ta=b.querySelector("#ota");if(ta)ta.oninput=function(){oDraft=ta.value;};
  b.querySelector("#ofetch").onclick=function(){var txt=b.querySelector("#ota").value.trim();if(!txt)return;oDraft=txt;fetchOmforma(txt);};
  b.querySelectorAll("[data-oidx]").forEach(function(el){el.onclick=function(){oResult=oHist[Number(el.dataset.oidx)];renderOmforma();};});
}

async function fetchOmforma(idea){
  oLoading=true;renderOmforma();
  var sys='Du är en kommunikationscoach som hjälper folk formulera meddelanden till '+oCtx.toLowerCase()+' med en '+oTone.toLowerCase()+' ton. Svara BARA med giltig JSON utan backticks: {"suggestions":[{"tone":"Alternativ 1","text":"...","why":"..."},{"tone":"Alternativ 2","text":"...","why":"..."},{"tone":"Kortfattad","text":"...","why":"..."}]} Varje text = ett komplett välformulerat meddelande på svenska. why = vad som är bra med formuleringen (max 1 mening).';
  try{
    var res=await aiCall(sys,'Idé/vad jag vill säga:\n"'+idea+'"',1200);
    var data=await res.json();
    var raw=data.choices&&data.choices[0]?data.choices[0].message.content||"{}":"{}";
    var parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
    oResult={id:Date.now(),idea:idea,to:oCtx,tone:oTone,suggestions:parsed.suggestions||[],timestamp:new Date().toISOString()};
    oHist=[oResult].concat(oHist).slice(0,20);saveAndSync();
  }catch(e){oResult={id:Date.now(),idea:idea,to:oCtx,tone:oTone,timestamp:new Date().toISOString(),suggestions:[{tone:"Fel",text:"Kunde inte generera. Försök igen.",why:""}]};}
  oLoading=false;renderOmforma();
}

// ---- AI-TIPS ----
function renderTips(){
  var b=document.getElementById("body");
  if(tipsLoading){b.innerHTML=spin();return;}
  if(tipText){b.innerHTML='<div class="lbl">Personliga tips</div><div class="tbox">'+esc(tipText)+'</div><button class="sec ghost" id="refbtn">Hämta nya tips</button>';b.querySelector("#refbtn").onclick=fetchTips;return;}
  b.innerHTML='<div class="empty"><div class="eico">🤖</div><div style="margin-bottom:20px;font-size:14px">AI-coachen analyserar dina aktiviteter och ger personliga råd.</div><button class="sec" id="getbtn" style="max-width:220px;margin:0 auto">Hämta mina tips</button></div>';
  b.querySelector("#getbtn").onclick=fetchTips;
}

async function fetchTips(){
  tipsLoading=true;tipText="";setView("tips");renderTips();
  var sum=logs.slice(0,20).map(function(l){return "["+l.category+"] "+l.activity+(l.note?": "+l.note:"");}).join("\n")||"Inga aktiviteter loggade ännu.";
  try{
    var res=await aiCall("Du är en vänlig hälsocoach som ger personliga, konkreta tips på svenska. Håll det kort, positivt och actionbart.","Ge mig 3 personliga tips baserade på:\n\n"+sum,1000);
    var data=await res.json();
    tipText=data.choices&&data.choices[0]?data.choices[0].message.content||"Kunde inte hämta tips.":"Kunde inte hämta tips.";
  }catch(e){tipText="Något gick fel. Försök igen.";}
  tipsLoading=false;renderTips();
}

async function aiCall(system, userMsg, maxTokens) {
  return fetch("https://ai-proxy.jenseskilsson95.workers.dev/", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      model: "anthropic/claude-sonnet-4-5",
      max_tokens: maxTokens,
      messages: [
        {role: "system", content: system},
        {role: "user", content: userMsg}
      ]
    })
  });
}
