<style>
:root{
  --bg:#0a0a0a;--bg-alt:#131313;--bg-panel:#161616;--border:#2a2a2a;
  --sub:#5c5c5c;--text:#cfcfcf;--text-bright:#f2f2f2;
  --main:#4fa8ff;--main-dim:#1c3c5a;--error:#d97a83;--success:#7fae7f;--gold:#c9a24a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);min-height:100vh;font-family:'Lexend',sans-serif;color:var(--text);padding-bottom:80px;}
::selection{background:var(--main-dim);color:var(--text-bright);}

.wrap{max-width:980px;margin:0 auto;padding-bottom:80px;background:var(--bg);}
.hdr{padding:20px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.hdr-info{flex:1;}
.hdr-lbl{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--sub);text-transform:uppercase;margin-bottom:2px;}
.hdr-title{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:600;color:var(--text-bright);}
.hdr-title .caret{color:var(--main);animation:blink 1.1s steps(1) infinite;}
.hdr-title .brain-ico{display:inline-flex;vertical-align:-6px;margin-right:8px;}
@keyframes blink{50%{opacity:0;}}
.sync-btn{font-family:'JetBrains Mono',monospace;padding:7px 13px;border-radius:5px;border:1px solid var(--border);background:var(--bg-panel);color:var(--sub);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s ease;}
.sync-btn:hover{border-color:var(--main);color:var(--main);}
.sync-btn.ok{border-color:var(--main);background:var(--main-dim);color:var(--main);}
.sync-btn.err{border-color:var(--error);background:var(--bg-alt);color:var(--error);}
.user-row{padding:8px 16px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;}
.avatar{width:22px;height:22px;border-radius:50%;background:var(--main-dim);display:flex;align-items:center;justify-content:center;color:var(--main);font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.signout{margin-left:auto;color:var(--sub);cursor:pointer;font-size:11px;text-decoration:underline;font-family:'JetBrains Mono',monospace;}
.login-screen{padding:60px 24px;text-align:center;}
.login-icon{font-size:52px;margin-bottom:20px;}
.login-title{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--text-bright);margin-bottom:10px;}
.login-sub{font-size:14px;color:var(--sub);line-height:1.6;margin-bottom:36px;}
.login-btn{display:inline-flex;align-items:center;gap:10px;padding:13px 24px;border-radius:6px;background:#fff;border:none;color:#1f1f1f;font-size:15px;font-weight:600;cursor:pointer;font-family:'Lexend',sans-serif;}
.login-btn svg{width:20px;height:20px;flex-shrink:0;}

.header-actions{display:flex;align-items:center;gap:12px;min-width:0;}
.tabs{display:flex;overflow-x:auto;gap:10px;scrollbar-width:none;-ms-overflow-style:none;min-width:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{position:relative;overflow:visible;flex:0 1 auto;min-width:0;padding:10px 2px 12px;background:transparent;border:none;color:var(--sub);font-size:12.5px;font-weight:500;cursor:pointer;font-family:'Lexend',sans-serif;white-space:nowrap;transition:color .15s ease;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--main);}
.tab.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--main);border-radius:2px;}
.tab-short{display:none;}
.tab-full{display:inline;}
.body{padding:16px;}
.lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.chip{font-family:'JetBrains Mono',monospace;padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--bg-panel);color:var(--sub);font-size:12px;cursor:pointer;transition:all .15s ease;}
.chip:hover{border-color:var(--main);color:var(--main);}
.ac-wrap{position:relative;}
.ac-dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg-panel);border:1px solid var(--main);border-radius:6px;margin-top:4px;max-height:180px;overflow-y:auto;z-index:50;box-shadow:0 8px 20px rgba(0,0,0,0.5);}
.ac-item{padding:0;font-size:13px;color:var(--text-bright);border-bottom:1px solid var(--border);display:flex;align-items:center;}
.ac-item:last-child{border-bottom:none;}
.ac-item-text{flex:1;padding:9px 13px;cursor:pointer;}
.ac-item-remove{background:none;border:none;color:var(--sub);cursor:pointer;font-size:15px;padding:0 12px;flex-shrink:0;align-self:stretch;}
.ac-item-remove:hover{color:var(--error);}

.qrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.qbtn{font-family:'JetBrains Mono',monospace;padding:9px 14px;border-radius:5px;background:var(--bg-panel);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s ease;}
.qbtn:hover{border-color:var(--main);color:var(--main);}
.row{display:flex;gap:8px;margin-bottom:10px;}
.inp{flex:1;padding:11px 13px;border-radius:5px;background:var(--bg-panel);border:1px solid var(--border);color:var(--text-bright);font-size:14px;outline:none;font-family:'JetBrains Mono',monospace;}
.inp::placeholder{color:var(--sub);}
.inp:focus{border-color:var(--main);}

.abtn{padding:11px 18px;border-radius:5px;background:var(--main);border:none;color:#050708;font-weight:600;font-size:16px;cursor:pointer;font-family:'Lexend',sans-serif;transition:filter .15s ease;}
.abtn:hover{filter:brightness(1.1);}
.ok-toast{margin-top:12px;padding:11px 14px;border-radius:6px;background:var(--main-dim);border:1px solid var(--main);color:var(--main);font-size:13px;text-align:center;animation:fi .2s ease;font-family:'JetBrains Mono',monospace;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.srow{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg-panel);border-radius:6px;margin-bottom:6px;border:1px solid var(--border);}
.sbadge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 10px;border-radius:20px;background:var(--main-dim);color:var(--main);font-weight:600;}
.entry{padding:13px 15px;background:var(--bg-panel);border-radius:6px;border:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}

.etime{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sub);margin-top:3px;}
.delbtn{background:none;border:none;color:var(--sub);cursor:pointer;font-size:18px;padding:0 2px;line-height:1;}

.empty{text-align:center;padding:60px 0;color:var(--sub);font-family:'JetBrains Mono',monospace;font-size:13px;}
.eico{font-size:40px;margin-bottom:12px;}
.tbox{padding:18px;background:var(--bg-alt);border-radius:6px;border:1px solid var(--border);line-height:1.75;font-size:15px;font-family:'JetBrains Mono',monospace;color:var(--text-bright);white-space:pre-wrap;margin-bottom:14px;}
.spnr{width:32px;height:32px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--main);animation:spin .8s linear infinite;margin:0 auto;}

.ta{width:100%;min-height:110px;padding:13px;border-radius:5px;background:var(--bg-panel);border:1px solid var(--border);color:var(--text-bright);font-size:15px;font-family:'JetBrains Mono',monospace;line-height:1.7;resize:vertical;outline:none;margin-bottom:10px;caret-color:var(--main);}
.ta:focus{border-color:var(--main);}
.ta::placeholder{color:var(--sub);}
.ctx-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.ctx-chip{font-family:'JetBrains Mono',monospace;padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--bg-panel);color:var(--sub);font-size:12px;cursor:pointer;transition:all .15s ease;}
.ctx-chip.on{background:var(--main-dim);color:var(--main);border-color:var(--main);}
.orig{background:var(--bg-alt);border-left:3px solid var(--border);border-radius:0;padding:11px 13px;font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:16px;font-style:italic;font-family:'JetBrains Mono',monospace;}

.sec{font-family:'Lexend',sans-serif;background:var(--main);border:none;color:#050708;width:100%;padding:12px;font-size:14px;cursor:pointer;font-weight:600;font-family:'Lexend',sans-serif;margin-top:4px;border-radius:5px;transition:filter .15s ease;}
.sec:hover{filter:brightness(1.1);}
.sec.ghost{background:var(--bg-panel);border:1px solid var(--border);color:var(--text);}

.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt20{margin-top:20px;}
.bubble-them{background:var(--bg-alt);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:8px 8px 8px 2px;font-size:14px;line-height:1.55;max-width:85%;margin-bottom:4px;white-space:pre-wrap;}
.bubble-me{background:var(--main-dim);border:1px solid var(--main);color:var(--text-bright);padding:11px 14px;border-radius:8px 8px 2px 8px;font-size:14px;line-height:1.55;max-width:85%;margin-bottom:4px;align-self:flex-end;white-space:pre-wrap;}
.bubble-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sub);margin-bottom:3px;}
.reply-card{background:var(--bg-panel);border-radius:6px;border:1px solid var(--border);padding:15px 16px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s ease;}
.reply-card:hover,.reply-card:active{border-color:var(--main);}
.reply-tone{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1px;color:var(--sub);text-transform:uppercase;margin-bottom:6px;}
.reply-text{font-size:14px;color:var(--text-bright);line-height:1.6;margin-bottom:6px;}
.reply-why{font-size:12px;color:var(--sub);font-style:italic;}
.copy-ok{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--main);margin-top:5px;display:none;}
.copy-ok.vis{display:block;}
.khist{padding:13px 15px;background:var(--bg-panel);border-radius:6px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:border-color .15s ease;}
.khist:hover{border-color:var(--main);}
.kmsg{font-size:13px;color:var(--text);line-height:1.4;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kmeta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sub);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.kbadge{font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:20px;background:var(--main-dim);color:var(--main);font-size:10px;font-weight:600;}
.mode-btn{font-family:'JetBrains Mono',monospace;padding:12px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg-panel);color:var(--sub);font-size:12.5px;cursor:pointer;text-align:center;transition:all .15s ease;}
.mode-btn:hover{border-color:var(--main);color:var(--text);}
.mode-btn.on{border-color:var(--main);background:var(--main-dim);color:var(--main);font-weight:600;}
.mode-desc{font-size:10px;color:var(--sub);margin-top:3px;}
.chat-area{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;min-height:60px;}

.action-btn{font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:7px 14px;border-radius:4px;border:1px solid var(--border);background:var(--bg-panel);color:var(--text);cursor:pointer;transition:all .15s ease;}
.action-btn:hover{border-color:var(--main);color:var(--main);}
.action-btn:disabled{opacity:0.45;cursor:default;}
.dict-bar{position:fixed;left:0;right:0;bottom:0;background:var(--bg-panel);border-top:1px solid var(--border);padding:12px 20px;z-index:50;padding-bottom:calc(12px + env(safe-area-inset-bottom));}
.dict-result{max-width:940px;margin:0 auto 10px;background:var(--bg-alt);border:1px solid var(--border);border-radius:6px;padding:14px 16px;display:none;position:relative;}

.dict-close:hover{color:var(--text-bright);}
.synonym-chip{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg-panel);border:1px solid var(--border);padding:4px 10px;border-radius:12px;color:var(--main);margin:3px 6px 3px 0;}

.note-label{display:block;font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--main);margin-bottom:4px;}
@media (max-width:480px){.dict-input-row input{font-size:16px;}}

.cta-log{font-family:'Lexend',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;background:var(--main);border:none;color:#050708;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;border-radius:6px;transition:filter .15s ease;}

.cta-log-text,.cta-log-plus{display:inline-block;}

.gear-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--sub);width:32px;height:32px;font-size:15px;cursor:pointer;transition:all .15s ease;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.gear-btn:hover{color:var(--main);border-color:var(--main);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
.overlay-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:22px;}

.settings-row{padding:11px 0;border-top:1px solid var(--border);font-size:13px;}

.overlay-close:hover{border-color:var(--main);color:var(--main);}

// Lägger till/flyttar fram ett värde i en inmatningshistorik-array (senast använd först, dedupe, max 40).
function pushInmatningHistory(arr,value){
  var v=(value||"").trim();
  if(!v)return arr;
  var lower=v.toLowerCase();
  var next=arr.filter(function(x){return x.toLowerCase()!==lower;});
  next.unshift(v);
  return next.slice(0,40);
}

// Kopplar in ett textfält med en dropdown av tidigare inmatade värden som matchar det som skrivs.
function bindAutocomplete(inputEl,dropdownEl,getSuggestions,removeValue){
  if(!inputEl||!dropdownEl)return;
  function update(){
    var val=inputEl.value.trim().toLowerCase();
    if(!val){dropdownEl.style.display="none";dropdownEl.innerHTML="";return;}
    var matches=getSuggestions().filter(function(s){return s.toLowerCase().indexOf(val)>-1&&s.toLowerCase()!==val;}).slice(0,6);
    if(!matches.length){dropdownEl.style.display="none";dropdownEl.innerHTML="";return;}
    dropdownEl.innerHTML=matches.map(function(s){
      return "<div class='ac-item'>"
        +"<span class='ac-item-text' data-acval='"+esc(s)+"'>"+esc(s)+"</span>"
        +"<button class='ac-item-remove' data-acremove='"+esc(s)+"' title='Ta bort förslag'>×</button>"
        +"</div>";
    }).join("");
    dropdownEl.style.display="block";
    dropdownEl.querySelectorAll("[data-acval]").forEach(function(item){
      item.onmousedown=function(e){
        e.preventDefault();
        inputEl.value=item.dataset.acval;
        dropdownEl.style.display="none";dropdownEl.innerHTML="";
      };
    });
    dropdownEl.querySelectorAll("[data-acremove]").forEach(function(btn){
      btn.onmousedown=function(e){
        e.preventDefault();
        e.stopPropagation();
        if(removeValue)removeValue(btn.dataset.acremove);
        update();
      };
    });
  }
  inputEl.oninput=update;
  inputEl.onfocus=update;
  inputEl.addEventListener("blur",function(){setTimeout(function(){dropdownEl.style.display="none";},150);});
}

// ---- Riktigt refresh-token-flöde via proxyn (ingen inloggningsruta behövs efter första gången) ----
// Klienthemligheten ligger aldrig i denna fil — bytet av kod/refresh-token mot ett
// access-token sker på servern (Cloudflare Workern), se PROXY+"oauth/token".
function persistTokens(d){
  accessToken=d.access_token;
  localStorage.setItem("akt_access_token",d.access_token);
  localStorage.setItem("akt_token_expiry",String(Date.now()+((d.expires_in||3600)*1000)));
  if(d.refresh_token)localStorage.setItem("akt_refresh_token",d.refresh_token);
}
function clearStoredAuth(){
  ["akt_access_token","akt_token_expiry","akt_refresh_token","akt_token","token_time"].forEach(function(k){localStorage.removeItem(k);});
}
async function exchangeCodeForTokens(code){
  try{
    var r=await fetch(PROXY+"oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({grant_type:"authorization_code",code:code,redirect_uri:REDIRECT_URI})});
    var d=await r.json();
    if(!d.access_token)return false;
    persistTokens(d);
    return true;
  }catch(e){return false;}
}
// Byter ett sparat refresh-token mot ett nytt access-token. Ingen popup, ingen
// Google-inloggningsruta — bara ett vanligt bakgrundsanrop till proxyn.
async function refreshAccessToken(){
  var refreshToken=localStorage.getItem("akt_refresh_token");
  if(!refreshToken)return false;
  try{
    var r=await fetch(PROXY+"oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({grant_type:"refresh_token",refresh_token:refreshToken})});
    var d=await r.json();
    if(!d.access_token)return false;
    persistTokens(d);
    return true;
  }catch(e){return false;}
}
// Kollar med jämna mellanrum (och när fliken blir aktiv igen) om token snart går ut,
// och förnyar det i så fall via refresh-token. Om förnyelsen misslyckas är
// refresh-token:et återkallat eller ogiltigt — logga då ut ur appen automatiskt.
var tokenWatchInterval=null;
function startTokenWatch(){
  if(tokenWatchInterval)clearInterval(tokenWatchInterval);
  tokenWatchInterval=setInterval(checkAndRenewToken,5*60*1000);
  document.addEventListener("visibilitychange",function(){
    if(document.visibilityState==="visible")checkAndRenewToken();
  });
}
async function checkAndRenewToken(){
  if(!accessToken)return;
  var expiry=parseInt(localStorage.getItem("akt_token_expiry")||"0");
  if(Date.now()<expiry-10*60*1000)return; // gott om tid kvar än
  var renewed=await refreshAccessToken();
  if(!renewed)signOut();
}
// One-time migration to the app's current folder layout:
// - Bilder moves out of Historik to the top level; Historik is removed.
// - Aktivitet, Samtal, Fundering (renamed from Funderingar), Samtalsamnen move
//   out of Logga to the top level; Logga is removed once empty.
// - Media and Objekt (renamed Föremål) move into a new top-level Utvärdering folder.
// - Sök (renamed from Sok), Text, Terapi and Tips (with its Tips/Skamt subfolder
//   intact) move into a new top-level AI folder.
// Every step MOVES the existing Drive folder (same id, same contents) rather
// than copying, so nothing is duplicated, re-uploaded, or lost.
async function driveFindFolder(name,parentId){
  var q="name='"+name.replace(/'/g,"\\'")+"' and mimeType='application/vnd.google-apps.folder' and '"+parentId+"' in parents and trashed=false";
  var r=await fetch(DRIVE_API+"?q="+encodeURIComponent(q)+"&fields=files(id,name)",{headers:{Authorization:"Bearer "+accessToken}});
  var d=await r.json();
  return (d.files&&d.files.length)?d.files[0].id:null;
}
async function driveMoveFolder(id,oldParentId,newParentId,newName){
  var url=DRIVE_API+"/"+id+"?addParents="+newParentId+"&removeParents="+oldParentId;
  var body={};
  if(newName)body.name=newName;
  await fetch(url,{method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:JSON.stringify(body)});
}
async function driveTrashFolderIfEmpty(id){
  var r=await fetch(DRIVE_API+"?q="+encodeURIComponent("'"+id+"' in parents and trashed=false")+"&fields=files(id)&pageSize=1",{headers:{Authorization:"Bearer "+accessToken}});
  var d=await r.json();
  if(d.files&&d.files.length)return; // not empty — leave it alone, safer than losing data
  await fetch(DRIVE_API+"/"+id,{method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:JSON.stringify({trashed:true})});
}
async function driveRenameFolder(id,newName){
  await fetch(DRIVE_API+"/"+id,{method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:JSON.stringify({name:newName})});
}

async function migrateBilderFolder(){
  try{
    // --- Bilder: Historik/Bilder -> Bilder (top level); remove Historik ---
    var topBilder=await driveFindFolder("Bilder",FOLDER_ID);
    var historikId=await driveFindFolder("Historik",FOLDER_ID);
    if(!topBilder&&historikId){
      var nestedBilder=await driveFindFolder("Bilder",historikId);
      if(nestedBilder){
        await driveMoveFolder(nestedBilder,historikId,FOLDER_ID);
        console.log("Bilder-mappen flyttad från Historik/Bilder till toppnivån.");
      }
    }
    if(historikId)await driveTrashFolderIfEmpty(historikId);

    // --- Logga's children -> top level ---
    var loggaId=await driveFindFolder("Logga",FOLDER_ID);
    if(loggaId){
      var moves=[
        {old:"Aktivitet",newName:null},
        {old:"Samtal",newName:null},
        {old:"Funderingar",newName:"Fundering"},
        {old:"Samtalsamnen",newName:null}
      ];
      for(var i=0;i<moves.length;i++){
        var m=moves[i];
        var targetName=m.newName||m.old;
        if(await driveFindFolder(targetName,FOLDER_ID))continue; // already migrated
        var childId=await driveFindFolder(m.old,loggaId);
        if(childId)await driveMoveFolder(childId,loggaId,FOLDER_ID,m.newName);
      }

      // Media + Objekt(->Föremål) move into a new Betyg folder
      var utvId=await driveFindFolder("Betyg",FOLDER_ID);
      if(!utvId){
        var mediaInLogga=await driveFindFolder("Media",loggaId);
        var objektInLogga=await driveFindFolder("Objekt",loggaId);
        if(mediaInLogga||objektInLogga){
          utvId=await driveMkdir("Betyg",FOLDER_ID);
        }
      }
      if(utvId){
        if(!(await driveFindFolder("Media",utvId))){
          var mediaInLogga2=await driveFindFolder("Media",loggaId);
          if(mediaInLogga2)await driveMoveFolder(mediaInLogga2,loggaId,utvId);
        }
        if(!(await driveFindFolder("Föremål",utvId))){
          var objektInLogga2=await driveFindFolder("Objekt",loggaId);
          if(objektInLogga2)await driveMoveFolder(objektInLogga2,loggaId,utvId,"Föremål");
        }
      }

      await driveTrashFolderIfEmpty(loggaId);
    }

    // --- Sök, Text, Terapi, Tips -> new AI folder ---
    var aiId=await driveFindFolder("AI",FOLDER_ID);
    var sokTop=await driveFindFolder("Sok",FOLDER_ID);
    var textTop=await driveFindFolder("Text",FOLDER_ID);
    var terapiTop=await driveFindFolder("Terapi",FOLDER_ID);
    var tipsTop=await driveFindFolder("Tips",FOLDER_ID);
    if(!aiId&&(sokTop||textTop||terapiTop||tipsTop)){
      aiId=await driveMkdir("AI",FOLDER_ID);
    }
    if(aiId){
      if(sokTop&&!(await driveFindFolder("Sök",aiId)))await driveMoveFolder(sokTop,FOLDER_ID,aiId,"Sök");
      if(textTop&&!(await driveFindFolder("Text",aiId)))await driveMoveFolder(textTop,FOLDER_ID,aiId);
      if(terapiTop&&!(await driveFindFolder("Terapi",aiId)))await driveMoveFolder(terapiTop,FOLDER_ID,aiId);
      if(tipsTop&&!(await driveFindFolder("Tips",aiId)))await driveMoveFolder(tipsTop,FOLDER_ID,aiId);
    }

    // --- Samtalsämne (renamed from Samtalsamnen) and Skämt -> new Konversation folder ---
    var konvId=await driveFindFolder("Konversation",FOLDER_ID);
    // Samtalsamnen may be at top level (from an earlier migration) or still nested under Logga
    var samtalsamnenTop=await driveFindFolder("Samtalsamnen",FOLDER_ID);
    var samtalsamnenParent=FOLDER_ID;
    if(!samtalsamnenTop&&loggaId){
      samtalsamnenTop=await driveFindFolder("Samtalsamnen",loggaId);
      samtalsamnenParent=loggaId;
    }
    // Skämt may be nested under AI/Tips (from an earlier migration) or under a top-level Tips folder
    var tipsFolderForSkamt=aiId?await driveFindFolder("Tips",aiId):null;
    var skamtNested=tipsFolderForSkamt?await driveFindFolder("Skamt",tipsFolderForSkamt):null;
    var skamtParent=tipsFolderForSkamt;
    if(!skamtNested){
      var oldTopTips=await driveFindFolder("Tips",FOLDER_ID);
      if(oldTopTips){skamtNested=await driveFindFolder("Skamt",oldTopTips);skamtParent=oldTopTips;}
    }
    if(!konvId&&(samtalsamnenTop||skamtNested)){
      konvId=await driveMkdir("Konversation",FOLDER_ID);
    }
    if(konvId){
      if(samtalsamnenTop&&!(await driveFindFolder("Samtalsämne",konvId))){
        await driveMoveFolder(samtalsamnenTop,samtalsamnenParent,konvId,"Samtalsämne");
      }
      if(skamtNested&&!(await driveFindFolder("Skämt",konvId))){
        await driveMoveFolder(skamtNested,skamtParent,konvId,"Skämt");
      }
    }
    if(loggaId)await driveTrashFolderIfEmpty(loggaId);

    // --- Utvärdering renamed to Betyg ---
    var betygId=await driveFindFolder("Betyg",FOLDER_ID);
    if(!betygId){
      var utvOldName=await driveFindFolder("Utvärdering",FOLDER_ID);
      if(utvOldName){
        await driveRenameFolder(utvOldName,"Betyg");
        console.log("Utvärdering-mappen döpt om till Betyg.");
      }
    }
  }catch(e){
    console.error("Migrering av mappstrukturen misslyckades:",e);
  }
}

async function importFromDrive(){
  if(!accessToken){alert("Logga in först.");return;}
  var btn=document.getElementById("import-btn");
  if(btn){btn.textContent="Läser...";btn.disabled=true;}

  function mergeById(local,remote){
    if(!Array.isArray(remote))return local;
    var map=new Map();
    local.forEach(function(x){map.set(String(x.id||x.timestamp),x);});
    var added=0;
    remote.forEach(function(x){
      var key=String(x.id||x.timestamp);
      if(!map.has(key)){map.set(key,x);added++;}
    });
    if(added>0)console.log("Importerade "+added+" nya poster");
    return Array.from(map.values()).sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});
  }

  // Reset cache so we re-read fresh from Drive
  Object.keys(tabLoaded).forEach(function(k){tabLoaded[k]=false;});

  var totalAdded=0;

  // Aktiviteter
  var da=await driveRead("Aktivitet");
  if(da&&da.logs){
    var before=logs.length;
    logs=mergeById(logs,da.logs.map(function(l){l.id=Number(l.id)||l.id;return l;}));
    totalAdded+=logs.length-before;
  }

  // Samtal
  var ds=await driveRead("Samtal");
  if(ds){
    if(ds.sentPeople){var b=sentPeople.length;sentPeople=mergeById(sentPeople,ds.sentPeople);totalAdded+=sentPeople.length-b;}
    if(ds.sentConvs){var b=sentConvs.length;sentConvs=mergeById(sentConvs,ds.sentConvs);totalAdded+=sentConvs.length-b;}
    if(ds.sentMsgs){var b=sentMsgs.length;sentMsgs=mergeById(sentMsgs,ds.sentMsgs);totalAdded+=sentMsgs.length-b;}
  }

  // Funderingar
  var df=await driveRead("Fundering");

      var cats=Object.keys(dm.mediaList);
      cats.forEach(function(k){
        if(dm.mediaList[k]){
          var existing=mediaList[k]||[];
          var seen={};
          existing.forEach(function(item){seen[mediaItemTitle(item)+"|"+mediaItemCreator(item)+"|"+mediaItemGenre(item)]=true;});
          var before2=existing.length;
          dm.mediaList[k].forEach(function(item){
            var key=mediaItemTitle(item)+"|"+mediaItemCreator(item)+"|"+mediaItemGenre(item);
            if(!seen[key]){seen[key]=true;existing.push(item);}
          });
          totalAdded+=existing.length-before2;
          mediaList[k]=existing;
        }
      });
    }
    if(dm.mediaFardig){var b=mediaFardig.length;mediaFardig=mergeById(mediaFardig,dm.mediaFardig);totalAdded+=mediaFardig.length-b;}
  }

  // Sök
  var dso=await driveRead("AI/Sok");
  if(dso&&dso.fHist){var b=fHist.length;fHist=mergeById(fHist,dso.fHist);totalAdded+=fHist.length-b;}

  if(dt){
    if(dt.kHist){var b=kHist.length;kHist=mergeById(kHist,dt.kHist);totalAdded+=kHist.length-b;}

    if(dt.oHist){var b=oHist.length;oHist=mergeById(oHist,dt.oHist);totalAdded+=oHist.length-b;}
    if(dt.synHist){var b=synHist.length;synHist=mergeById(synHist,dt.synHist);totalAdded+=synHist.length-b;}
  }

  var dte=await driveRead("AI/Terapi");
  if(dte&&dte.tHist){var b=tHist.length;tHist=mergeById(tHist,dte.tHist);totalAdded+=tHist.length-b;}

  // Tips
  var dtp=await driveRead("AI/Tips/Tips");
  if(dtp&&dtp.tipsHistory){var b=tipsHistory.length;tipsHistory=mergeById(tipsHistory,dtp.tipsHistory);totalAdded+=tipsHistory.length-b;}
  var dsk=await driveRead("Konversation/Skamt");
  if(dsk&&dsk.savedJokes){
    var s=new Set(savedJokes);var b2=s.size;
    dsk.savedJokes.forEach(function(j){s.add(j);});
    totalAdded+=s.size-b2;savedJokes=Array.from(s);
  }

  // Inställningar
  var din=await driveRead("Installningar");
  if(din&&din.placePresets)PLACE_PRESETS=din.placePresets;
  if(din&&din.actPresets)ACT_PRESETS=din.actPresets;
  if(din&&din.catPresets)CAT_PRESETS=din.catPresets;
  if(din&&din.fundCatPresets)FUND_CAT_PRESETS=din.fundCatPresets;
  if(din&&din.genrePresets)GENRE_PRESETS=din.genrePresets;
  if(din&&din.mediaCatPresets)MEDIA_CAT_PRESETS=din.mediaCatPresets;
  if(din&&din.amneCatPresets)AMNE_CAT_PRESETS=din.amneCatPresets;
  if(din&&din.objCatPresets)OBJ_CAT_PRESETS=din.objCatPresets;
  if(din&&din.platsCatPresets)PLATS_CAT_PRESETS=din.platsCatPresets;
  if(din&&din.omradePresets)OMRADE_PRESETS=din.omradePresets;

  saveLocal();
  Object.keys(tabLoaded).forEach(function(k){tabLoaded[k]=true;});

  if(btn){
    btn.textContent=totalAdded>0?"✓ "+totalAdded+" nya":"✓ Klart";
    btn.disabled=false;
    setTimeout(function(){btn.textContent="↓ Fil import";},3000);
  }

  hdr();
  if(view==="history")renderHistory();
  else render();
  setTimeout(function(){updateHandelser(null);},100);
}

function mergeData(r){
  function ma(a,b){var m=new Map();(a||[]).concat(b||[]).forEach(function(x){m.set(String(x.id||x.timestamp),x);});return Array.from(m.values()).sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});}
  // For history lists where deletions matter, prefer local (newer) over remote merge
  // Only merge logs/sentMsgs/sentConvs/fundHist where multi-device adds are common
  return{
    logs:ma(logs,r.logs),
    kHist:kHist.length>=((r.kHist||[]).length)?kHist:r.kHist||kHist,
    sHist:sHist.length>=((r.sHist||[]).length)?sHist:r.sHist||sHist,
    oHist:oHist.length>=((r.oHist||[]).length)?oHist:r.oHist||oHist,
    fHist:fHist.length>=((r.fHist||[]).length)?fHist:r.fHist||fHist,
    tHist:tHist.length>=((r.tHist||[]).length)?tHist:r.tHist||tHist,
    synHist:synHist.length>=((r.synHist||[]).length)?synHist:r.synHist||synHist,
    sentMsgs:ma(sentMsgs,r.sentMsgs||[]),
    sentPeople:ma(sentPeople,r.sentPeople||[]),
    sentConvs:ma(sentConvs,r.sentConvs||[]),
    fundHist:ma(fundHist,r.fundHist||[]),
    savedJokes:r.savedJokes||savedJokes,
    imageHist:r.imageHist||imageHist,
    mediaList:r.mediaList||mediaList,
    mediaFardig:r.mediaFardig||mediaFardig,
    tipsHistory:tipsHistory.length>=(r.tipsHistory||[]).length?tipsHistory:(r.tipsHistory||tipsHistory)
  };
}

function saveDriveCache(){
  /* no-op: file IDs are resolved fresh each session, never persisted to disk */
}
function loadDriveCache(){
  /* no-op: nothing to load, IDs are always resolved fresh */
}

async function driveMkdir(name,parentId){
  // Check cache
  var ckey=parentId+"/"+name;
  if(driveDirCache[ckey])return driveDirCache[ckey];
  // Search
  var q="name='"+name+"' and '"+parentId+"' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false";
  var r=await fetch(DRIVE_API+"?q="+encodeURIComponent(q)+"&fields=files(id)",{headers:{Authorization:"Bearer "+accessToken}});
  var d=await r.json();
  if(d.files&&d.files.length>0){
    driveDirCache[ckey]=d.files[0].id;saveDriveCache();return driveDirCache[ckey];
  }
  // Create
  var r2=await fetch(DRIVE_API,{method:"POST",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:JSON.stringify({name:name,parents:[parentId],mimeType:"application/vnd.google-apps.folder"})});
  var d2=await r2.json();
  driveDirCache[ckey]=d2.id;saveDriveCache();return driveDirCache[ckey];
}

async function driveResolveFolder(def){
  var parentId=FOLDER_ID;
  for(var i=0;i<def.length;i++){
    parentId=await driveMkdir(def[i],parentId);
  }
  return parentId;
}

async function driveGetFileId(path){
  // Always search Drive fresh — never trust cache alone
  var def=DRIVE_STRUCTURE[path];
  if(!def)throw new Error("Okänd sökväg: "+path);
  var parentId=await driveResolveFolder(def);
  // Search — explicitly exclude trashed
  var q="name='data.json' and '"+parentId+"' in parents and trashed=false";
  var r=await fetch(DRIVE_API+"?q="+encodeURIComponent(q)+"&fields=files(id,name,createdTime)&orderBy=createdTime",{headers:{Authorization:"Bearer "+accessToken}});
  var d=await r.json();
  if(d.files&&d.files.length>1){
    // Multiple files — report error, use oldest
    reportDriveError(path,"⚠️ Flera data.json-filer hittades i mappen '"+def.join("/")+"'. Ta bort de extra filerna i Google Drive manuellt. Använder den äldsta.");
    driveIdCache[path]=d.files[0].id;
    saveDriveCache();
    return driveIdCache[path];
  }
  if(d.files&&d.files.length===1){
    driveIdCache[path]=d.files[0].id;
    saveDriveCache();
    return driveIdCache[path];
  }
  // Nothing found
  delete driveIdCache[path];
  saveDriveCache();
  throw new Error("FIL_SAKNAS:"+path);
}

async function driveEnsureFile(path){
  // Explicitly creates a new file — only call when user has confirmed creation
  var def=DRIVE_STRUCTURE[path];
  if(!def)throw new Error("Okänd sökväg: "+path);
  var parentId=await driveResolveFolder(def);
  var form=new FormData();
  form.append("metadata",new Blob([JSON.stringify({name:"data.json",parents:[parentId],mimeType:"application/json"})],{type:"application/json"}));
  form.append("file",new Blob(["{}"],{type:"application/json"}));
  var r2=await fetch(DRIVE_UPLOAD+"?uploadType=multipart&fields=id",{method:"POST",headers:{Authorization:"Bearer "+accessToken},body:form});
  var d2=await r2.json();
  driveIdCache[path]=d2.id;saveDriveCache();return driveIdCache[path];
}

function validateDriveData(path,data){
  var errors=[];
  var checks={
    "Aktivitet":  function(d){
      if(!Array.isArray(d.logs)){errors.push('"logs" saknas eller är inte en lista');}
      else{d.logs.forEach(function(l,i){
        if(typeof l.id!=="number")errors.push("logs["+i+']: "id" är '+typeof l.id+' — bör vara nummer');
        if(!l.activity)errors.push("logs["+i+']: "activity" saknas');
        if(!l.timestamp)errors.push("logs["+i+']: "timestamp" saknas');
      });}
    },
    "Samtal":     function(d){if(!Array.isArray(d.sentPeople))errors.push('"sentPeople" saknas');if(!Array.isArray(d.sentConvs))errors.push('"sentConvs" saknas');if(!Array.isArray(d.sentMsgs))errors.push('"sentMsgs" saknas');},
    "Fundering":function(d){if(!Array.isArray(d.fundHist))errors.push('"fundHist" saknas');},
    "Konversation/Samtalsamnen":function(d){if(!Array.isArray(d.amneHist))errors.push('"amneHist" saknas');},
    "Utvardering/Media":      function(d){if(!d.mediaList||typeof d.mediaList!=="object"||Array.isArray(d.mediaList))errors.push('"mediaList" saknas eller är inte ett objekt');},
    "Utvardering/Foremal":     function(d){if(!d.objList||typeof d.objList!=="object"||Array.isArray(d.objList))errors.push('"objList" saknas eller är inte ett objekt');},
    "Utvardering/Plats":     function(d){if(!d.platsList||typeof d.platsList!=="object"||Array.isArray(d.platsList))errors.push('"platsList" saknas eller är inte ett objekt');},
    "Installningar/Inmatningar": function(d){if(!Array.isArray(d.aktivitetHistory)&&!Array.isArray(d.platsHistory)&&!Array.isArray(d.anteckningHistory))errors.push('inmatningshistorik saknas eller har fel format');},
    "AI/Sok":              function(d){if(!Array.isArray(d.fHist))errors.push('"fHist" saknas');},
    "AI/Tips/Tips":        function(d){if(!Array.isArray(d.tipsHistory))errors.push('"tipsHistory" saknas');},
    "Konversation/Skamt":       function(d){if(!Array.isArray(d.savedJokes))errors.push('"savedJokes" saknas');},
    "AI/Terapi":           function(d){if(!Array.isArray(d.tHist))errors.push('"tHist" saknas');},
    "Bilder/Index":   function(d){if(!Array.isArray(d.images))errors.push('"images" saknas');}
  };
  if(checks[path])checks[path](data);
  // Report warnings but always return true — don't block data
  if(errors.length){errors.forEach(function(e){reportDriveError(path,"⚠️ Varning: "+e);});}
  return true;
}

async function driveRead(path){
  try{
    var id=await driveGetFileId(path);
    var r=await fetch(DRIVE_API+"/"+id+"?alt=media",{headers:{Authorization:"Bearer "+accessToken}});
    if(r.status===404){
      // Stale file ID — clear cache and search again
      delete driveIdCache[path];
      saveDriveCache();
      try{
        id=await driveGetFileId(path);
        r=await fetch(DRIVE_API+"/"+id+"?alt=media",{headers:{Authorization:"Bearer "+accessToken}});
      }catch(e2){
        if(e2.message&&e2.message.startsWith("FIL_SAKNAS:")){
          showFileMissingError(path);
          return null;
        }
        throw e2;
      }
    }
    if(!r.ok){reportDriveError(path,"HTTP "+r.status+" vid läsning");return null;}
    var text=await r.text();
    if(!text||!text.trim()||text.trim()==="{}"){return null;}
    var parsed;
    try{parsed=JSON.parse(text);}catch(pe){reportDriveError(path,"Ogiltig JSON — "+pe.message);return null;}
    validateDriveData(path,parsed);
    return parsed;
  }catch(e){
    if(e.message&&e.message.startsWith("FIL_SAKNAS:")){
      // Silent — file simply not created yet, no error needed
      return null;
    }
    reportDriveError(path,"Nätverksfel: "+e.message);
    return null;
  }
}

          // Just cache this file ID — no new file created
          driveIdCache[path]=fileId;
          saveDriveCache();
          overlay.remove();
          // Reload tab data
          var tabKey=Object.keys(tabLoaded).find(function(k){
            var p=path.toLowerCase();
            return (k==="aktiviteter"&&p.includes("aktivitet"))||(k==="samtal"&&p.includes("samtal"))||(k==="funderingar"&&p.includes("fundering"))||(k==="media"&&p.includes("media"))||(k==="sok"&&p.includes("sok"))||(k==="text"&&p.includes("text"))||(k==="terapi"&&p.includes("terapi"))||(k==="tips"&&p.includes("tips"))||(k==="installningar"&&p.includes("installning"));
          })||"aktiviteter";
          tabLoaded[tabKey]=false;
          loadTab(tabKey).then(function(){
            if(view==="history")renderHistory();
            else render();
            setTimeout(function(){updateHandelser(null);},100);
          });
        };
      });
    }catch(e){
      listDiv.innerHTML="<div style='color:#d97a83;font-size:13px'>Fel vid sökning: "+e.message+"</div>";
    }
  })();
}

function getCatDisplay(categoryId){
  // First try to find in CAT_PRESETS (user's custom labels with emojis)
  var preset=CAT_PRESETS.find(function(p){
    var ct=CATS.find(function(x){return x.id===categoryId;});
    return ct&&(p===ct.e+" "+ct.label||p.indexOf(" ")>0&&p.split(" ").slice(1).join(" ")===ct.label)||p===categoryId;
  });
  if(preset)return preset;
  // Fall back to CATS
  var ct=CATS.find(function(x){return x.id===categoryId;});
  return ct?ct.e+" "+ct.label:categoryId||"";
}

function getCatEmoji(categoryId){
  var display=getCatDisplay(categoryId);
  // Extract emoji (first char(s) before space)
  var m=display.match(/^([\p{Emoji}\u{1F3FB}-\u{1F3FF}\u{1F9B0}-\u{1F9B3}]+)/u);
  return m?m[1]:"✨";
}

function getCatLabel(categoryId){
  var display=getCatDisplay(categoryId);
  // Remove leading emoji
  return display.replace(/^[\p{Emoji}\s]+/u,"").trim()||display;
}

function buildImageFilename(img){
  var d=new Date(img.timestamp);
  var yy=String(d.getFullYear()).slice(-2);
  var mm=String(d.getMonth()+1).padStart(2,"0");
  var dd=String(d.getDate()).padStart(2,"0");
  var title=(img.activity||"bild").replace(/[^a-zA-ZåäöÅÄÖ0-9_\- ]/g,"").trim().slice(0,40);
  var ext=img.mtype&&img.mtype.includes("png")?"png":"jpg";
  return yy+"-"+mm+"-"+dd+"_"+title+"."+ext;
}

async function driveWriteJpeg(filename,base64,mtype){
  // Get or create top-level Bilder folder
  var bilderId=await driveMkdir("Bilder",FOLDER_ID);
  // Convert base64 to binary
  var binary=atob(base64);
  var bytes=new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  var blob=new Blob([bytes],{type:mtype||"image/jpeg"});
  var form=new FormData();
  form.append("metadata",new Blob([JSON.stringify({name:filename,parents:[bilderId],mimeType:mtype||"image/jpeg"})],{type:"application/json"}));
  form.append("file",blob);
  var r=await fetch(DRIVE_UPLOAD+"?uploadType=multipart&fields=id",{method:"POST",headers:{Authorization:"Bearer "+accessToken},body:form});
  var d=await r.json();
  return d.id;
}

async function loadImageBase64(img){
  if(img.base64)return img.base64;
  if(!img.driveId||!accessToken)return null;
  try{
    var r=await fetch(DRIVE_API+"/"+img.driveId+"?alt=media",{headers:{Authorization:"Bearer "+accessToken}});
    if(!r.ok)return null;
    var blob=await r.blob();
    return await new Promise(function(res){
      var reader=new FileReader();
      reader.onload=function(e){res(e.target.result.split(",")[1]);};
      reader.readAsDataURL(blob);
    });
  }catch(e){return null;}
}

async function saveImageToDrive(img){
  if(!accessToken||!img.base64)return false;
  try{
    var filename=buildImageFilename(img);
    var id=await driveWriteJpeg(filename,img.base64,img.mtype||"image/jpeg");
    if(!id)return false;
    img.driveId=id;
    img.base64=null; // free memory after upload
    return true;
  }catch(e){
    console.error("saveImageToDrive fel:",e);
    return false;
  }
}

async function driveWrite(path,data){
  try{
    var id=driveIdCache[path];
    if(!id){
      try{id=await driveGetFileId(path);}
      catch(e){
        if(e.message&&e.message.startsWith("FIL_SAKNAS:")){
          showFileMissingError(path,data);return;
        }
        throw e;
      }
    }
    var r=await fetch(DRIVE_UPLOAD+"/"+id+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:JSON.stringify(data,null,2)});
    if(r.status===404){
      delete driveIdCache[path];saveDriveCache();
      try{id=await driveGetFileId(path);}
      catch(e){showFileMissingError(path,data);return;}
      await fetch(DRIVE_UPLOAD+"/"+id+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:JSON.stringify(data,null,2)});
    }
  }catch(e){showDriveWriteError(path,e.message,data);}
}

// ---- In-app JSON-redigerare ----
// Google Drives egen förhandsvisning av textfiler (JSON m.fl.) är alltid
// skrivskyddad — det finns ingen inbyggd redigerare för det i Drives webbgränssnitt.
// Dessa funktioner läser/skriver den råa filtexten direkt via Drive-API:et, så man
// kan redigera innehållet i appen istället för att behöva ladda ner/ladda upp filen manuellt.
async function driveReadRaw(path){
  delete driveIdCache[path]; // slå upp färskt varje gång redigeraren öppnas
  var id=await driveGetFileId(path);
  var r=await fetch(DRIVE_API+"/"+id+"?alt=media",{headers:{Authorization:"Bearer "+accessToken}});
  if(!r.ok)throw new Error("HTTP "+r.status);
  return await r.text();
}
async function driveWriteRaw(path,rawText){
  var id=driveIdCache[path]||await driveGetFileId(path);
  var r=await fetch(DRIVE_UPLOAD+"/"+id+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:rawText});
  if(!r.ok)throw new Error("HTTP "+r.status);
}

async function loadTab(tabName){
  if(!accessToken||tabLoaded[tabName])return;
  try{
    if(tabName==="aktiviteter"){
      var da=await driveRead("Aktivitet");
      if(da){if(da.logs)logs=da.logs.map(function(l){l.id=Number(l.id)||l.id;return l;});}
      var di=await driveRead("Bilder/Index");
      if(di&&di.images){imageHist=di.images.map(function(m){return {id:m.id,logId:m.logId,activity:m.activity,category:m.category,mtype:m.mtype||"image/jpeg",timestamp:m.timestamp,driveId:m.driveId,base64:null};});}
    } else if(tabName==="samtal"){
      var da=await driveRead("Samtal");
      if(da){if(da.sentPeople)sentPeople=da.sentPeople;if(da.sentConvs)sentConvs=da.sentConvs;if(da.sentMsgs)sentMsgs=da.sentMsgs;}
    } else if(tabName==="funderingar"){
      var da=await driveRead("Fundering");
      if(da){if(da.fundHist)fundHist=da.fundHist;}
    } else if(tabName==="samtalsamnen"){
      var da=await driveRead("Konversation/Samtalsamnen");
      if(da){if(da.amneHist)amneHist=da.amneHist;}
    } else if(tabName==="media"){
      var da=await driveRead("Utvardering/Media");
      if(da){if(da.mediaList)mediaList=da.mediaList;if(da.mediaFardig)mediaFardig=da.mediaFardig;}
      migrateMediaCategories();
    } else if(tabName==="objekt"){
      var da=await driveRead("Utvardering/Foremal");
      if(da){if(da.objList)objList=da.objList;if(da.objFardig)objFardig=da.objFardig;}
    } else if(tabName==="plats"){
      var da=await driveRead("Utvardering/Plats");
      if(da){if(da.platsList)platsList=da.platsList;if(da.platsFardig)platsFardig=da.platsFardig;}
    } else if(tabName==="inmatningar"){
      var da=await driveRead("Installningar/Inmatningar");
      if(da){if(da.aktivitetHistory)aktivitetHistory=da.aktivitetHistory;if(da.platsHistory)platsHistory=da.platsHistory;if(da.anteckningHistory)anteckningHistory=da.anteckningHistory;}
    } else if(tabName==="sok"){
      var da=await driveRead("AI/Sok");
      if(da){if(da.fHist)fHist=da.fHist;}
    } else if(tabName==="text"){
      var da=await driveRead("AI/Text");
      if(da){if(da.kHist)kHist=da.kHist;if(da.sHist)sHist=da.sHist;if(da.oHist)oHist=da.oHist;if(da.synHist)synHist=da.synHist;}
    } else if(tabName==="terapi"){
      var da=await driveRead("AI/Terapi");
      if(da){if(da.tHist)tHist=da.tHist;}
    } else if(tabName==="tips"){
      var da=await driveRead("AI/Tips/Tips");
      if(da){if(da.tipsHistory)tipsHistory=da.tipsHistory;}
    } else if(tabName==="skamt"){
      var db=await driveRead("Konversation/Skamt");
      if(db){if(db.savedJokes)savedJokes=db.savedJokes;}
    } else if(tabName==="installningar"){
      var da=await driveRead("Installningar");
      if(da){
        if(da.placePresets)PLACE_PRESETS=da.placePresets;
        if(da.actPresets)ACT_PRESETS=da.actPresets;
        if(da.catPresets)CAT_PRESETS=da.catPresets;
        if(da.fundCatPresets)FUND_CAT_PRESETS=da.fundCatPresets;
        if(da.amneCatPresets)AMNE_CAT_PRESETS=da.amneCatPresets;
        if(da.genrePresets)GENRE_PRESETS=da.genrePresets;
        if(da.mediaCatPresets)MEDIA_CAT_PRESETS=da.mediaCatPresets;
        if(da.objCatPresets)OBJ_CAT_PRESETS=da.objCatPresets;
        if(da.platsCatPresets)PLATS_CAT_PRESETS=da.platsCatPresets;
        if(da.omradePresets)OMRADE_PRESETS=da.omradePresets;
      }
    }
  }catch(e){reportDriveError(tabName,"Oväntat fel: "+e.message);}
  tabLoaded[tabName]=true;
  saveLocal();
}

async function init(){
  // Just kommit tillbaka från Googles inloggningsruta med en engångskod?
  if(window.__pendingAuthCode){
    var code=window.__pendingAuthCode;
    window.__pendingAuthCode=null;
    var exchanged=await exchangeCodeForTokens(code);
    if(exchanged){
      await fetchUserInfo();
      showApp();
      startTokenWatch();
      return;
    }
  }
  // Redan ett giltigt sparat access-token?
  var savedToken=localStorage.getItem("akt_access_token");
  var expiry=parseInt(localStorage.getItem("akt_token_expiry")||"0");
  if(savedToken&&Date.now()<expiry-2*60*1000){
    accessToken=savedToken;
    if(!userInfo)await fetchUserInfo();
    showApp();
    startTokenWatch();
    return;
  }
  // Inget giltigt access-token — försök byta ett sparat refresh-token mot ett nytt,
  // helt utan att visa någon inloggningsruta.
  var refreshed=await refreshAccessToken();
  if(refreshed){
    if(!userInfo)await fetchUserInfo();
    showApp();
    startTokenWatch();
    return;
  }
  clearStoredAuth();
  var dbg=document.getElementById("debug-msg");
  if(dbg)dbg.textContent="Redirect URI: "+REDIRECT_URI;
  showLogin();
}
async function aiCall(system,userMsg,maxTokens){
  var ctx=buildContext();
  return fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:selectedModel,max_tokens:maxTokens,messages:[{role:"system",content:system+ctx},{role:"user",content:userMsg}]})});
}
async function aiChat(system,messages,maxTokens){
  var ctx=buildContext();
  return fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:selectedModel,max_tokens:maxTokens,messages:[{role:"system",content:system+ctx}].concat(messages)})});
}
function aiText(data){
  // Standard OpenAI/Anthropic format
  if(data.choices&&data.choices[0]){
    var msg=data.choices[0].message;
    if(msg){
      // Some models return content as string
      if(typeof msg.content==="string"&&msg.content)return msg.content;
      // Some models (Gemini) return content as array of parts
      if(Array.isArray(msg.content)){
        return msg.content.map(function(p){return p.text||p.content||"";}).join("");
      }
    }
    // Fallback: text field directly on choice
    if(data.choices[0].text)return data.choices[0].text;
  }
  // Gemini native format fallback
  if(data.candidates&&data.candidates[0]){
    var c=data.candidates[0];
    if(c.content&&c.content.parts)return c.content.parts.map(function(p){return p.text||"";}).join("");
  }
  return "";
}

// ---- Delad "fortsätt konversationen"-komponent (används av Sök och Text) ----
// chat är en array [{role:"user"|"assistant", content:string|array}] där de två
// första posterna är den ursprungliga frågan/bilden + första svaret. Genom att alltid
// skicka HELA chat-arrayen vidare (inklusive ev. bild i chat[0]) hålls bildkontexten
// kvar genom hela konversationen — även vid "Mer detaljerat" och fria följdfrågor.
function chatContentToText(content){
  if(typeof content==="string")return content;
  if(Array.isArray(content))return content.filter(function(p){return p.type==="text";}).map(function(p){return p.text;}).join(" ");
  return "";
}
function chatContinuationHtml(chat,idPrefix){
  var thread=(chat||[]).slice(2).map(function(m){
    var txt=chatContentToText(m.content);
    if(m.role==="user"){
      return "<div style='display:flex;justify-content:flex-end;margin-bottom:8px'><div class='bubble-me'>"+esc(txt)+"</div></div>";
    }
    return "<div style='display:flex;justify-content:flex-start;margin-bottom:8px'><div class='bubble-them'>"+esc(txt)+"</div></div>";
  }).join("");
  return (thread?"<div class='mt12' style='margin-bottom:8px'>"+thread+"</div>":"")
    +"<div class='lbl' style='margin-top:12px'>Fortsätt konversationen</div>"
    +"<div class='row'><input class='inp' id='"+idPrefix+"-followup-inp' placeholder='Ställ en följdfråga...'/><button class='abtn' id='"+idPrefix+"-followup-btn'>&#8594;</button></div>"
    +"<div id='"+idPrefix+"-followup-loading' style='display:none;text-align:center;color:#5c5c5c;font-size:12px;margin-top:6px'>Skriver...</div>";
}
function bindChatContinuation(b,idPrefix,systemPrompt,getChat,onDone){
  var inp=b.querySelector("#"+idPrefix+"-followup-inp");
  var btn=b.querySelector("#"+idPrefix+"-followup-btn");
  var loadingEl=b.querySelector("#"+idPrefix+"-followup-loading");
  if(!btn||!inp)return;
  var send=async function(){
    var txt=inp.value.trim();
    if(!txt)return;
    inp.value="";
    var chat=getChat();
    chat.push({role:"user",content:txt});
    btn.disabled=true;if(loadingEl)loadingEl.style.display="block";
    try{
      var res=await aiChat(systemPrompt,chat,900);
      var data=await res.json();
      var text=aiText(data)||"Kunde inte svara.";
      chat.push({role:"assistant",content:text});
    }catch(e){
      chat.push({role:"assistant",content:"Kunde inte svara. Försök igen."});
    }
    btn.disabled=false;if(loadingEl)loadingEl.style.display="none";
    onDone();
  };
  btn.onclick=send;
  inp.onkeydown=function(e){if(e.key==="Enter")send();};
}

function buildContext(){
  var parts=[];

  // Aktiviteter (senaste 30)
  if(logs.length){
    parts.push("=== AKTIVITETER (senaste) ===");
    logs.slice(0,30).forEach(function(l){
      var ct=CATS.find(function(c){return c.id===l.category;});
      var line="["+fd(l.timestamp)+"] "+(ct?ct.label:l.category)+": "+l.activity;
      if(l.time)line+=" ("+l.time+")";
      if(l.note)line+=" - "+l.note;
      parts.push(line);
    });
  }

  // Funderingar (senaste 20)
  if(fundHist.length){
    parts.push("\n=== FUNDERINGAR (senaste) ===");
    fundHist.slice(0,20).forEach(function(f){
      parts.push("["+fd(f.timestamp)+"] "+f.text);
    });
  }

  // Samtal - personer och konversationer (senaste 20 meddelanden)
  if(sentPeople.length){
    parts.push("\n=== SAMTAL ===");
    sentPeople.forEach(function(p){
      var convs=sentConvs.filter(function(cv){return cv.personId===p.id;});
      if(!convs.length)return;
      parts.push("Person: "+p.name);
      convs.slice(0,3).forEach(function(cv){
        var msgs=sentMsgs.filter(function(m){return m.convId===cv.id;}).slice(-10);
        if(!msgs.length)return;
        parts.push("  Konversation: "+cv.title+(cv.type?" ("+cv.type+")":""));
        msgs.forEach(function(m){
          parts.push("    "+(m.sender==="me"?"Jag":p.name)+": "+m.text);
        });
      });
    });
  }

  if(!parts.length)return "";
  return "\n\nAnvandarens kontext fran AI-Assistent-appen:\n"+parts.join("\n")+"\n\nAnvand denna kontext for att ge mer personliga och relevanta svar. Referera till den nar det ar lampligt men tvinga inte in den i varje svar.";
}

    else{todayImgs.forEach(function(img){html+=imgRow(img);});}
    var todayImgIds={};todayImgs.forEach(function(img){todayImgIds[img.id]=true;});
    var remainingImgs=Math.max(0,5-todayImgs.length);
    var recentImgs=remainingImgs>0
      ?imageHist.filter(function(img){return !todayImgIds[img.id];}).sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);}).slice(0,remainingImgs)
      :[];
    if(recentImgs.length){

function showClockOverlayFor(initH,initM,onSet){
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px";
  ov.innerHTML=
    "<div style='background:#161616;border-radius:20px;width:100%;max-width:320px;overflow:hidden'>"
    +"<div id='cl-display' style='background:#0a4a4a;padding:20px 24px;font-size:52px;font-weight:300;color:#fff;letter-spacing:2px;text-align:center'>"+String(initH).padStart(2,"0")+":"+String(initM).padStart(2,"0")+"</div>"
    +"<div style='display:flex;gap:0;border-bottom:1px solid #2a2a2a'>"
    +"<button id='cl-mode-h' style='flex:1;padding:10px;background:#1c3c5a;border:none;color:#4fa8ff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit'>Timmar</button>"
    +"<button id='cl-mode-m' style='flex:1;padding:10px;background:none;border:none;color:#5c5c5c;font-size:13px;cursor:pointer;font-family:inherit'>Minuter</button>"
    +"</div>"
    +"<div style='padding:16px;display:flex;justify-content:center'>"
    +"<canvas id='cl-canvas' width='240' height='240' style='touch-action:none;cursor:pointer'></canvas>"
    +"</div>"
    +"<div style='display:flex;justify-content:space-between;padding:12px 20px;border-top:1px solid #2a2a2a'>"
    +"<button id='cl-clear' style='background:none;border:none;color:#4fa8ff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit'>RENSA</button>"
    +"<div style='display:flex;gap:16px'>"
    +"<button id='cl-cancel' style='background:none;border:none;color:#4fa8ff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit'>AVBRYT</button>"
    +"<button id='cl-set' style='background:none;border:none;color:#4fa8ff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit'>VÄLJ</button>"
    +"</div></div></div>";
  document.body.appendChild(ov);
  var lh=initH,lm=initM,lmode="h";
  var canvas=ov.querySelector("#cl-canvas");
  var ctx=canvas.getContext("2d");
  var sz=240,cx=sz/2,cy=sz/2,r=sz/2-10,ri=r*0.58;
  function drawClock(){
    ctx.clearRect(0,0,sz,sz);
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle="#1a2233";ctx.fill();
    var nums=lmode==="h"?
      [{v:12,a:-90},{v:1,a:-60},{v:2,a:-30},{v:3,a:0},{v:4,a:30},{v:5,a:60},{v:6,a:90},{v:7,a:120},{v:8,a:150},{v:9,a:180},{v:10,a:210},{v:11,a:240},
       {v:0,a:-90,inner:true},{v:13,a:-60,inner:true},{v:14,a:-30,inner:true},{v:15,a:0,inner:true},{v:16,a:30,inner:true},{v:17,a:60,inner:true},{v:18,a:90,inner:true},{v:19,a:120,inner:true},{v:20,a:150,inner:true},{v:21,a:180,inner:true},{v:22,a:210,inner:true},{v:23,a:240,inner:true}]:
      [{v:0,a:-90},{v:5,a:-60},{v:10,a:-30},{v:15,a:0},{v:20,a:30},{v:25,a:60},{v:30,a:90},{v:35,a:120},{v:40,a:150},{v:45,a:180},{v:50,a:210},{v:55,a:240}];
    var selVal=lmode==="h"?lh:lm;
    var selAngle=null;
    nums.forEach(function(n){
      var rad=n.a*Math.PI/180;
      var rr=n.inner?ri:r*0.82;
      var x=cx+rr*Math.cos(rad),y=cy+rr*Math.sin(rad);
      var isSel=(n.v===selVal);
      if(isSel)selAngle={x:x,y:y};
      ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);
      ctx.fillStyle=isSel?"#4fa8ff":"transparent";ctx.fill();
      ctx.font=(isSel?"600 ":"400 ")+"14px system-ui";
      ctx.fillStyle=isSel?"#000":"#cfcfcf";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(String(n.v).padStart(2,"0"),x,y);
    });
    if(selAngle){
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(selAngle.x,selAngle.y);
      ctx.strokeStyle="#4fa8ff";ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fillStyle="#4fa8ff";ctx.fill();
    }
    var disp=ov.querySelector("#cl-display");
    if(disp)disp.textContent=String(lh).padStart(2,"0")+":"+String(lm).padStart(2,"0");
  }
  drawClock();
  function setMode(m){
    lmode=m;
    ov.querySelector("#cl-mode-h").style.background=m==="h"?"#1c3c5a":"none";
    ov.querySelector("#cl-mode-h").style.color=m==="h"?"#4fa8ff":"#5c5c5c";
    ov.querySelector("#cl-mode-m").style.background=m==="m"?"#1c3c5a":"none";
    ov.querySelector("#cl-mode-m").style.color=m==="m"?"#4fa8ff":"#5c5c5c";
    drawClock();
  }
  ov.querySelector("#cl-mode-h").onclick=function(){setMode("h");};
  ov.querySelector("#cl-mode-m").onclick=function(){setMode("m");};
  function pickFromEvent(e){
    var rect=canvas.getBoundingClientRect();
    var cx2=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    var cy2=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    var scaleX=sz/rect.width,scaleY=sz/rect.height;
    var px=cx2*scaleX-cx,py=cy2*scaleY-cy;
    var dist=Math.sqrt(px*px+py*py);
    var angle=Math.atan2(py,px)*180/Math.PI+90;if(angle<0)angle+=360;
    if(lmode==="h"){
      var inner=dist<(ri+r*0.82)/2;
      var h=Math.round(angle/30)%12;
      lh=inner?(h===0?0:h+12):(h===0?12:h);
    }else{lm=Math.round(angle/6)%60;}
    drawClock();
  }
  canvas.addEventListener("click",pickFromEvent);
  canvas.addEventListener("touchend",function(e){e.preventDefault();pickFromEvent({clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY});},{passive:false});
  ov.querySelector("#cl-clear").onclick=function(){lh=0;lm=0;drawClock();};
  ov.querySelector("#cl-cancel").onclick=function(){ov.remove();};
  ov.querySelector("#cl-set").onclick=function(){ov.remove();if(onSet)onSet(lh,lm);};
}

function formatTidpunkt(val){
  // Remove all non-digits
  var digits=val.replace(/\D/g,"");
  if(!digits)return "";
  // Pad to 4 digits with zeros
  while(digits.length<4)digits=digits+"0";
  digits=digits.slice(0,4);
  return digits.slice(0,2)+":"+digits.slice(2,4);
}

function bindTidpunktInp(inp){
  if(!inp)return;
  inp.onblur=function(){
    if(inp.value.trim())inp.value=formatTidpunkt(inp.value);
  };
  inp.onkeydown=function(e){
    if(e.key==="Enter"&&inp.value.trim())inp.value=formatTidpunkt(inp.value);
  };
}

  var openClockBtn=c.querySelector("#open-clock-btn");
  if(openClockBtn)openClockBtn.onclick=function(){
    showClockOverlayFor(clockH,clockM,function(h,m){
      clockH=h;clockM=m;updateTidFromInputs();
      var tinp=c.querySelector("#tidslangd-inp");
      if(tinp)tinp.value=clockH>0||clockM>0?clockH+"h "+clockM+"m":"";
    });
  };

  // Image handler (shared for both file and camera)
  function handleImageFiles(files){
    if(!files||!files.length)return;
    files=Array.from(files);
    pendingImgs=new Array(files.length);
    var prev=c.querySelector("#imgpreview");
    if(prev)prev.innerHTML="";
    var loaded=0;
    files.forEach(function(file,fi){
      var reader=new FileReader();
      reader.onload=function(e){
        var dataUrl=e.target.result;
        pendingImgs[fi]={base64:dataUrl.split(",")[1],mtype:file.type||"image/jpeg"};
        loaded++;
        if(prev){
          var img=document.createElement("img");
          img.src=dataUrl;
          img.style.cssText="width:100%;border-radius:10px;margin-bottom:6px;max-height:160px;object-fit:cover;display:block";
          prev.appendChild(img);
        }
        if(loaded===files.length){
          pendingImgBase64=pendingImgs[0].base64;
          pendingImgType=pendingImgs[0].mtype;
          var imgForm=c.querySelector("#imgonly-form");
          if(imgForm)imgForm.style.display="block";
          var rb=document.createElement("button");
          rb.style.cssText="font-size:11px;color:#d97a83;background:none;border:none;cursor:pointer;margin-bottom:8px;display:block";
          rb.textContent="✕ Ta bort "+(files.length>1?files.length+" bilder":"bild");
          rb.onclick=function(){
            pendingImgBase64=null;pendingImgType=null;pendingImgs=[];
            if(prev)prev.innerHTML="";
            var imgForm2=c.querySelector("#imgonly-form");
            if(imgForm2)imgForm2.style.display="none";
            var fi2=c.querySelector("#imgfile");if(fi2)fi2.value="";
            var fc=c.querySelector("#imgfile-cam");if(fc)fc.value="";
          };
          if(prev)prev.appendChild(rb);
        }
      };
      reader.readAsDataURL(file);
    });
  }

  // Image preview (multi)
  var imgfile=c.querySelector("#imgfile");
  if(imgfile)imgfile.onchange=function(){if(imgfile.files&&imgfile.files.length)handleImageFiles(imgfile.files);};
  var imgfileCam=c.querySelector("#imgfile-cam");
  if(imgfileCam)imgfileCam.onchange=function(){if(imgfileCam.files&&imgfileCam.files.length)handleImageFiles(imgfileCam.files);};

  // Camera via getUserMedia
  var cameraStream=null;
  var openCamBtn=c.querySelector("#open-camera-btn");
  var closeCamBtn=c.querySelector("#close-camera-btn");
  var snapBtn=c.querySelector("#snap-btn");
  var camContainer=c.querySelector("#camera-container");
  var camVideo=c.querySelector("#camera-video");
  var snapCanvas=c.querySelector("#snap-canvas");

  function stopCamera(){
    if(cameraStream){cameraStream.getTracks().forEach(function(t){t.stop();});cameraStream=null;}
    if(camContainer)camContainer.style.display="none";
  }

  if(openCamBtn){
    openCamBtn.onclick=function(){
      if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
        alert("Kameran stöds inte i denna webbläsare.");return;
      }
      navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false})
        .then(function(stream){
          cameraStream=stream;
          if(camVideo){camVideo.srcObject=stream;}
          if(camContainer)camContainer.style.display="block";
        })
        .catch(function(){
          navigator.mediaDevices.getUserMedia({video:true,audio:false})
            .then(function(stream){
              cameraStream=stream;
              if(camVideo){camVideo.srcObject=stream;}
              if(camContainer)camContainer.style.display="block";
            })
            .catch(function(e){alert("Kunde inte starta kameran: "+e.message);});
        });
    };
  }

  if(closeCamBtn)closeCamBtn.onclick=stopCamera;

  if(snapBtn){
    snapBtn.onclick=function(){
      if(!camVideo||!snapCanvas)return;
      snapCanvas.width=camVideo.videoWidth;
      snapCanvas.height=camVideo.videoHeight;
      snapCanvas.getContext("2d").drawImage(camVideo,0,0);
      snapCanvas.toBlob(function(blob){
        stopCamera();
        var file=new File([blob],"kamera-foto.jpg",{type:"image/jpeg"});
        handleImageFiles([file]);
      },"image/jpeg",0.92);
    };
  }

  var saveImgOnly=c.querySelector("#saveimgonly");
  if(saveImgOnly){
    saveImgOnly.onclick=async function(){
      var imgs=pendingImgs&&pendingImgs.length?pendingImgs:(pendingImgBase64?[{base64:pendingImgBase64,mtype:pendingImgType||"image/jpeg"}]:[]);
      if(!imgs.length)return;
      var titleInput=c.querySelector("#imgonly-title");
      var titleVal=titleInput?titleInput.value.trim():"";
      var ciVal=c.querySelector("#ci")?c.querySelector("#ci").value.trim():"";
      var baseTitle=titleVal||ciVal||"Bild";
      var now=Date.now();
      var newImgs=imgs.map(function(img,i){
        var title=imgs.length===1?baseTitle:baseTitle+" ("+(i+1)+")";
        return {id:now+i,logId:null,activity:title,category:cat,base64:img.base64,mtype:img.mtype,timestamp:new Date(now+i).toISOString(),driveId:null};
      });
      newImgs.forEach(function(newImg){imageHist.unshift(newImg);});
      pendingImgBase64=null;pendingImgType=null;pendingImgs=[];
      saveAndSync("aktiviteter");
      var fz=c.querySelector("#fz");
      if(fz){fz.innerHTML="<div class='ok-toast'>"+(imgs.length>1?imgs.length+" bilder sparade!":"Bild sparad!")+"</div>";setTimeout(function(){if(fz)fz.innerHTML="";},2200);}
      renderLogAktivitet();
      if(accessToken){
        var failCount=0;
        for(var k=0;k<newImgs.length;k++){
          var ok=await saveImageToDrive(newImgs[k]);
          if(!ok)failCount++;
        }
        await saveAndSync("bilder");
        if(failCount>0){
          var fz2=document.getElementById("fz");
          if(fz2)fz2.innerHTML="<div class='ok-toast' style='background:#4a1a1a;border-color:#d97a83;color:#d97a83'>⚠️ "+failCount+" av "+newImgs.length+" bilder kunde inte laddas upp till Drive</div>";
        }
      }
    };
  }
}

async function addAct(activity){
  var ni=document.querySelector("#ni");
  var ti=document.querySelector("#ti");
  var pi=document.querySelector("#pi");
  var tidpunktInp=document.querySelector("#tidpunkt-inp");
  var tp=buildLogTimestamp(tidpunktInp?tidpunktInp.value:"");
  if(!tp.ok){
    showInfoPopup("Ogiltig tidpunkt",tp.message);
    return;
  }
  var hh=String(tp.date.getHours()).padStart(2,"0");
  var mm=String(tp.date.getMinutes()).padStart(2,"0");
  if(tidpunktInp)tidpunktInp.value=hh+":"+mm;
  var durationPart="";
  if(ti&&ti.value.indexOf(" | ")>-1)durationPart=ti.value.split(" | ").slice(1).join(" | ");
  var timeStr=hh+":"+mm+(durationPart?(" | "+durationPart):"");
  if(ti)ti.value=timeStr;
  var logId=Date.now();
  logs.unshift({id:logId,category:cat,activity:activity,time:timeStr,place:pi?pi.value.trim():"",note:ni?ni.value.trim():"",timestamp:tp.date.toISOString()});
  var inmatningChanged=false;
  var newAktHist=pushInmatningHistory(aktivitetHistory,activity);
  if(newAktHist!==aktivitetHistory){aktivitetHistory=newAktHist;inmatningChanged=true;}
  if(pi&&pi.value.trim()){platsHistory=pushInmatningHistory(platsHistory,pi.value.trim());inmatningChanged=true;}
  if(ni&&ni.value.trim()){anteckningHistory=pushInmatningHistory(anteckningHistory,ni.value.trim());inmatningChanged=true;}
  if(inmatningChanged)saveAndSync("inmatningar");
  // Save all pending images (not just the first one)
  var imgs=pendingImgs&&pendingImgs.length?pendingImgs:(pendingImgBase64?[{base64:pendingImgBase64,mtype:pendingImgType||"image/jpeg"}]:[]);
  if(imgs.length){
    var now=Date.now();
    var newImgs=imgs.map(function(img,i){
      var imgTitle=imgs.length===1?activity:activity+" ("+(i+1)+")";
      return {id:now+i+1,logId:logId,activity:imgTitle,base64:img.base64,mtype:img.mtype||"image/jpeg",timestamp:new Date(now+i).toISOString(),driveId:null};
    });
    newImgs.forEach(function(newImg){imageHist.unshift(newImg);});
    pendingImgBase64=null;pendingImgType=null;pendingImgs=[];
    saveAndSync("aktiviteter");hdr();
    updateHandelser(null);
    var fz0=document.getElementById("fz");
    if(fz0){fz0.innerHTML="<div class='ok-toast'>Loggad: "+esc(activity)+"</div>";setTimeout(function(){if(fz0)fz0.innerHTML="";},2200);}
    resetLogForm();
    // Upload images one at a time (not in parallel) to avoid Drive folder-creation race conditions
    if(accessToken){
      var failCount=0;
      for(var k=0;k<newImgs.length;k++){
        var ok=await saveImageToDrive(newImgs[k]);
        if(!ok)failCount++;
      }
      await saveAndSync("bilder");
      if(failCount>0){
        var fz1=document.getElementById("fz");
        if(fz1)fz1.innerHTML="<div class='ok-toast' style='background:#4a1a1a;border-color:#d97a83;color:#d97a83'>⚠️ "+failCount+" av "+newImgs.length+" bilder kunde inte laddas upp till Drive</div>";
      }
    }
    return;
  }
  saveAndSync("aktiviteter");hdr();
  updateHandelser(null);
  var fz=document.getElementById("fz");
  if(fz){fz.innerHTML="<div class='ok-toast'>Loggad: "+esc(activity)+"</div>";setTimeout(function(){if(fz)fz.innerHTML="";},2200);}
  resetLogForm();
}

async function doFetchChatSynonymer(word){

  var sys='Du ar en sprakexpert. Ge synonymer och liknande uttryck pa svenska. Svara BARA med giltig JSON utan backticks: {"groups":[{"label":"Vanliga synonymer","words":["...","...","..."]},{"label":"Mer formella","words":["...","...","..."]},{"label":"Mer informella","words":["...","...","..."]}]} Ge 4-6 ord per grupp.';
  try{
    var res=await aiCall(sys,"Hitta synonymer för: "+word,800);
    var data=await res.json();
    var parsed=JSON.parse(aiText(data).replace(/```json|```/g,"").trim());
    synResult={id:Date.now(),word:word,groups:parsed.groups||[],timestamp:new Date().toISOString()};
    synHist=[synResult].concat(synHist).slice(0,20);saveAndSync("text");
  }catch(e){
    synResult={id:Date.now(),word:word,timestamp:new Date().toISOString(),groups:[{label:"Fel",words:["Kunde inte hämta synonymer. Försök igen."]}]};
  }
  synLoading=false;renderLogSkickade();
}

async function doImportBild(file,conv,person){
  imgProcessing=true;renderLogSkickade();
  try{
    var dataUrl=await new Promise(function(res,rej){
      var r=new FileReader();
      r.onload=function(){res(r.result);};
      r.onerror=function(){rej(new Error("Filfel"));};
      r.readAsDataURL(file);
    });
    var personName=person?person.name:"Den andra personen";
    var prompt='Las av alla meddelanden i denna konversationsbild. Returnera ENBART ett JSON-objekt i detta exakta format, ingen annan text:\n{"messages":[{"sender":"me","text":"meddelande"},{"sender":"them","text":"meddelande"}]}\n\nAnvand "me" for den som ager telefonen och "them" for '+personName+'. Kronologisk ordning.';
    var res=await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      model:"anthropic/claude-sonnet-4.6",
      max_tokens:4000,
      messages:[{role:"user",content:[
        {type:"image_url",image_url:{url:dataUrl}},
        {type:"text",text:prompt}
      ]}]
    })});
    var data=await res.json();
    if(data.error)throw new Error(JSON.stringify(data.error));
    var raw=aiText(data)||"";
    // Extract JSON — find first { to last }
    var start=raw.indexOf("{");
    var end=raw.lastIndexOf("}");
    if(start===-1||end===-1)throw new Error("Inget JSON i svaret: "+raw.slice(0,200));
    var parsed=JSON.parse(raw.slice(start,end+1));
    var messages=parsed.messages||[];
    if(!messages.length)throw new Error("Inga meddelanden hittades.");
    var now=Date.now();
    messages.forEach(function(m,i){
      var sender=m.sender==="me"?"me":"them";
      sentMsgs.push({id:String(now+i),convId:conv.id,sender:sender,text:m.text,timestamp:new Date(now+i).toISOString()});
    });
    saveAndSync("samtal");
  }catch(e){
    var c=document.getElementById("body");
    if(c){
      var errDiv=document.createElement("div");

async function doAnalyseSkrivstil(scope){
  skrivAnalysScope=scope;skrivAnalysLoading=true;skrivAnalysResult=null;renderLogSkickade();

  if(scope==="muntlig"){
    // Analyse muntlig conversation — all messages as dialogue
    var conv=sentConvs.find(function(cv){return cv.id===activeConvId;});
    var person=sentPeople.find(function(p){return p.id===(conv?conv.personId:null);});
    var msgs=sentMsgs.filter(function(m){return m.convId===activeConvId;}).sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
    if(!msgs.length){skrivAnalysResult="Inga meddelanden att analysera.";skrivAnalysLoading=false;renderLogSkickade();return;}
    var dialogue=msgs.map(function(m){return (m.sender==="me"?"Jag":(person?person.name:"Personen"))+": "+m.text;}).join("\n\n");
    var sys="Du är en samtalsanalytiker. Analysera detta muntliga samtal och ge insikter på svenska om: huvudämnen som diskuterades, känslotoner och stämning, viktiga punkter eller beslut, dynamiken mellan parterna, och eventuella mönster eller teman. Var konkret och insiktsfull. Max 200 ord.";
    try{
      var res=await aiCall(sys,"Här är samtalet att analysera:\n\n"+dialogue,1000);
      var data=await res.json();
      skrivAnalysResult=aiText(data)||"Kunde inte analysera. Försök igen.";
    }catch(e){skrivAnalysResult="Något gick fel. Försök igen.";}
    skrivAnalysLoading=false;renderLogSkickade();
    return;
  }

  // Skrivstilsanalys (existing)
  var myMsgs;
  if(scope==="conv"){
    myMsgs=sentMsgs.filter(function(m){return m.convId===activeConvId&&m.sender==="me";});
  }else{
    var convIds=sentConvs.filter(function(cv){return cv.personId===activePersonId;}).map(function(cv){return cv.id;});
    myMsgs=sentMsgs.filter(function(m){return convIds.indexOf(m.convId)!==-1&&m.sender==="me";});
  }
  if(!myMsgs.length){skrivAnalysResult="Inga av dina egna meddelanden hittades att analysera.";skrivAnalysLoading=false;renderLogSkickade();return;}
  var sample=myMsgs.slice(0,20).map(function(m,i){return (i+1)+". "+m.text;}).join("\n\n");
  var sys="Du ar en sprakanalytiker. Analysera personens skrivstil baserat pa deras meddelanden. Beskriv tonfall, ordval, meningslangd, vanliga uttryck och monster. Ge konkreta, konstruktiva observationer pa svenska. Hall det kort - max 150 ord.";
  try{
    var res=await aiCall(sys,"Hars meddelandena att analysera:\n\n"+sample,800);
    var data=await res.json();
    skrivAnalysResult=aiText(data)||"Kunde inte analysera. Forsok igen.";
  }catch(e){skrivAnalysResult="Nagot gick fel. Forsok igen.";}
  skrivAnalysLoading=false;renderLogSkickade();
}
