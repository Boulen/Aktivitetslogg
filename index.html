function importJson(file){
  var st=document.getElementById("importstatus");
  if(st)st.innerHTML="<div style='color:#6b6880;font-size:13px;margin-top:8px;text-align:center'>Importerar...</div>";
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data||typeof data!=="object"){throw new Error("Ogiltig fil");}
      function mergeArr(a,b){
        var map=new Map();
        (a||[]).concat(b||[]).forEach(function(x){map.set(String(x.id||x.timestamp),x);});
        return Array.from(map.values()).sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});
      }
      logs=mergeArr(logs,data.logs);
      kHist=mergeArr(kHist,data.kHist);
      sHist=mergeArr(sHist,data.sHist);
      oHist=mergeArr(oHist,data.oHist);
      fHist=mergeArr(fHist,data.fHist);
      tHist=mergeArr(tHist,data.tHist);
      synHist=mergeArr(synHist,data.synHist);
      sentMsgs=mergeArr(sentMsgs,data.sentMsgs);
      sentPeople=mergeArr(sentPeople,data.sentPeople);
      sentConvs=mergeArr(sentConvs,data.sentConvs);
      fundHist=mergeArr(fundHist,data.fundHist);
      var count=logs.length+fundHist.length+sentConvs.length;
      if(st)st.innerHTML="<div style='color:#4ade80;font-size:13px;margin-top:8px;text-align:center'>✓ Import klar — "+count+" poster inladdade.</div>";
    }catch(err){
      if(st)st.innerHTML="<div style='color:#f87171;font-size:13px;margin-top:8px;text-align:center'>Fel: "+esc(err.message)+". Kontrollera att filen ar en giltig JSON-backup.</div>";
    }
  };
  reader.onerror=function(){if(st)st.innerHTML="<div style='color:#f87171;font-size:13px;margin-top:8px'>Kunde inte lasa filen.</div>";};
  reader.readAsText(file);
}

function exportMediaCsv(){
  var MEDIA_CAT_LABELS={bok:"Bok",musik:"Musik",film:"Film",serie:"Serie",podcast:"Podcast",videodelning:"Videodelning",spel:"Spel",ovrigt:"Ovrigt"};
  var allCats=["bok","musik","film","serie","podcast","videodelning","spel","ovrigt"];
  var sections=allCats.map(function(k){
    var items=(mediaList[k]||[]).map(function(j){
      var title=mediaItemTitle(j),creator=mediaItemCreator(j);
      return '"'+title.replace(/"/g,'""')+'","'+creator.replace(/"/g,'""')+'"';
    }).join(",\n");
    return "-> \""+MEDIA_CAT_LABELS[k]+"\":\n"+(items||"");
  });
  var csv=sections.join("\n\n");
  // Always add FÄRDIGA section with all categories
  var fardigSections={};
  (mediaFardig||[]).forEach(function(e){
    if(!fardigSections[e.cat])fardigSections[e.cat]=[];
    fardigSections[e.cat].push(e);
  });
  csv+="\n\n->FÄRDIGA<-";
  allCats.forEach(function(k){
    var entries=fardigSections[k]||[];
    csv+="\n\n-> \""+MEDIA_CAT_LABELS[k]+"\":\n";
    if(entries.length){
      csv+=entries.map(function(e){
        return '"'+e.title.replace(/"/g,'""')+'","'+(e.creator||"").replace(/"/g,'""')+'", betyg:'+e.rating+(e.comment?', kommentar:"'+e.comment.replace(/"/g,'""')+'"':"");
      }).join(",\n");
    }
  });
  var blob=new Blob(["\uFEFF"+csv.trim()],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="media-"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importMediaCsv(file,cat){
  var st=document.getElementById("mediastatus");
  if(st)st.innerHTML="<div style='color:#6b6880;font-size:13px;margin-top:8px'>Importerar...</div>";
  var CAT_MAP={"Bok":"bok","Musik":"musik","Film":"film","Serie":"serie","Podcast":"podcast","Videodelning":"videodelning","Spel":"spel","Ovrigt":"ovrigt","Övrigt":"ovrigt"};
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=e.target.result.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");

      // Split into pending and fardig sections at ->FÄRDIGA<-
      var fardigSplit=text.split("->FÄRDIGA<-");
      var pendingText=fardigSplit[0];
      var fardigText=fardigSplit.length>1?fardigSplit[1]:"";

      function parseSections(txt){
        // Find all -> "Kategori": blocks
        var result={};
        var regex=/-> "([^"]+)":\n([\s\S]*?)(?=\n-> "|$)/g;
        var m;
        while((m=regex.exec(txt))!==null){
          var catName=m[1].trim();
          var catKey=CAT_MAP[catName];
          if(!catKey)continue;
          var raw=m[2].trim();
          var items=[];
          if(raw){
            // Each line: "Title","Creator" (creator optional, may be empty or missing entirely for old exports)
            raw.split(/\n/).forEach(function(line){
              line=line.trim().replace(/,$/,"");
              if(!line)return;
              var titleM=line.match(/^"((?:[^"\\]|\\.)*)"/);
              if(!titleM){
                // Fallback: plain unquoted line (old format)
                items.push({title:line.replace(/^,|,$/g,"").trim(),creator:""});
                return;
              }
              var title=titleM[1].replace(/""/g,'"');
              var rest=line.slice(titleM[0].length).replace(/^,/,"");
              var creatorM=rest.match(/^"((?:[^"\\]|\\.)*)"/);
              var creator=creatorM?creatorM[1].replace(/""/g,'"'):"";
              items.push({title:title,creator:creator});
            });
          }
          result[catKey]=items;
        }
        return result;
      }

      // Parse pending
      var newMedia={bok:[],musik:[],film:[],serie:[],podcast:[],videodelning:[],spel:[],ovrigt:[]};
      var parsed=parseSections(pendingText);
      Object.keys(parsed).forEach(function(k){newMedia[k]=parsed[k];});
      mediaList=newMedia;

      // Parse FÄRDIGA if present
      if(fardigText){
        var newFardig=[];
        var fregex=/-> "([^"]+)":\n([\s\S]*?)(?=\n-> "|$)/g;
        var fm;
        while((fm=fregex.exec(fardigText))!==null){
          var catName=fm[1].trim();
          var catKey=CAT_MAP[catName];
          if(!catKey)continue;
          fm[2].trim().split(/,?\n/).forEach(function(line){
            line=line.trim();
            if(!line)return;
            // Format: "Titel","Kreatör", betyg:N, kommentar:"..."
            var titleM=line.match(/^"((?:[^"\\]|\\.)*)"/);
            if(!titleM)return;
            var title=titleM[1].replace(/""/g,'"');
            var rest=line.slice(titleM[0].length).replace(/^,/,"");
            var creatorM=rest.match(/^"((?:[^"\\]|\\.)*)"/);
            var creator=creatorM?creatorM[1].replace(/""/g,'"'):"";
            var ratingM=line.match(/betyg:(\d)/);
            var commentM=line.match(/kommentar:"((?:[^"\\]|\\.)*)"/);
            newFardig.push({
              title:title,cat:catKey,creator:creator,
              rating:ratingM?parseInt(ratingM[1]):0,
              comment:commentM?commentM[1]:"",
              timestamp:new Date().toISOString()
            });
          });
        }
        mediaFardig=newFardig;
      }

      saveAndSync("media");
      var totalPending=Object.values(newMedia).reduce(function(s,a){return s+a.length;},0);
      if(st)st.innerHTML="<div style='color:#4ade80;font-size:13px;margin-top:8px'>✓ "+totalPending+" att konsumera, "+(fardigText?mediaFardig.length:0)+" färdiga inladdade.</div>";
    }catch(err){
      if(st)st.innerHTML="<div style='color:#f87171;font-size:13px;margin-top:8px'>Fel: "+esc(err.message)+"</div>";
    }
  };
  reader.readAsText(file,"UTF-8");
}

function downloadAllImages(){
  if(!imageHist.length){alert("Inga bilder att ladda ner.");return;}
  imageHist.forEach(function(img,idx){
    var d=new Date(img.timestamp);
    var yy=String(d.getFullYear()).slice(-2);
    var mm=String(d.getMonth()+1).padStart(2,"0");
    var dd=String(d.getDate()).padStart(2,"0");
    var title=img.activity||"bild";
    var fname=yy+"-"+mm+"-"+dd+(title?", "+title:"");
    // Convert to JPEG via canvas if needed
    var dataUrl="data:"+(img.mtype||"image/jpeg")+";base64,"+img.base64;
    var canvas=document.createElement("canvas");
    var image=new Image();
    image.onload=function(){
      canvas.width=image.width;canvas.height=image.height;
      var ctx=canvas.getContext("2d");
      ctx.fillStyle="#ffffff";ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(image,0,0);
      var jpegUrl=canvas.toDataURL("image/jpeg",0.92);
      var a=document.createElement("a");
      a.href=jpegUrl;a.download=fname+".jpg";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    };
    image.src=dataUrl;
  });
}

function exportCsv(){
  if(!savedJokes.length){alert("Inga sparade skämt att exportera.");return;}
  var csv=savedJokes.map(function(j){return '"'+j.replace(/"/g,'""')+'"';}).join(",\n");
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="skamt-"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importCsv(file){
  var st=document.getElementById("csvstatus");
  if(st)st.innerHTML="<div style='color:#6b6880;font-size:13px;margin-top:8px'>Importerar...</div>";
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=e.target.result.replace(/^\uFEFF/,"");
      // Split on ",\n" separator
      var jokes=text.split(",\n").map(function(l){return l.trim().replace(/^"|"$/g,"").replace(/""/g,'"');}).filter(function(l){return l.length>0;});
      if(!jokes.length)throw new Error("Inga skämt hittades i filen.");
      savedJokes=jokes;saveAndSync("tips");
      if(st)st.innerHTML="<div style='color:#4ade80;font-size:13px;margin-top:8px'>✓ "+jokes.length+" skämt inladdade.</div>";
    }catch(err){
      if(st)st.innerHTML="<div style='color:#f87171;font-size:13px;margin-top:8px'>Fel: "+esc(err.message)+"</div>";
    }
  };
  reader.readAsText(file,"UTF-8");
}

function exportJsonMonth(monthKey){
  var parts=monthKey.split("-");
  var year=parseInt(parts[0]),month=parseInt(parts[1])-1;
  var start=new Date(year,month,1);
  var end=new Date(year,month+1,0,23,59,59,999);
  var inMonth=function(ts){var d=new Date(ts);return d>=start&&d<=end;};
  var MONTHS=["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"];

  var data={
    version:1,
    period:MONTHS[month]+" "+year,
    exportedAt:new Date().toISOString(),
    logs:logs.filter(function(l){return inMonth(l.timestamp);}),
    fundHist:fundHist.filter(function(f){return inMonth(f.timestamp);}),
    sentConvs:sentConvs.filter(function(cv){return inMonth(cv.timestamp);}),
    sentMsgs:sentMsgs.filter(function(m){
      var cv=sentConvs.find(function(c){return c.id===m.convId;});
      return cv&&inMonth(cv.timestamp);
    }),
    sentPeople:sentPeople
  };

  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="ai-assistent-"+monthKey+".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportPdf(monthKey){
  var parts=monthKey.split("-");
  var year=parseInt(parts[0]),month=parseInt(parts[1])-1;
  var MONTHS=["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"];
  var DAYS=["Sondag","Mandag","Tisdag","Onsdag","Torsdag","Fredag","Lordag"];
  var monthName=MONTHS[month]+" "+year;

  var start=new Date(year,month,1);
  var end=new Date(year,month+1,0,23,59,59,999);

  var inMonth=function(ts){var d=new Date(ts);return d>=start&&d<=end;};

  var monthLogs=logs.filter(function(l){return inMonth(l.timestamp);})
    .sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
  var monthFund=fundHist.filter(function(f){return inMonth(f.timestamp);})
    .sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
  var monthConvs=sentConvs.filter(function(cv){return inMonth(cv.timestamp);})
    .sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<title>AI-Assistent - '+monthName+'</title>'
    +'<style>'
    +'body{font-family:Arial,sans-serif;max-width:800px;margin:0 auto;padding:32px;color:#1a1a1a;line-height:1.6;}'
    +'h1{font-size:26px;font-weight:700;border-bottom:3px solid #1a1a1a;padding-bottom:10px;margin-bottom:8px;}'
    +'.meta{font-size:13px;color:#666;margin-bottom:32px;}'
    +'h2{font-size:18px;font-weight:700;margin:32px 0 12px;padding:8px 12px;background:#f0f0f0;border-left:4px solid #1a1a1a;}'
    +'h3{font-size:14px;font-weight:700;margin:16px 0 4px;color:#333;}'
    +'.entry{padding:10px 0;border-bottom:1px solid #e0e0e0;}'
    +'.entry:last-child{border-bottom:none;}'
    +'.timestamp{font-size:11px;color:#888;margin-bottom:2px;}'
    +'.title{font-size:14px;font-weight:600;}'
    +'.note{font-size:13px;color:#555;margin-top:2px;}'
    +'.tag{display:inline-block;padding:2px 8px;border-radius:20px;background:#e8e8e8;font-size:11px;font-weight:600;margin-right:4px;}'
    +'.bubble-me{background:#d4edff;padding:6px 10px;border-radius:8px;margin:4px 0;font-size:13px;}'
    +'.bubble-them{background:#f0f0f0;padding:6px 10px;border-radius:8px;margin:4px 0;font-size:13px;}'
    +'.sender{font-size:11px;font-weight:600;color:#555;margin-bottom:2px;}'
    +'.fund-text{font-size:14px;white-space:pre-wrap;}'
    +'@media print{body{padding:16px;}h2{break-before:auto;}}'
    +'</style></head><body>';

  html+='<h1>AI-Assistent</h1><div class="meta">Export for '+monthName+' &nbsp;|&nbsp; Skapad '+new Date().toLocaleDateString("sv-SE")+'</div>';

  // AKTIVITETER
  if(monthLogs.length){
    html+='<h2>Aktiviteter ('+monthLogs.length+')</h2>';
    // Group by day
    var byDay={};
    monthLogs.forEach(function(l){
      var d=new Date(l.timestamp);
      var dk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
      if(!byDay[dk])byDay[dk]={date:d,items:[]};
      byDay[dk].items.push(l);
    });
    Object.keys(byDay).sort().forEach(function(dk){
      var dd=byDay[dk];
      html+='<h3>'+DAYS[dd.date.getDay()]+' '+dd.date.getDate()+' '+MONTHS[dd.date.getMonth()]+'</h3>';
      dd.items.forEach(function(l){
        var ct=CATS.find(function(c){return c.id===l.category;});
        html+='<div class="entry">'
          +'<div class="timestamp">'+new Date(l.timestamp).toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"})+(l.time?' &middot; '+esc(l.time):'')+'</div>'
          +'<div class="title">'+getCatEmoji(l.category)+' '+esc(l.activity)+'</div>'
          +(l.note?'<div class="note">'+esc(l.note)+'</div>':'')
          +'</div>';
      });
    });
  }

  // FUNDERINGAR
  if(monthFund.length){
    html+='<h2>Funderingar ('+monthFund.length+')</h2>';
    var byDayF={};
    monthFund.forEach(function(f){
      var d=new Date(f.timestamp);
      var dk=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
      if(!byDayF[dk])byDayF[dk]={date:d,items:[]};
      byDayF[dk].items.push(f);
    });
    Object.keys(byDayF).sort().forEach(function(dk){
      var dd=byDayF[dk];
      html+='<h3>'+DAYS[dd.date.getDay()]+' '+dd.date.getDate()+' '+MONTHS[dd.date.getMonth()]+'</h3>';
      dd.items.forEach(function(f){
        html+='<div class="entry">'
          +'<div class="timestamp">'+new Date(f.timestamp).toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"})+'</div>'
          +'<div class="fund-text">'+esc(f.text)+'</div>'
          +'</div>';
      });
    });
  }

  // SAMTAL
  if(monthConvs.length){
    html+='<h2>Samtal ('+monthConvs.length+')</h2>';
    monthConvs.forEach(function(cv){
      var person=sentPeople.find(function(p){return p.id===cv.personId;});
      var msgs=sentMsgs.filter(function(m){return m.convId===cv.id;})
        .sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
      html+='<div class="entry"><h3>'+esc(cv.title)+(person?' &mdash; '+esc(person.name):'')+'<span class="tag" style="margin-left:8px">'+(cv.type||"skrivande")+'</span></h3>';
      msgs.forEach(function(m){
        var who=m.sender==="me"?"Jag":(person?person.name:"De");
        var cls=m.sender==="me"?"bubble-me":"bubble-them";
        html+='<div class="sender">'+esc(who)+'</div><div class="'+cls+'">'+esc(m.text)+'</div>';
      });
      html+='</div>';
    });
  }

  if(!monthLogs.length&&!monthFund.length&&!monthConvs.length){
    html+='<p style="color:#888;padding:32px 0">Inga inlagg for '+monthName+'.</p>';
  }

  html+='</body></html>';

  // Open in new window and print
  var win=window.open("","_blank");
  win.document.write(html);
  win.document.close();
  win.onload=function(){win.focus();win.print();};
}
