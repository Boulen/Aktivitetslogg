<script>

  serie:["Action","Komedi","Drama","Thriller","Anime","Dokusapa"],

};

var accessToken=null, userInfo=null, driveFileId=null;
var logs=[], kHist=[], sHist=[], oHist=[], fHist=[], tHist=[];
var view="log", cat="traning", tipText="", tipsLoading=false;

var sCtx="Van", sResult=null, sLoading=false, sDraft="", sMyCtx="";
var oCtx="Van", oTone="Vanlig", oResult=null, oLoading=false, oDraft="";
var fResult=null, fLoading=false, fDraft="";

function fd(iso){
  return new Date(iso).toLocaleDateString("sv-SE",{weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
}
function esc(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function copyText(txt){
  if(navigator.clipboard){navigator.clipboard.writeText(txt).catch(function(){});}
  else{var t=document.createElement("textarea");t.value=txt;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}
}
function showCopyOk(id){
  var ok=document.getElementById(id);
  if(ok){ok.classList.add("vis");setTimeout(function(){ok.classList.remove("vis");},2000);}
}
function spin(){
  return "<div style='text-align:center;padding:60px 0'><div class='spnr'></div><div style='color:#6b6880;font-size:13px;margin-top:14px'>Arbetar...</div></div>";
}

function loadLocal(){
  try{
    var d=JSON.parse(localStorage.getItem("akt_data")||"{}");
    logs=d.logs||[]; kHist=d.kHist||[]; sHist=d.sHist||[]; oHist=d.oHist||[]; fHist=d.fHist||[]; tHist=d.tHist||[];
    driveFileId=localStorage.getItem("drive_fid")||null;
    var ui=localStorage.getItem("user_info");
    if(ui)userInfo=JSON.parse(ui);
  }catch(e){}
}
function saveLocal(){
  try{
    localStorage.setItem("akt_data",JSON.stringify({logs:logs,kHist:kHist,sHist:sHist,oHist:oHist,fHist:fHist,tHist:tHist}));
  }catch(e){}
}

function startLogin(){
  var params=new URLSearchParams({
    client_id:CLIENT_ID,redirect_uri:REDIRECT_URI,response_type:"token",
    scope:SCOPE,include_granted_scopes:"true",prompt:"select_account"
  });
  location.href="https://accounts.google.com/o/oauth2/v2/auth?"+params.toString();
}

async function init(){
  loadLocal();
  var savedToken=localStorage.getItem("akt_token");
  var tokenTime=parseInt(localStorage.getItem("token_time")||"0");
  if(savedToken&&(Date.now()-tokenTime)<55*60*1000){
    accessToken=savedToken;
    var ok=await checkToken();
    if(ok){
      if(!userInfo)await fetchUserInfo();
      showApp();syncNow();return;
    }
  }
  localStorage.removeItem("akt_token");localStorage.removeItem("token_time");
  var dbg=document.getElementById("debug-msg");
  if(dbg)dbg.textContent="Redirect URI: "+REDIRECT_URI;
  showLogin();
}

async function checkToken(){
  try{
    var r=await fetch("https://www.googleapis.com/oauth2/v3/tokeninfo?access_token="+accessToken);
    var d=await r.json();return !d.error;
  }catch(e){return false;}
}
async function fetchUserInfo(){
  try{
    var r=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+accessToken}});
    userInfo=await r.json();
    localStorage.setItem("user_info",JSON.stringify(userInfo));
  }catch(e){}
}
function showLogin(){
  document.getElementById("login-screen").style.display="block";
  document.getElementById("main-app").style.display="none";
}
function showApp(){
  localStorage.setItem("akt_token",accessToken);
  localStorage.setItem("token_time",Date.now());
  document.getElementById("login-screen").style.display="none";
  document.getElementById("main-app").style.display="block";
  renderUserRow();
  document.querySelectorAll(".tab").forEach(function(btn){
    btn.onclick=function(){
      if(btn.dataset.v==="tips"){setView("tips");fetchTips();}
      else if(btn.dataset.v==="terapi"){setView("terapi");renderTerapi();}
      else{setView(btn.dataset.v);render();}
    };
  });
  setTimeout(function(){
    setSyncBtn("err","Session utgangen");
    setTimeout(function(){
      localStorage.removeItem("akt_token");localStorage.removeItem("token_time");
      accessToken=null;showLogin();
    },3000);
  },58*60*1000);
  render();
}
function renderUserRow(){
  var r=document.getElementById("user-row");
  if(!r||!userInfo)return;
  var name=userInfo.name||userInfo.email||"Inloggad";
  var initials=name.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
  r.innerHTML="<div class='avatar'>"+initials+"</div><span style='color:#c4c0d4;font-size:12px'>"+esc(name)+"</span><span class='signout' onclick='signOut()'>Logga ut</span>";
}
function signOut(){
  ["akt_token","token_time","user_info","drive_fid"].forEach(function(k){localStorage.removeItem(k);});
  accessToken=null;userInfo=null;driveFileId=null;showLogin();
}
function setSyncBtn(cls,label){
  var b=document.getElementById("sync-btn");
  if(!b)return;
  b.className="sync-btn"+(cls?" "+cls:"");
  b.textContent=label;
}

async function syncNow(){
  if(!accessToken){setSyncBtn("err","Ej inloggad");return;}
  setSyncBtn("","Synkar...");
  try{
    var remote=await driveRead();
    if(remote){var m=mergeData(remote);logs=m.logs;kHist=m.kHist;sHist=m.sHist;oHist=m.oHist;fHist=m.fHist;tHist=m.tHist;}
    await driveWrite();saveLocal();
    setSyncBtn("ok","Synkad");
    setTimeout(function(){setSyncBtn("","Synka");},3000);
    hdr();render();
  }catch(e){
    setSyncBtn("err","Synk misslyckades");
    setTimeout(function(){setSyncBtn("","Synka");},3000);
  }
}
function mergeData(remote){
  function mergeArr(a,b){
    var map=new Map();
    (a||[]).concat(b||[]).forEach(function(x){map.set(String(x.id||x.timestamp),x);});
    return Array.from(map.values()).sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});
  }
  return{
    logs:mergeArr(logs,remote.logs),kHist:mergeArr(kHist,remote.kHist),
    sHist:mergeArr(sHist,remote.sHist),oHist:mergeArr(oHist,remote.oHist||[]),
    fHist:mergeArr(fHist,remote.fHist||[]),tHist:mergeArr(tHist,remote.tHist||[])
  };
}
async function driveRead(){
  if(!driveFileId){
    var r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='"+FILE_NAME+"'&fields=files(id)",{headers:{Authorization:"Bearer "+accessToken}});
    var d=await r.json();
    if(d.files&&d.files.length>0){driveFileId=d.files[0].id;localStorage.setItem("drive_fid",driveFileId);}
    else return null;
  }
  var r2=await fetch("https://www.googleapis.com/drive/v3/files/"+driveFileId+"?alt=media",{headers:{Authorization:"Bearer "+accessToken}});
  if(!r2.ok){driveFileId=null;localStorage.removeItem("drive_fid");return null;}
  return await r2.json();
}
async function driveWrite(){
  var body=JSON.stringify({logs:logs,kHist:kHist,sHist:sHist,oHist:oHist,fHist:fHist,tHist:tHist});
  if(driveFileId){
    await fetch("https://www.googleapis.com/upload/drive/v3/files/"+driveFileId+"?uploadType=media",{
      method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:body
    });
  }else{
    var form=new FormData();
    form.append("metadata",new Blob([JSON.stringify({name:FILE_NAME,parents:["appDataFolder"]})],{type:"application/json"}));
    form.append("file",new Blob([body],{type:"application/json"}));
    var r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{
      method:"POST",headers:{Authorization:"Bearer "+accessToken},body:form
    });
    var d2=await r.json();driveFileId=d2.id;localStorage.setItem("drive_fid",driveFileId);
  }
}
async function saveAndSync(){
  saveLocal();
  try{
    await driveWrite();
    setSyncBtn("ok","Sparad");
    setTimeout(function(){setSyncBtn("","Synka");},2000);
  }catch(e){
    setSyncBtn("err","Synk misslyckades");
    setTimeout(function(){setSyncBtn("","Synka");},3000);
  }
}

    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"anthropic/claude-sonnet-4-5",
      max_tokens:maxTokens,

  });
}
function aiText(data){
  return data.choices&&data.choices[0]?data.choices[0].message.content||"":"";
}

function hdr(){document.getElementById("htitle").textContent=logs.length>0?(logs.length+" aktiviteter"):"Kom igang";}
function setView(v){view=v;document.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("on",t.dataset.v===v);});}
function render(){
  hdr();
  if(view==="log")renderLog();
  else if(view==="history")renderHistory();
  else if(view==="klarhet")renderKlarhet();
  else if(view==="svar")renderSvar();
  else if(view==="omforma")renderOmforma();
  else if(view==="forklara")renderForklara();
  else if(view==="terapi")renderTerapi();

function ctxChips(list,current,attr){
  return list.map(function(c){
    return "<button class='ctx-chip"+(c===current?" on":"")+"' data-"+attr+"='"+esc(c)+"'>"+esc(c)+"</button>";
  }).join("");
}
function bindChips(b,attr,getCurrent,setCurrent){
  b.querySelectorAll("[data-"+attr+"]").forEach(function(btn){
    btn.onclick=function(){
      setCurrent(btn.dataset[attr]);
      b.querySelectorAll("[data-"+attr+"]").forEach(function(x){x.classList.toggle("on",x.dataset[attr]===getCurrent());});
    };
  });
}
function histBlock(arr,attr,labelFn,delFn,clickFn){
  if(!arr.length)return "";
  var rows=arr.slice(0,6).map(function(h,i){
    return "<div class='khist' style='display:flex;align-items:flex-start;gap:8px' data-"+attr+"='"+i+"'>"
      +"<div style='flex:1;min-width:0'>"
      +"<div class='kmsg'>"+esc(h.original||h.idea||h.question||"")+"</div>"
      +"<div class='kmeta'>"+labelFn(h)+"<span>"+fd(h.timestamp)+"</span></div>"
      +"</div>"
      +"<button class='delbtn' data-del"+attr+"='"+i+"' style='flex-shrink:0;font-size:18px;padding:0 2px'>x</button>"
      +"</div>";
  }).join("");
  var html="<div class='mt20'><div class='lbl'>Tidigare</div>"+rows+"</div>";
  return html;
}
function bindHist(b,attr,clickFn,delFn){
  b.querySelectorAll("[data-"+attr+"]").forEach(function(el){
    el.onclick=function(e){if(!e.target.dataset["del"+attr])clickFn(Number(el.dataset[attr]));};
  });
  b.querySelectorAll("[data-del"+attr+"]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();delFn(Number(btn.dataset["del"+attr]));};
  });
}

  });
}

async function sendTerapi(text){
  tMessages.push({role:"user",content:text});
  tInput="";tLoading=true;renderTerapi();
  var sys="Du ar en empatisk och reflekterande samtalsstod. Din roll ar att lyssna, stalla genomtankta foljdfragor och hjalpa personen reflektera over sina tankar och ideer. Du ger rad nar det frages om det men fokuserar annars pa att hjalpa personen tanka igenom sina egna losningar. Svara pa svenska, var varm men inte overklagande. Halla svaren kortfattade (max 3-4 meningar).";
  var history=tMessages.slice(-10).map(function(m){return {role:m.role,content:m.content};});
  try{
    var res=await fetch(PROXY,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"anthropic/claude-sonnet-4-5",
        max_tokens:600,
        messages:[{role:"system",content:sys}].concat(history)
      })
    });
    var data=await res.json();
    var reply=data.choices&&data.choices[0]?data.choices[0].message.content||"":"Kunde inte svara. Forsok igen.";
    tMessages.push({role:"assistant",content:reply});
  }catch(e){tMessages.push({role:"assistant",content:"Nagot gick fel. Forsok igen."});}
  tLoading=false;renderTerapi();
}

// ---- AI-TIPS ----
function renderTips(){
  var b=document.getElementById("body");
  if(tipsLoading){b.innerHTML=spin();return;}
  if(tipText){
    b.innerHTML="<div class='lbl'>Personliga tips</div><div class='tbox'>"+esc(tipText)+"</div><button class='sec ghost' id='refbtn'>Hamta nya tips</button>";
    b.querySelector("#refbtn").onclick=fetchTips;return;
  }
  b.innerHTML="<div class='empty'><div class='eico'>🤖</div><div style='margin-bottom:20px;font-size:14px'>AI-coachen analyserar dina aktiviteter och ger personliga rad.</div><button class='sec' id='getbtn' style='max-width:220px;margin:0 auto'>Hamta mina tips</button></div>";
  b.querySelector("#getbtn").onclick=fetchTips;
}
async function fetchTips(){
  tipsLoading=true;tipText="";setView("tips");renderTips();
  var sum=logs.slice(0,20).map(function(l){return "["+l.category+"] "+l.activity+(l.note?": "+l.note:"");}).join("\n")||"Inga aktiviteter loggade annu.";
  try{
    var res=await aiCall("Du ar en vanlig halsocoach som ger personliga, konkreta tips pa svenska. Hall det kort, positivt och actionbart.","Ge mig 3 personliga tips baserade pa:\n\n"+sum,1000);
    var data=await res.json();
    tipText=aiText(data)||"Kunde inte hamta tips.";
  }catch(e){tipText="Nagot gick fel. Forsok igen.";}
  tipsLoading=false;renderTips();
}

init();
</script>
