    local.forEach(function(x){map.set(String(x.id||x.timestamp),x);});
    var added=0;
    remote.forEach(function(x){
      var key=String(x.id||x.timestamp);
      if(!map.has(key)){map.set(key,x);added++;}
    });
    if(added>0)console.log("Importerade "+added+" nya poster");
    return Array.from(map.values()).sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});

    var before=logs.length;
    logs=mergeById(logs,da.logs.map(function(l){l.id=Number(l.id)||l.id;return l;}));

  }

  // Samtal

      var cats=["bok","musik","film","serie","podcast","videodelning","spel","ovrigt"];
      cats.forEach(function(k){

          var existing=mediaList[k]||[];

  // Text

    if(dt.kHist){var b=kHist.length;kHist=mergeById(kHist,dt.kHist);totalAdded+=kHist.length-b;}
    if(dt.sHist){var b=sHist.length;sHist=mergeById(sHist,dt.sHist);totalAdded+=sHist.length-b;}
    if(dt.oHist){var b=oHist.length;oHist=mergeById(oHist,dt.oHist);totalAdded+=oHist.length-b;}
    if(dt.synHist){var b=synHist.length;synHist=mergeById(synHist,dt.synHist);totalAdded+=synHist.length-b;}
  }

  var dtp=await driveRead("Tips/Tips");

  var dsk=await driveRead("Tips/Skamt");
  if(dsk&&dsk.savedJokes){
    var s=new Set(savedJokes);var b2=s.size;
    dsk.savedJokes.forEach(function(j){s.add(j);});
    totalAdded+=s.size-b2;savedJokes=Array.from(s);
  }

  // Inställningar

  // For history lists where deletions matter, prefer local (newer) over remote merge

  };

// ---- DRIVE FILE SYSTEM ----
var DRIVE_API="https://www.googleapis.com/drive/v3/files";
var DRIVE_UPLOAD="https://www.googleapis.com/upload/drive/v3/files";

// Structure: path -> [folder, subfolder (or null)]
// All files named data.json inside their folder
var DRIVE_STRUCTURE={
  "Logga/Aktivitet":   ["Logga","Aktivitet"],
  "Logga/Samtal":      ["Logga","Samtal"],
  "Logga/Funderingar": ["Logga","Funderingar"],
  "Logga/Media":       ["Logga","Media"],
  "Sok":               ["Sok",null],
  "Text":              ["Text",null],
  "Terapi":            ["Terapi",null],
  "Tips/Tips":         ["Tips","Tips"],
  "Tips/Skamt":        ["Tips","Skamt"],
  "Historik/Index":    ["Historik","Bilder"],
  "Installningar":     ["Installningar",null]
};

var driveIdCache={};  // path -> file id
var driveDirCache={}; // "folder" or "folder/sub" -> folder id

function saveDriveCache(){
  /* no-op: file IDs are resolved fresh each session, never persisted to disk */
}
function loadDriveCache(){
  /* no-op: nothing to load, IDs are always resolved fresh */
}

async function driveMkdir(name,parentId){
  // Check cache
  var ckey=parentId+"/"+name;
  if(driveDirCache[ckey])return driveDirCache[ckey];
  // Search
  var q="name='"+name+"' and '"+parentId+"' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false";
  var r=await fetch(DRIVE_API+"?q="+encodeURIComponent(q)+"&fields=files(id)",{headers:{Authorization:"Bearer "+accessToken}});
  var d=await r.json();
  if(d.files&&d.files.length>0){
    driveDirCache[ckey]=d.files[0].id;saveDriveCache();return driveDirCache[ckey];
  }
  // Create
  var r2=await fetch(DRIVE_API,{method:"POST",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:JSON.stringify({name:name,parents:[parentId],mimeType:"application/vnd.google-apps.folder"})});
  var d2=await r2.json();
  driveDirCache[ckey]=d2.id;saveDriveCache();return driveDirCache[ckey];
}

async function driveGetFileId(path){
  // Always search Drive fresh — never trust cache alone
  var def=DRIVE_STRUCTURE[path];
  if(!def)throw new Error("Okänd sökväg: "+path);
  var parentId=await driveMkdir(def[0],FOLDER_ID);
  if(def[1])parentId=await driveMkdir(def[1],parentId);
  // Search — explicitly exclude trashed
  var q="name='data.json' and '"+parentId+"' in parents and trashed=false";
  var r=await fetch(DRIVE_API+"?q="+encodeURIComponent(q)+"&fields=files(id,name,createdTime)&orderBy=createdTime",{headers:{Authorization:"Bearer "+accessToken}});
  var d=await r.json();
  if(d.files&&d.files.length>1){
    // Multiple files — report error, use oldest
    reportDriveError(path,"⚠️ Flera data.json-filer hittades i mappen '"+def[0]+(def[1]?"/"+def[1]:"")+"'. Ta bort de extra filerna i Google Drive manuellt. Använder den äldsta.");
    driveIdCache[path]=d.files[0].id;
    saveDriveCache();
    return driveIdCache[path];
  }
  if(d.files&&d.files.length===1){
    driveIdCache[path]=d.files[0].id;
    saveDriveCache();
    return driveIdCache[path];
  }
  // Nothing found
  delete driveIdCache[path];
  saveDriveCache();
  throw new Error("FIL_SAKNAS:"+path);
}

async function driveEnsureFile(path){
  // Explicitly creates a new file — only call when user has confirmed creation
  var def=DRIVE_STRUCTURE[path];
  if(!def)throw new Error("Okänd sökväg: "+path);
  var parentId=await driveMkdir(def[0],FOLDER_ID);
  if(def[1])parentId=await driveMkdir(def[1],parentId);
  var form=new FormData();
  form.append("metadata",new Blob([JSON.stringify({name:"data.json",parents:[parentId],mimeType:"application/json"})],{type:"application/json"}));
  form.append("file",new Blob(["{}"],{type:"application/json"}));
  var r2=await fetch(DRIVE_UPLOAD+"?uploadType=multipart&fields=id",{method:"POST",headers:{Authorization:"Bearer "+accessToken},body:form});
  var d2=await r2.json();
  driveIdCache[path]=d2.id;saveDriveCache();return driveIdCache[path];
}

var driveErrors=[];
// ---- PENDING SAVES (safety net for failed Drive writes) ----
// When a write to Drive fails (e.g. the JSON file can't be found), the entry
// itself is never lost from your session — but to make sure it survives a
// page reload too, you can choose "Spara för att skriva senare" in the error
// dialog. That stores the full pending payload for that file locally until
// you download/resolve it. This is the one deliberate exception to "nothing
// is cached locally" — it exists purely so a failed write never means lost data.
function getPendingSaves(){
  try{return JSON.parse(localStorage.getItem("pending_saves")||"{}");}catch(e){return {};}
}
function queuePendingSave(path,data){
  var store=getPendingSaves();
  store[path]={data:data,timestamp:new Date().toISOString()};
  try{localStorage.setItem("pending_saves",JSON.stringify(store));}catch(e){}
}
function removePendingSave(path){
  var store=getPendingSaves();
  delete store[path];
  try{localStorage.setItem("pending_saves",JSON.stringify(store));}catch(e){}
}
function countPendingSaves(){
  return Object.keys(getPendingSaves()).length;
}

function reportDriveError(path,msg,data){
  driveErrors.push({path:path,msg:msg,data:data});

        +(e.data!==undefined?" <button data-savepending='"+i+"' style='margin-left:6px;padding:2px 8px;border-radius:6px;background:#0c1119;border:1px solid #00d4ff;color:#00d4ff;cursor:pointer;font-size:11px'>💾 Spara för att skriva senare</button>":"")
        +"</div>";
    }).join("")

function validateDriveData(path,data){
  var errors=[];
  var checks={
    "Logga/Aktivitet":  function(d){
      if(!Array.isArray(d.logs)){errors.push('"logs" saknas eller är inte en lista');}
      else{d.logs.forEach(function(l,i){
        if(typeof l.id!=="number")errors.push("logs["+i+']: "id" är '+typeof l.id+' — bör vara nummer');
        if(!l.activity)errors.push("logs["+i+']: "activity" saknas');
        if(!l.timestamp)errors.push("logs["+i+']: "timestamp" saknas');
      });}
    },
    "Logga/Samtal":     function(d){if(!Array.isArray(d.sentPeople))errors.push('"sentPeople" saknas');if(!Array.isArray(d.sentConvs))errors.push('"sentConvs" saknas');if(!Array.isArray(d.sentMsgs))errors.push('"sentMsgs" saknas');},
    "Logga/Funderingar":function(d){if(!Array.isArray(d.fundHist))errors.push('"fundHist" saknas');},
    "Logga/Media":      function(d){if(!d.mediaList||typeof d.mediaList!=="object"||Array.isArray(d.mediaList))errors.push('"mediaList" saknas eller är inte ett objekt');},
    "Sok":              function(d){if(!Array.isArray(d.fHist))errors.push('"fHist" saknas');},
    "Tips/Tips":        function(d){if(!Array.isArray(d.tipsHistory))errors.push('"tipsHistory" saknas');},
    "Tips/Skamt":       function(d){if(!Array.isArray(d.savedJokes))errors.push('"savedJokes" saknas');},
    "Terapi":           function(d){if(!Array.isArray(d.tHist))errors.push('"tHist" saknas');},
    "Historik/Index":   function(d){if(!Array.isArray(d.images))errors.push('"images" saknas');}
  };
  if(checks[path])checks[path](data);
  // Report warnings but always return true — don't block data
  if(errors.length){errors.forEach(function(e){reportDriveError(path,"⚠️ Varning: "+e);});}
  return true;
}

async function driveRead(path){
  try{
    var id=await driveGetFileId(path);
    var r=await fetch(DRIVE_API+"/"+id+"?alt=media",{headers:{Authorization:"Bearer "+accessToken}});
    if(r.status===404){
      // Stale file ID — clear cache and search again
      delete driveIdCache[path];
      saveDriveCache();
      try{
        id=await driveGetFileId(path);
        r=await fetch(DRIVE_API+"/"+id+"?alt=media",{headers:{Authorization:"Bearer "+accessToken}});
      }catch(e2){
        if(e2.message&&e2.message.startsWith("FIL_SAKNAS:")){
          showFileMissingError(path);
          return null;
        }
        throw e2;
      }
    }
    if(!r.ok){reportDriveError(path,"HTTP "+r.status+" vid läsning");return null;}
    var text=await r.text();
    if(!text||!text.trim()||text.trim()==="{}"){return null;}
    var parsed;
    try{parsed=JSON.parse(text);}catch(pe){reportDriveError(path,"Ogiltig JSON — "+pe.message);return null;}
    validateDriveData(path,parsed);
    return parsed;
  }catch(e){
    if(e.message&&e.message.startsWith("FIL_SAKNAS:")){
      // Silent — file simply not created yet, no error needed
      return null;
    }
    reportDriveError(path,"Nätverksfel: "+e.message);
    return null;
  }
}

function getCatDisplay(categoryId){
  // First try to find in CAT_PRESETS (user's custom labels with emojis)
  var preset=CAT_PRESETS.find(function(p){
    var ct=CATS.find(function(x){return x.id===categoryId;});
    return ct&&(p===ct.e+" "+ct.label||p.indexOf(" ")>0&&p.split(" ").slice(1).join(" ")===ct.label)||p===categoryId;
  });
  if(preset)return preset;
  // Fall back to CATS
  var ct=CATS.find(function(x){return x.id===categoryId;});
  return ct?ct.e+" "+ct.label:categoryId||"";
}

function getCatEmoji(categoryId){
  var display=getCatDisplay(categoryId);
  // Extract emoji (first char(s) before space)
  var m=display.match(/^([\p{Emoji}\u{1F3FB}-\u{1F3FF}\u{1F9B0}-\u{1F9B3}]+)/u);
  return m?m[1]:"✨";
}

function getCatLabel(categoryId){
  var display=getCatDisplay(categoryId);
  // Remove leading emoji
  return display.replace(/^[\p{Emoji}\s]+/u,"").trim()||display;
}

function buildImageFilename(img){
  var d=new Date(img.timestamp);
  var yy=String(d.getFullYear()).slice(-2);
  var mm=String(d.getMonth()+1).padStart(2,"0");
  var dd=String(d.getDate()).padStart(2,"0");
  var title=(img.activity||"bild").replace(/[^a-zA-ZåäöÅÄÖ0-9_\- ]/g,"").trim().slice(0,40);
  var ext=img.mtype&&img.mtype.includes("png")?"png":"jpg";
  return yy+"-"+mm+"-"+dd+"_"+title+"."+ext;
}

async function driveWriteJpeg(filename,base64,mtype){
  // Get or create Historik/Bilder folder
  var historikId=await driveMkdir("Historik",FOLDER_ID);
  var bilderId=await driveMkdir("Bilder",historikId);
  // Convert base64 to binary
  var binary=atob(base64);
  var bytes=new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  var blob=new Blob([bytes],{type:mtype||"image/jpeg"});
  var form=new FormData();
  form.append("metadata",new Blob([JSON.stringify({name:filename,parents:[bilderId],mimeType:mtype||"image/jpeg"})],{type:"application/json"}));
  form.append("file",blob);
  var r=await fetch(DRIVE_UPLOAD+"?uploadType=multipart&fields=id",{method:"POST",headers:{Authorization:"Bearer "+accessToken},body:form});
  var d=await r.json();
  return d.id;
}

async function loadImageBase64(img){
  if(img.base64)return img.base64;
  if(!img.driveId||!accessToken)return null;
  try{
    var r=await fetch(DRIVE_API+"/"+img.driveId+"?alt=media",{headers:{Authorization:"Bearer "+accessToken}});
    if(!r.ok)return null;
    var blob=await r.blob();
    return await new Promise(function(res){
      var reader=new FileReader();
      reader.onload=function(e){res(e.target.result.split(",")[1]);};
      reader.readAsDataURL(blob);
    });
  }catch(e){return null;}
}

async function saveImageToDrive(img){
  if(!accessToken||!img.base64)return;
  var filename=buildImageFilename(img);
  var id=await driveWriteJpeg(filename,img.base64,img.mtype||"image/jpeg");
  img.driveId=id;
  img.base64=null; // free memory after upload
}

async function driveWrite(path,data){
  try{
    var id=driveIdCache[path];
    if(!id){
      try{id=await driveGetFileId(path);}
      catch(e){
        if(e.message&&e.message.startsWith("FIL_SAKNAS:")){
          showFileMissingError(path,data);return;
        }
        throw e;
      }
    }
    var r=await fetch(DRIVE_UPLOAD+"/"+id+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:JSON.stringify(data,null,2)});
    if(r.status===404){
      delete driveIdCache[path];saveDriveCache();
      try{id=await driveGetFileId(path);}
      catch(e){showFileMissingError(path,data);return;}
      await fetch(DRIVE_UPLOAD+"/"+id+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:JSON.stringify(data,null,2)});
    }
  }catch(e){showDriveWriteError(path,e.message,data);}
}

async function loadTab(tabName){
  if(!accessToken||tabLoaded[tabName])return;
  try{
    if(tabName==="aktiviteter"){
      var da=await driveRead("Logga/Aktivitet");
      if(da){if(da.logs)logs=da.logs.map(function(l){l.id=Number(l.id)||l.id;return l;});}
      var di=await driveRead("Historik/Index");
      if(di&&di.images){imageHist=di.images.map(function(m){return {id:m.id,logId:m.logId,activity:m.activity,category:m.category,mtype:m.mtype||"image/jpeg",timestamp:m.timestamp,driveId:m.driveId,base64:null};});}
    } else if(tabName==="samtal"){
      var da=await driveRead("Logga/Samtal");
      if(da){if(da.sentPeople)sentPeople=da.sentPeople;if(da.sentConvs)sentConvs=da.sentConvs;if(da.sentMsgs)sentMsgs=da.sentMsgs;}
    } else if(tabName==="funderingar"){
      var da=await driveRead("Logga/Funderingar");
      if(da){if(da.fundHist)fundHist=da.fundHist;}
    } else if(tabName==="media"){
      var da=await driveRead("Logga/Media");
      if(da){if(da.mediaList)mediaList=da.mediaList;if(da.mediaFardig)mediaFardig=da.mediaFardig;}
    } else if(tabName==="sok"){
      var da=await driveRead("Sok");
      if(da){if(da.fHist)fHist=da.fHist;}
    } else if(tabName==="text"){
      var da=await driveRead("Text");
      if(da){if(da.kHist)kHist=da.kHist;if(da.sHist)sHist=da.sHist;if(da.oHist)oHist=da.oHist;if(da.synHist)synHist=da.synHist;}
    } else if(tabName==="terapi"){
      var da=await driveRead("Terapi");
      if(da){if(da.tHist)tHist=da.tHist;}
    } else if(tabName==="tips"){
      var da=await driveRead("Tips/Tips");
      if(da){if(da.tipsHistory)tipsHistory=da.tipsHistory;}
      var db=await driveRead("Tips/Skamt");
      if(db){if(db.savedJokes)savedJokes=db.savedJokes;}
    } else if(tabName==="installningar"){
      var da=await driveRead("Installningar");
      if(da){
        if(da.placePresets)PLACE_PRESETS=da.placePresets;
        if(da.actPresets)ACT_PRESETS=da.actPresets;
        if(da.catPresets)CAT_PRESETS=da.catPresets;
        if(da.fundCatPresets)FUND_CAT_PRESETS=da.fundCatPresets;
      }
    }
  }catch(e){reportDriveError(tabName,"Oväntat fel: "+e.message);}
  tabLoaded[tabName]=true;
  saveLocal();
}

async function saveTab(tabName){
  if(!accessToken)return;
  if(tabName==="aktiviteter"){await driveWrite("Logga/Aktivitet",{logs:logs});}
  else if(tabName==="samtal"){await driveWrite("Logga/Samtal",{sentPeople:sentPeople,sentConvs:sentConvs,sentMsgs:sentMsgs});}
  else if(tabName==="funderingar"){await driveWrite("Logga/Funderingar",{fundHist:fundHist});}
  else if(tabName==="media"){await driveWrite("Logga/Media",{mediaList:mediaList,mediaFardig:mediaFardig});}
  else if(tabName==="sok"){await driveWrite("Sok",{fHist:fHist});}
  else if(tabName==="text"){await driveWrite("Text",{kHist:kHist,sHist:sHist,oHist:oHist,synHist:synHist});}
  else if(tabName==="terapi"){await driveWrite("Terapi",{tHist:tHist});}
  else if(tabName==="tips"){
    await driveWrite("Tips/Tips",{tipsHistory:tipsHistory});
    await driveWrite("Tips/Skamt",{savedJokes:savedJokes});
  }
  else if(tabName==="bilder"){
    // Save index only (base64 not stored in index)
    var idx=imageHist.map(function(i){return {id:i.id,logId:i.logId,activity:i.activity,category:i.category,mtype:i.mtype,timestamp:i.timestamp,driveId:i.driveId||null};});
    await driveWrite("Historik/Index",{images:idx});
  }
  else if(tabName==="installningar"){
    await driveWrite("Installningar",{
      placePresets:PLACE_PRESETS,
      actPresets:ACT_PRESETS,
      catPresets:CAT_PRESETS,
      fundCatPresets:FUND_CAT_PRESETS
    });
  }
}

async function saveAndSync(tabName){
  saveLocal();
  if(!accessToken||!tabName)return;
  setSyncBtn("","Sparar...");
  try{
    await saveTab(tabName);
    setSyncBtn("ok","Sparad");
    setTimeout(function(){setSyncBtn("","Synka");},2000);
  }catch(e){
    // Only show error if it's not a missing file (those show their own dialog)
    if(!e.message||e.message.indexOf("FIL_SAKNAS")===-1){
      setSyncBtn("err","Fel vid sparning");
      setTimeout(function(){setSyncBtn("","Synka");},3000);
    } else {
      setSyncBtn("","Synka");
    }
  }
}


async function init(){
  var savedToken=sessionStorage.getItem("akt_token");
  var tokenTime=parseInt(sessionStorage.getItem("token_time")||"0");
  if(savedToken&&(Date.now()-tokenTime)<55*60*1000){
    accessToken=savedToken;
    var ok=await checkToken();
    if(ok){
      if(!userInfo)await fetchUserInfo();
      showApp();
      return;
    }
  }
  sessionStorage.removeItem("akt_token");
  sessionStorage.removeItem("token_time");
  var dbg=document.getElementById("debug-msg");
  if(dbg)dbg.textContent="Redirect URI: "+REDIRECT_URI;
  showLogin();
}

function aiText(data){
  // Standard OpenAI/Anthropic format
  if(data.choices&&data.choices[0]){
    var msg=data.choices[0].message;
    if(msg){
      // Some models return content as string
      if(typeof msg.content==="string"&&msg.content)return msg.content;
      // Some models (Gemini) return content as array of parts
      if(Array.isArray(msg.content)){
        return msg.content.map(function(p){return p.text||p.content||"";}).join("");
      }
    }
    // Fallback: text field directly on choice
    if(data.choices[0].text)return data.choices[0].text;
  }
  // Gemini native format fallback
  if(data.candidates&&data.candidates[0]){
    var c=data.candidates[0];
    if(c.content&&c.content.parts)return c.content.parts.map(function(p){return p.text||"";}).join("");
  }
  return "";
}

function buildContext(){
  var parts=[];

  // Aktiviteter (senaste 30)
  if(logs.length){
    parts.push("=== AKTIVITETER (senaste) ===");
    logs.slice(0,30).forEach(function(l){
      var ct=CATS.find(function(c){return c.id===l.category;});
      var line="["+fd(l.timestamp)+"] "+(ct?ct.label:l.category)+": "+l.activity;
      if(l.time)line+=" ("+l.time+")";
      if(l.note)line+=" - "+l.note;
      parts.push(line);
    });
  }

  // Funderingar (senaste 20)
  if(fundHist.length){
    parts.push("\n=== FUNDERINGAR (senaste) ===");
    fundHist.slice(0,20).forEach(function(f){
      parts.push("["+fd(f.timestamp)+"] "+f.text);
    });
  }

  // Samtal - personer och konversationer (senaste 20 meddelanden)
  if(sentPeople.length){
    parts.push("\n=== SAMTAL ===");
    sentPeople.forEach(function(p){
      var convs=sentConvs.filter(function(cv){return cv.personId===p.id;});
      if(!convs.length)return;
      parts.push("Person: "+p.name);
      convs.slice(0,3).forEach(function(cv){
        var msgs=sentMsgs.filter(function(m){return m.convId===cv.id;}).slice(-10);
        if(!msgs.length)return;
        parts.push("  Konversation: "+cv.title+(cv.type?" ("+cv.type+")":""));
        msgs.forEach(function(m){
          parts.push("    "+(m.sender==="me"?"Jag":p.name)+": "+m.text);
        });
      });
    });
  }

  if(!parts.length)return "";
  return "\n\nAnvandarens kontext fran AI-Assistent-appen:\n"+parts.join("\n")+"\n\nAnvand denna kontext for att ge mer personliga och relevanta svar. Referera till den nar det ar lampligt men tvinga inte in den i varje svar.";
}

function showClockOverlayFor(initH,initM,onSet){
  var ov=document.createElement("div");
  ov.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px";
  ov.innerHTML=
    "<div style='background:#10151f;border-radius:20px;width:100%;max-width:320px;overflow:hidden'>"
    +"<div id='cl-display' style='background:#0a4a4a;padding:20px 24px;font-size:52px;font-weight:300;color:#fff;letter-spacing:2px;text-align:center'>"+String(initH).padStart(2,"0")+":"+String(initM).padStart(2,"0")+"</div>"
    +"<div style='display:flex;gap:0;border-bottom:1px solid #1c2733'>"
    +"<button id='cl-mode-h' style='flex:1;padding:10px;background:#0a2933;border:none;color:#00d4ff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit'>Timmar</button>"
    +"<button id='cl-mode-m' style='flex:1;padding:10px;background:none;border:none;color:#6b7785;font-size:13px;cursor:pointer;font-family:inherit'>Minuter</button>"
    +"</div>"
    +"<div style='padding:16px;display:flex;justify-content:center'>"
    +"<canvas id='cl-canvas' width='240' height='240' style='touch-action:none;cursor:pointer'></canvas>"
    +"</div>"
    +"<div style='display:flex;justify-content:space-between;padding:12px 20px;border-top:1px solid #1c2733'>"
    +"<button id='cl-clear' style='background:none;border:none;color:#00d4ff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit'>RENSA</button>"
    +"<div style='display:flex;gap:16px'>"
    +"<button id='cl-cancel' style='background:none;border:none;color:#00d4ff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit'>AVBRYT</button>"
    +"<button id='cl-set' style='background:none;border:none;color:#00d4ff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit'>VÄLJ</button>"
    +"</div></div></div>";
  document.body.appendChild(ov);
  var lh=initH,lm=initM,lmode="h";
  var canvas=ov.querySelector("#cl-canvas");
  var ctx=canvas.getContext("2d");
  var sz=240,cx=sz/2,cy=sz/2,r=sz/2-10,ri=r*0.58;
  function drawClock(){
    ctx.clearRect(0,0,sz,sz);
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle="#1a2233";ctx.fill();
    var nums=lmode==="h"?
      [{v:12,a:-90},{v:1,a:-60},{v:2,a:-30},{v:3,a:0},{v:4,a:30},{v:5,a:60},{v:6,a:90},{v:7,a:120},{v:8,a:150},{v:9,a:180},{v:10,a:210},{v:11,a:240},
       {v:0,a:-90,inner:true},{v:13,a:-60,inner:true},{v:14,a:-30,inner:true},{v:15,a:0,inner:true},{v:16,a:30,inner:true},{v:17,a:60,inner:true},{v:18,a:90,inner:true},{v:19,a:120,inner:true},{v:20,a:150,inner:true},{v:21,a:180,inner:true},{v:22,a:210,inner:true},{v:23,a:240,inner:true}]:
      [{v:0,a:-90},{v:5,a:-60},{v:10,a:-30},{v:15,a:0},{v:20,a:30},{v:25,a:60},{v:30,a:90},{v:35,a:120},{v:40,a:150},{v:45,a:180},{v:50,a:210},{v:55,a:240}];
    var selVal=lmode==="h"?lh:lm;
    var selAngle=null;
    nums.forEach(function(n){
      var rad=n.a*Math.PI/180;
      var rr=n.inner?ri:r*0.82;
      var x=cx+rr*Math.cos(rad),y=cy+rr*Math.sin(rad);
      var isSel=(n.v===selVal);
      if(isSel)selAngle={x:x,y:y};
      ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);
      ctx.fillStyle=isSel?"#00d4ff":"transparent";ctx.fill();
      ctx.font=(isSel?"600 ":"400 ")+"14px system-ui";
      ctx.fillStyle=isSel?"#000":"#c4c0d4";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(String(n.v).padStart(2,"0"),x,y);
    });
    if(selAngle){
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(selAngle.x,selAngle.y);
      ctx.strokeStyle="#00d4ff";ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fillStyle="#00d4ff";ctx.fill();
    }
    var disp=ov.querySelector("#cl-display");
    if(disp)disp.textContent=String(lh).padStart(2,"0")+":"+String(lm).padStart(2,"0");
  }
  drawClock();
  function setMode(m){
    lmode=m;
    ov.querySelector("#cl-mode-h").style.background=m==="h"?"#0a2933":"none";
    ov.querySelector("#cl-mode-h").style.color=m==="h"?"#00d4ff":"#6b7785";
    ov.querySelector("#cl-mode-m").style.background=m==="m"?"#0a2933":"none";
    ov.querySelector("#cl-mode-m").style.color=m==="m"?"#00d4ff":"#6b7785";
    drawClock();
  }
  ov.querySelector("#cl-mode-h").onclick=function(){setMode("h");};
  ov.querySelector("#cl-mode-m").onclick=function(){setMode("m");};
  function pickFromEvent(e){
    var rect=canvas.getBoundingClientRect();
    var cx2=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    var cy2=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    var scaleX=sz/rect.width,scaleY=sz/rect.height;
    var px=cx2*scaleX-cx,py=cy2*scaleY-cy;
    var dist=Math.sqrt(px*px+py*py);
    var angle=Math.atan2(py,px)*180/Math.PI+90;if(angle<0)angle+=360;
    if(lmode==="h"){
      var inner=dist<(ri+r*0.82)/2;
      var h=Math.round(angle/30)%12;
      lh=inner?(h===0?0:h+12):(h===0?12:h);
    }else{lm=Math.round(angle/6)%60;}
    drawClock();
  }
  canvas.addEventListener("click",pickFromEvent);
  canvas.addEventListener("touchend",function(e){e.preventDefault();pickFromEvent({clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY});},{passive:false});
  ov.querySelector("#cl-clear").onclick=function(){lh=0;lm=0;drawClock();};
  ov.querySelector("#cl-cancel").onclick=function(){ov.remove();};
  ov.querySelector("#cl-set").onclick=function(){ov.remove();if(onSet)onSet(lh,lm);};
}

function formatTidpunkt(val){
  // Remove all non-digits
  var digits=val.replace(/\D/g,"");
  if(!digits)return "";
  // Pad to 4 digits with zeros
  while(digits.length<4)digits=digits+"0";
  digits=digits.slice(0,4);
  return digits.slice(0,2)+":"+digits.slice(2,4);
}

function bindTidpunktInp(inp){
  if(!inp)return;
  inp.onblur=function(){
    if(inp.value.trim())inp.value=formatTidpunkt(inp.value);
  };
  inp.onkeydown=function(e){
    if(e.key==="Enter"&&inp.value.trim())inp.value=formatTidpunkt(inp.value);
  };
}

  c.querySelectorAll("[data-archiveperson]").forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      var pid=btn.dataset.archiveperson;
      var p=sentPeople.find(function(x){return x.id===pid;});
      if(p){p.archived=true;saveAndSync("samtal");renderLogSkickade();}
    };
  });
  c.querySelectorAll("[data-editperson]").forEach(function(btn){

        +"<div style='display:flex;gap:8px'>"
        +"<button id='edit-person-save' style='flex:1;padding:10px;border-radius:8px;background:#0a2933;border:1px solid #00d4ff;color:#00d4ff;font-size:13px;cursor:pointer;font-family:inherit'>Spara</button>"
        +"<button id='edit-person-cancel' style='flex:1;padding:10px;border-radius:8px;background:#0c1119;border:1px solid #1c2733;color:#6b7785;font-size:13px;cursor:pointer;font-family:inherit'>Avbryt</button>"
        +"</div></div>";
      document.body.appendChild(overlay);
      var inp=overlay.querySelector("#edit-person-inp");
      inp.focus();inp.select();
      overlay.querySelector("#edit-person-cancel").onclick=function(){overlay.remove();};

        var val=inp.value.trim();
        if(val){person.name=val;saveAndSync("samtal");overlay.remove();renderLogSkickade();}
      };
      inp.onkeydown=function(e){if(e.key==="Enter")overlay.querySelector("#edit-person-save").onclick();if(e.key==="Escape")overlay.remove();};
    };
  });
  c.querySelectorAll("[data-delperson]").forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      var pid=btn.dataset.delperson;
      var pname=sentPeople.find(function(p){return p.id===pid;});
      confirmDelete('Vill du ta bort '+(pname?esc(pname.name):"personen")+' och alla konversationer?',function(){
        var convIds=sentConvs.filter(function(cv){return cv.personId===pid;}).map(function(cv){return cv.id;});
        sentConvs=sentConvs.filter(function(cv){return cv.personId!==pid;});
        sentMsgs=sentMsgs.filter(function(m){return convIds.indexOf(m.convId)===-1;});
        sentPeople=sentPeople.filter(function(p){return p.id!==pid;});
        saveAndSync("samtal");renderLogSkickade();
      });
    };
  });
}

function addPerson(name){

}

function addConv(title){

}

function renderSkickadeChat(c){
  var conv=sentConvs.find(function(cv){return cv.id===activeConvId;});

        var delBtn="<button data-delmsg='"+m.id+"' style='background:none;border:none;color:#6b7785;cursor:pointer;font-size:14px;padding:0 4px;line-height:1;flex-shrink:0'>x</button>";
        if(m.sender==="me")return "<div style='display:flex;justify-content:flex-end;align-items:flex-end;gap:4px'>"+editBtn+delBtn+"<div class='bubble-me' style='white-space:pre-wrap'>"+esc(m.text)+"</div></div>";
        return "<div style='display:flex;justify-content:flex-start;align-items:flex-end;gap:4px'><div class='bubble-them' style='white-space:pre-wrap'>"+esc(m.text)+"</div>"+editBtn+delBtn+"</div>";
      }).join("")
      +"</div>";
  }

      +"<div class='spnr' style='margin:8px auto'></div></div>"

      +"<div class='lbl'>Ladda upp bild for AI-import</div>"
      +"<label style='display:block;padding:10px;background:#0c1119;border:1px dashed #1c2733;border-radius:10px;text-align:center;cursor:pointer;font-size:13px;color:#6b6880'>"
      +"📸 Tryck for att ladda upp skarmklipp av konversation"

      +"</div>":"");

  c.innerHTML="<button class='sec ghost' id='backconv' style='margin-bottom:16px'>&#8592; "+esc(person?person.name:"")+"</button>"

    +"<span style='font-size:13px;color:#e4ecf7;font-weight:500'>"+esc(conv.title)+"</span>"
    +"<span class='kbadge'>"+typeLabel+"</span>"
    +"</div>"
    +msgHtml
    +"<div class='ctx-chips' style='margin-top:12px'>"
    +"<button class='ctx-chip"+(chatSender==="me"?" on":"")+"' data-sender='me'>"+(isMuntlig?"Jag sade":"Jag skrev")+"</button>"
    +"<button class='ctx-chip"+(chatSender==="them"?" on":"")+"' data-sender='them'>"+esc(person?person.name:"Personen")+(isMuntlig?" sade":" skrev")+"</button>"
    +"</div>"
    +"<textarea class='ta' id='chatin' placeholder='"+(isMuntlig?(chatSender==="me"?"Jag sade (sammanfattning)...":"Personen sade (sammanfattning)..."):(chatSender==="me"?"Jag skrev...":"Personen skrev..."))+"' style='min-height:80px'>"+esc(chatDraft)+"</textarea>"
    +"<button class='abtn' id='chatadd' style='width:100%;border-radius:10px'>Lagg till</button>"
    +uploadSection
    +(msgs.length>=1&&isMuntlig?"<button class='sec ghost mt12' id='analyseconv'>"+(skrivAnalysLoading&&skrivAnalysScope==="conv"?"Analyserar...":"🎙️ Analysera samtalet")+"</button>":"")
    +(msgs.length>=2&&!isMuntlig?"<button class='sec ghost mt12' id='analyseconv'>"+(skrivAnalysLoading&&skrivAnalysScope==="conv"?"Analyserar...":"Analysera skrivstil")+"</button>":"")

      if(ta)ta.placeholder=isMuntlig?(chatSender==="me"?"Jag sade (sammanfattning)...":"Personen sade (sammanfattning)..."):(chatSender==="me"?"Jag skrev...":"Personen skrev...");

  var ci2=c.querySelector("#chatin");
  ci2.oninput=function(){chatDraft=ci2.value;};

  c.querySelectorAll("[data-delmsg]").forEach(function(btn){
    btn.onclick=function(){confirmDelete('Vill du ta bort meddelandet?',function(){sentMsgs=sentMsgs.filter(function(m){return m.id!==btn.dataset.delmsg;});saveAndSync("samtal");renderLogSkickade();});};

      overlay.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px";
      overlay.innerHTML="<div style='background:#10151f;border-radius:16px;border:1px solid #00d4ff;padding:20px;width:100%;max-width:400px'>"
        +"<div class='lbl' style='margin-bottom:10px'>Redigera meddelande</div>"
        +"<textarea id='edit-msg-ta' style='width:100%;background:#0c1119;border:1px solid #1c2733;border-radius:10px;color:#e4ecf7;font-size:13px;padding:10px;min-height:100px;font-family:inherit;resize:vertical'>"+esc(msg.text)+"</textarea>"
        +"<div style='display:flex;gap:8px;margin-top:10px'>"
        +"<button id='edit-msg-save' style='flex:1;padding:10px;border-radius:8px;background:#0a2933;border:1px solid #00d4ff;color:#00d4ff;font-size:13px;cursor:pointer;font-family:inherit'>Spara</button>"
        +"<button id='edit-msg-cancel' style='flex:1;padding:10px;border-radius:8px;background:#0c1119;border:1px solid #1c2733;color:#6b7785;font-size:13px;cursor:pointer;font-family:inherit'>Avbryt</button>"

  // Image upload for Skrivande

  if(imgInput){
    imgInput.onchange=function(){

  var ac=c.querySelector("#analyseconv");
  if(ac&&!skrivAnalysLoading)ac.onclick=function(){
    doAnalyseSkrivstil(isMuntlig?"muntlig":"conv");
  };
  var ca2=c.querySelector("#clearanalys");
  if(ca2)ca2.onclick=function(){skrivAnalysResult=null;skrivAnalysScope="conv";renderLogSkickade();};
  var ca=c.querySelector("#chatarea");if(ca)ca.scrollTop=ca.scrollHeight;

async function doImportBild(file,conv,person){
  imgProcessing=true;renderLogSkickade();
  try{
    var dataUrl=await new Promise(function(res,rej){
      var r=new FileReader();
      r.onload=function(){res(r.result);};
      r.onerror=function(){rej(new Error("Filfel"));};
      r.readAsDataURL(file);
    });
    var personName=person?person.name:"Den andra personen";
    var prompt='Las av alla meddelanden i denna konversationsbild. Returnera ENBART ett JSON-objekt i detta exakta format, ingen annan text:\n{"messages":[{"sender":"me","text":"meddelande"},{"sender":"them","text":"meddelande"}]}\n\nAnvand "me" for den som ager telefonen och "them" for '+personName+'. Kronologisk ordning.';
    var res=await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      model:"anthropic/claude-sonnet-4.6",
      max_tokens:4000,
      messages:[{role:"user",content:[
        {type:"image_url",image_url:{url:dataUrl}},
        {type:"text",text:prompt}
      ]}]
    })});
    var data=await res.json();
    if(data.error)throw new Error(JSON.stringify(data.error));
    var raw=aiText(data)||"";
    // Extract JSON — find first { to last }
    var start=raw.indexOf("{");
    var end=raw.lastIndexOf("}");
    if(start===-1||end===-1)throw new Error("Inget JSON i svaret: "+raw.slice(0,200));
    var parsed=JSON.parse(raw.slice(start,end+1));
    var messages=parsed.messages||[];
    if(!messages.length)throw new Error("Inga meddelanden hittades.");
    var now=Date.now();
    messages.forEach(function(m,i){
      var sender=m.sender==="me"?"me":"them";
      sentMsgs.push({id:String(now+i),convId:conv.id,sender:sender,text:m.text,timestamp:new Date(now+i).toISOString()});
    });
    saveAndSync("samtal");
  }catch(e){
    var c=document.getElementById("log-content");
    if(c){
      var errDiv=document.createElement("div");
      errDiv.style.cssText="padding:10px;background:#2a0a0a;border:1px solid #f87171;border-radius:8px;color:#f87171;font-size:12px;margin-top:8px";
      errDiv.textContent="Import-fel: "+e.message;
      c.appendChild(errDiv);
      setTimeout(function(){if(errDiv.parentNode)errDiv.parentNode.removeChild(errDiv);},6000);
    }
  }
  imgProcessing=false;renderLogSkickade();
}

async function doAnalyseSkrivstil(scope){
  skrivAnalysScope=scope;skrivAnalysLoading=true;skrivAnalysResult=null;renderLogSkickade();

  if(scope==="muntlig"){
    // Analyse muntlig conversation — all messages as dialogue
    var conv=sentConvs.find(function(cv){return cv.id===activeConvId;});
    var person=sentPeople.find(function(p){return p.id===(conv?conv.personId:null);});
    var msgs=sentMsgs.filter(function(m){return m.convId===activeConvId;}).sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
    if(!msgs.length){skrivAnalysResult="Inga meddelanden att analysera.";skrivAnalysLoading=false;renderLogSkickade();return;}
    var dialogue=msgs.map(function(m){return (m.sender==="me"?"Jag":(person?person.name:"Personen"))+": "+m.text;}).join("\n\n");
    var sys="Du är en samtalsanalytiker. Analysera detta muntliga samtal och ge insikter på svenska om: huvudämnen som diskuterades, känslotoner och stämning, viktiga punkter eller beslut, dynamiken mellan parterna, och eventuella mönster eller teman. Var konkret och insiktsfull. Max 200 ord.";
    try{
      var res=await aiCall(sys,"Här är samtalet att analysera:\n\n"+dialogue,1000);
      var data=await res.json();
      skrivAnalysResult=aiText(data)||"Kunde inte analysera. Försök igen.";
    }catch(e){skrivAnalysResult="Något gick fel. Försök igen.";}
    skrivAnalysLoading=false;renderLogSkickade();
    return;
  }

  // Skrivstilsanalys (existing)
  var myMsgs;
  if(scope==="conv"){
    myMsgs=sentMsgs.filter(function(m){return m.convId===activeConvId&&m.sender==="me";});
  }else{
    var convIds=sentConvs.filter(function(cv){return cv.personId===activePersonId;}).map(function(cv){return cv.id;});
    myMsgs=sentMsgs.filter(function(m){return convIds.indexOf(m.convId)!==-1&&m.sender==="me";});
  }
  if(!myMsgs.length){skrivAnalysResult="Inga av dina egna meddelanden hittades att analysera.";skrivAnalysLoading=false;renderLogSkickade();return;}
  var sample=myMsgs.slice(0,20).map(function(m,i){return (i+1)+". "+m.text;}).join("\n\n");
  var sys="Du ar en sprakanalytiker. Analysera personens skrivstil baserat pa deras meddelanden. Beskriv tonfall, ordval, meningslangd, vanliga uttryck och monster. Ge konkreta, konstruktiva observationer pa svenska. Hall det kort - max 150 ord.";
  try{
    var res=await aiCall(sys,"Hars meddelandena att analysera:\n\n"+sample,800);
    var data=await res.json();
    skrivAnalysResult=aiText(data)||"Kunde inte analysera. Forsok igen.";
  }catch(e){skrivAnalysResult="Nagot gick fel. Forsok igen.";}
  skrivAnalysLoading=false;renderLogSkickade();
}

var mediaRecensionCat="bok", mediaRecensionCreator=null;
var MEDIA_UNKNOWN_CREATOR="__okand_kreator__";

function renderMediaRecension(){
  if(mediaRecensionCreator!==null)return renderMediaRecensionByCreator();

  var c=document.getElementById("log-content");
  var catOptions=MEDIA_CATS.map(function(mc){return "<option value='"+mc.id+"'"+(mc.id===mediaRecensionCat?" selected":"")+">"+mc.e+" "+mc.label+"</option>";}).join("");

  var entries=mediaFardig.filter(function(e){return e.cat===mediaRecensionCat;});
  var counts={};
  entries.forEach(function(e){
    var key=e.creator?e.creator:MEDIA_UNKNOWN_CREATOR;
    counts[key]=(counts[key]||0)+1;
  });
  var creators=Object.keys(counts).filter(function(k){return k!==MEDIA_UNKNOWN_CREATOR;}).sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase(),"sv");});
  if(counts[MEDIA_UNKNOWN_CREATOR])creators.push(MEDIA_UNKNOWN_CREATOR);

  var list=creators.length?creators.map(function(cr){
    var label=cr===MEDIA_UNKNOWN_CREATOR?"Okänd kreatör":cr;
    return "<div class='khist' style='display:flex;align-items:center;gap:8px' data-reccreator='"+esc(cr)+"'>"
      +"<div style='flex:1;min-width:0'><div class='kmsg' style='white-space:normal;font-weight:600'>"+esc(label)+"</div>"
      +"<div class='kmeta'><span class='kbadge'>"+counts[cr]+" recensioner</span></div></div>"
      +"</div>";
  }).join(""):"<div class='empty' style='padding:30px 0'><div class='eico'>📝</div>Inga recensioner i denna kategori annu.</div>";

  c.innerHTML="<button class='sec ghost' id='rec-back' style='margin-bottom:16px'>&#8592; Tillbaka</button>"
    +"<div class='lbl'>Recensioner</div>"
    +"<select id='rec-cat-select' style='width:100%;background:#10151f;border:1px solid #1c2733;border-radius:10px;color:#e4ecf7;font-size:14px;padding:10px 12px;cursor:pointer;font-family:inherit;margin-bottom:14px'>"+catOptions+"</select>"
    +"<div class='lbl'>Kreatörer</div>"+list;

  c.querySelector("#rec-back").onclick=function(){renderLogMedia();};

  if(sel)sel.onchange=function(){mediaRecensionCat=sel.value;renderMediaRecension();};
  c.querySelectorAll("[data-reccreator]").forEach(function(el){
    el.onclick=function(){mediaRecensionCreator=el.dataset.reccreator;renderMediaRecension();};
  });
}

  var entries=mediaFardig.filter(function(e){
    return e.cat===mediaRecensionCat&&(isUnknown?!e.creator:e.creator===mediaRecensionCreator);

function isoWeek(d){
  var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var dayNum=(dt.getUTCDay()+6)%7;
  dt.setUTCDate(dt.getUTCDate()-dayNum+3);
  var firstThursday=new Date(Date.UTC(dt.getUTCFullYear(),0,4));
  var weekNum=1+Math.round(((dt-firstThursday)/86400000-3+((firstThursday.getUTCDay()+6)%7))/7);
  return weekNum;
}

function renderGroupedByDate(container,items,getDate,renderItem){
  var byYear={};
  var MONTHS=["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"];
  var DAYS=["Sondag","Mandag","Tisdag","Onsdag","Torsdag","Fredag","Lordag"];

  items.forEach(function(item){
    var d=getDate(item);
    var y=d.getFullYear();
    var mo=d.getMonth();
    var day=d.getDate();
    var dayKey=y+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    var moKey=y+"-"+String(mo+1).padStart(2,"0");
    if(!byYear[y])byYear[y]={};
    if(!byYear[y][moKey])byYear[y][moKey]={month:mo,days:{}};
    if(!byYear[y][moKey].days[dayKey])byYear[y][moKey].days[dayKey]={day:day,weekday:DAYS[d.getDay()],week:isoWeek(d),items:[]};
    byYear[y][moKey].days[dayKey].items.push(item);
  });

  var html="";
  var years=Object.keys(byYear).sort(function(a,b){return b-a;});

  years.forEach(function(y){
    var yearCount=0;
    Object.keys(byYear[y]).forEach(function(mk){Object.keys(byYear[y][mk].days).forEach(function(dk){yearCount+=byYear[y][mk].days[dk].items.length;});});
    html+=folderRow(y,"y-"+y,0,"y-"+openYear,yearCount);

    if(openYear==y){
      var months=Object.keys(byYear[y]).sort(function(a,b){return b.localeCompare(a);});
      months.forEach(function(mk){
        var moData=byYear[y][mk];
        var moCount=0;Object.keys(moData.days).forEach(function(dk){moCount+=moData.days[dk].items.length;});
        var moLabel=MONTHS[moData.month];
        html+=folderRow(moLabel,"m-"+mk,1,"m-"+openMonth,moCount);

        if(openMonth==mk){
          var days=Object.keys(moData.days).sort(function(a,b){return b.localeCompare(a);});
          days.forEach(function(dk){
            var dayData=moData.days[dk];
            var dayLabel=dayData.weekday+" "+dayData.day+" <span style='color:#4a4860;font-weight:400'>(v."+dayData.week+")</span>";
            html+=folderRow(dayLabel,"d-"+dk,2,"d-"+openDay,dayData.items.length);

            if(openDay==dk){
              dayData.items.forEach(function(item){html+=renderItem(item);});
            }
          });
        }
      });
    }
  });

  container.innerHTML=html;

  container.querySelectorAll("[data-folder]").forEach(function(el){
    el.onclick=function(){
      var key=el.dataset.folder;
      var level=Number(el.dataset.level);
      if(level===0){var y=key.replace("y-","");openYear=(openYear==y?null:y);openMonth=null;openDay=null;}
      else if(level===1){var mk=key.replace("m-","");openMonth=(openMonth==mk?null:mk);openDay=null;}
      else if(level===2){var dk=key.replace("d-","");openDay=(openDay==dk?null:dk);}
      editingId=null;editingFundId=null;renderHistory();
    };
  });

  // Activity entry actions
  container.querySelectorAll(".delbtn[data-id]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();confirmDelete('Vill du ta bort aktiviteten?',function(){logs=logs.filter(function(l){return l.id!==Number(btn.dataset.id);});editingId=null;saveAndSync("aktiviteter");hdr();renderHistory();});};
  });
  container.querySelectorAll("[data-edit]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();editingId=Number(btn.dataset.edit);renderHistory();};
  });
  logs.forEach(function(log){
    if(editingId!==log.id)return;
    // Aktiv tid button
    var aktivBtn=container.querySelector("#edit-aktivtid-"+log.id);
    var editTpInp=container.querySelector("#edit-tidpunkt-"+log.id);
    bindTidpunktInp(editTpInp);
    if(aktivBtn)aktivBtn.onclick=function(){
      var now=new Date();
      var hh=String(now.getHours()).padStart(2,"0");
      var mm=String(now.getMinutes()).padStart(2,"0");
      if(editTpInp)editTpInp.value=hh+":"+mm;
    };
    // Place preset
    var placePresetEl=container.querySelector("#edit-place-preset-"+log.id);
    var placeInpEl=container.querySelector("#edit-place-"+log.id);
    if(placePresetEl&&placeInpEl)placePresetEl.onchange=function(){
      if(!placePresetEl.value)return;
      placeInpEl.value=placeInpEl.value.trim()?(placeInpEl.value.trim()+", "+placePresetEl.value):placePresetEl.value;
      placePresetEl.value="";
    };
    // Clock button
    var editClockH=0,editClockM=0;
    var existDispEl=container.querySelector("#edit-clock-disp-"+log.id);
    if(existDispEl&&existDispEl.textContent){
      var ehm=existDispEl.textContent.match(/(\d+)h/);var emm=existDispEl.textContent.match(/(\d+)m/);
      if(ehm)editClockH=parseInt(ehm[1]);if(emm)editClockM=parseInt(emm[1]);
    }
    var clockBtnEl=container.querySelector("#edit-clock-btn-"+log.id);
    if(clockBtnEl)clockBtnEl.onclick=function(){
      showClockOverlayFor(editClockH,editClockM,function(h,m){
        editClockH=h;editClockM=m;
        clockBtnEl.textContent="⏰ "+String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
        var disp=container.querySelector("#edit-clock-disp-"+log.id);
        if(disp)disp.textContent=h+"h "+m+"m";
      });
    };
    var saveBtn=container.querySelector("#save-edit-"+log.id);
    if(saveBtn){
      saveBtn.onclick=function(){
        var nameEl=container.querySelector("#edit-name-"+log.id);
        if(nameEl&&nameEl.value.trim())log.activity=nameEl.value.trim();
        var catEl=container.querySelector("#edit-cat-"+log.id);
        if(catEl)log.category=catEl.value;
        var tp=container.querySelector("#edit-tidpunkt-"+log.id);
        var tpVal=tp?tp.value.trim():"";
        var durVal=(editClockH>0||editClockM>0)?editClockH+"h "+editClockM+"m":"";
        var parts=[];if(tpVal)parts.push(tpVal);if(durVal)parts.push(durVal);
        log.time=parts.join(" | ");
        var placeEl=container.querySelector("#edit-place-"+log.id);
        log.place=placeEl?placeEl.value.trim():"";
        var noteEl=container.querySelector("#edit-note-"+log.id);
        log.note=noteEl?noteEl.value.trim():"";
        var dateEl=container.querySelector("#edit-date-"+log.id);
        if(dateEl&&dateEl.value){
          var oldDate=new Date(log.timestamp);
          var newDate=new Date(dateEl.value+"T"+oldDate.toTimeString().slice(0,8));
          if(!isNaN(newDate))log.timestamp=newDate.toISOString();
        }
        editingId=null;saveAndSync("aktiviteter");renderHistory();
      };
    }
    if(container.querySelector("#cancel-edit-"+log.id)){
      container.querySelector("#cancel-edit-"+log.id).onclick=function(){editingId=null;renderHistory();};
    }
  });

  // Funderingar entry actions
  container.querySelectorAll("[data-hdel-fund]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();confirmDelete('Vill du ta bort funderingen?',function(){fundHist=fundHist.filter(function(f){return f.id!==Number(btn.dataset.hdelFund);});editingFundId=null;saveAndSync("funderingar");renderHistory();});};
  });
  container.querySelectorAll("[data-hedit-fund]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();editingFundId=Number(btn.dataset.heditFund);render();};
  });
  fundHist.forEach(function(f){
    var saveBtn=container.querySelector("#hsave-fund-"+f.id);
    var cancelBtn=container.querySelector("#hcancel-fund-"+f.id);
    if(saveBtn){
      saveBtn.onclick=function(){
        var newText=container.querySelector("#hedit-fund-"+f.id).value.trim();
        if(newText)f.text=newText;
        var catSel=container.querySelector("#hedit-fundcat-"+f.id);
        if(catSel)f.category=catSel.value||undefined;
        editingFundId=null;saveAndSync("funderingar");renderHistory();
      };
    }
    if(cancelBtn){cancelBtn.onclick=function(){editingFundId=null;render();};}
  });

  // Samtal entry: click to open conversation
  container.querySelectorAll("[data-hconv]").forEach(function(el){
    el.onclick=function(e){
      e.stopPropagation();
      var cv=sentConvs.find(function(c){return c.id===el.dataset.hconv;});
      if(cv){
        activePersonId=cv.personId;activeConvId=cv.id;sentView="chat";
        setView("log");logSubview="skickade";render();
      }
    };
  });
}

function renderKomm(){
  var b=document.getElementById("body");

    {id:"klarhet",label:"Klarhet",desc:"Gör tydligare"},
    {id:"svar",label:"Svar",desc:"Svarsförslag"},
    {id:"omforma",label:"Omforma",desc:"Formulera idé"},
    {id:"synonymer",label:"Synonymer",desc:"Hitta synonymer"}
  ];
  var selector="<div class='lbl'>Skrivhjälp</div><div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px'>"
    +modes.map(function(m){return "<button class='mode-btn"+(kommMode===m.id?" on":"")+"' data-mode='"+m.id+"'>"+m.label+"<div class='mode-desc'>"+m.desc+"</div></button>";}).join("")
    +"</div><div id='komm-content'></div>";
  b.innerHTML=selector;
  b.querySelectorAll(".mode-btn").forEach(function(btn){
    btn.onclick=function(){
      if(btn.dataset.mode!==kommMode){kResult=null;sResult=null;oResult=null;}

    };

  renderKommContent();

function renderKommContent(){
  var c=document.getElementById("komm-content");
  if(!c)return;
  var inner="";
  if(kommMode==="klarhet")inner=buildKlarhet();
  else if(kommMode==="svar")inner=buildSvar();
  else if(kommMode==="omforma")inner=buildOmforma();
  else if(kommMode==="synonymer")inner=buildSynonymer();
  c.innerHTML=inner;
  var b=document.getElementById("body");
  if(kommMode==="klarhet")bindKlarhet(b);
  else if(kommMode==="svar")bindSvar(b);
  else if(kommMode==="omforma")bindOmforma(b);
  else if(kommMode==="synonymer")bindSynonymer(b);
}

// -- Klarhet --
function buildKlarhet(){
  if(kLoading)return spin();
  if(kResult){
    var cards=kResult.suggestions.map(function(s,i){return "<div class='scard'><div class='stone'>Forslag "+(i+1)+" - "+esc(s.tone)+"</div><div class='stext'>"+esc(s.text)+"</div>"+(s.why?"<div class='swhy'>"+esc(s.why)+"</div>":"")+"</div>";}).join("");
    return "<div class='lbl'>Ditt meddelande</div><div class='orig'>"+esc(kResult.original)+"</div><div class='lbl'>Tydligare formuleringar</div>"+cards+"<button class='sec ghost mt12' id='kny'>Analysera nytt</button>";
  }
  var hist=kHist.slice(0,5).map(function(h,i){return histRow(h,i,"kidx","<span class='kbadge'>"+esc(h.context)+"</span>");}).join("");
  return "<div class='lbl'>Till vem?</div><div class='ctx-chips'>"+ctxChips(CTXS,kCtx,"kctx")+"</div><div class='lbl'>Ditt meddelande</div><textarea class='ta' id='kta' placeholder='Klistra in meddelandet du vill gora tydligare...'>"+esc(kDraft)+"</textarea><button class='sec' id='kana'>Analysera</button>"+(hist?"<div class='mt20'><div class='lbl'>Tidigare</div>"+hist+"</div>":"");
}
function bindKlarhet(b){
  if(kLoading)return;
  if(kResult){var kny=b.querySelector("#kny");if(kny)kny.onclick=function(){kResult=null;kDraft="";renderKomm();};return;}
  bindChips(b,"kctx",function(){return kCtx;},function(v){kCtx=v;});
  var ta=b.querySelector("#kta");if(ta)ta.oninput=function(){kDraft=ta.value;};
  var kana=b.querySelector("#kana");if(kana)kana.onclick=function(){var txt=b.querySelector("#kta").value.trim();if(!txt)return;kDraft=txt;doAnalyseKlarhet(txt);};
  bindHist(b,"kidx",function(i){kResult=kHist[i];renderKomm();},function(i){kHist.splice(i,1);saveAndSync("sok");renderKomm();});
}
async function doAnalyseKlarhet(text){
  kLoading=true;renderKommContent();

      var words=g.words.map(function(w){
        return "<span style='display:inline-block;padding:6px 12px;margin:4px;border-radius:20px;background:#10151f;border:1px solid #1c2733;color:#e4ecf7;font-size:13px;cursor:pointer' data-word='"+esc(w)+"'>"+esc(w)+"</span>";

        +"</div>";

    return "<div class='lbl'>Synonymer för</div><div class='orig'>"+esc(synResult.word)+"</div>"
      +"<div class='lbl'>Klicka för att kopiera</div>"

      +"<div style='flex:1;min-width:0'><div class='kmsg'>"+esc(h.word)+"</div>"
      +"<div class='kmeta'><span>"+fd(h.timestamp)+"</span></div></div>"
      +"<button class='delbtn' data-delsynidx='"+i+"' style='flex-shrink:0;font-size:18px;padding:0 2px'>x</button>"
      +"</div>";
  }).join("");

    +"<div class='row'><input class='inp' id='synin' placeholder='T.ex. glad, snabb, säga...' value='"+esc(synDraft)+"'/>"

    +(hist?"<div class='mt20'><div class='lbl'>Tidigare</div>"+hist+"</div>":"");
}
function bindSynonymer(b){
  if(synLoading)return;
  if(synResult){
    b.querySelectorAll("[data-word]").forEach(function(el){
      el.onclick=function(){copyText(el.dataset.word);showCopyOk("syncok");};
    });
    var synny=b.querySelector("#synny");if(synny)synny.onclick=function(){synResult=null;synDraft="";renderKommContent();};
    return;
  }
  var si=b.querySelector("#synin");
  if(si){
    si.oninput=function(){synDraft=si.value;};
    si.onkeydown=function(e){if(e.key==="Enter"&&si.value.trim())doFetchSynonymer(si.value.trim());};
  }
  var sf=b.querySelector("#synfetch");
  if(sf)sf.onclick=function(){var v=b.querySelector("#synin").value.trim();if(v)doFetchSynonymer(v);};
  b.querySelectorAll("[data-synidx]").forEach(function(el){
    el.onclick=function(e){if(!e.target.dataset.delsynidx){synResult=synHist[Number(el.dataset.synidx)];renderKommContent();}};
  });
  b.querySelectorAll("[data-delsynidx]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();synHist.splice(Number(btn.dataset.delsynidx),1);saveAndSync("sok");renderKommContent();};
  });
}
async function doFetchSynonymer(word){
  synLoading=true;synDraft=word;renderKommContent();
  var sys='Du ar en sprakexpert. Ge synonymer och liknande uttryck pa svenska. Svara BARA med giltig JSON utan backticks: {"groups":[{"label":"Vanliga synonymer","words":["...","...","..."]},{"label":"Mer formella","words":["...","...","..."]},{"label":"Mer informella","words":["...","...","..."]}]} Ge 4-6 ord per grupp.';
  try{
    var res=await aiCall(sys,"Hitta synonymer för: "+word,800);
    var data=await res.json();
    var parsed=JSON.parse(aiText(data).replace(/```json|```/g,"").trim());
    synResult={id:Date.now(),word:word,groups:parsed.groups||[],timestamp:new Date().toISOString()};
    synHist=[synResult].concat(synHist).slice(0,20);saveAndSync("sok");
  }catch(e){
    synResult={id:Date.now(),word:word,timestamp:new Date().toISOString(),groups:[{label:"Fel",words:["Kunde inte hämta synonymer. Försök igen."]}]};
  }
  synLoading=false;renderKommContent();
}

var fDetailLoading=false;

function renderForklara(){
  var b=document.getElementById("body");
  if(fLoading||fDetailLoading){b.innerHTML=spin();return;}
  if(fResult){
    var answer=fResult.explanations&&fResult.explanations[0]?fResult.explanations[0].text:fResult.text||"";
    var isDetailed=fResult.detailed||false;
    b.innerHTML="<div class='lbl'>Din fraga</div>"
      +"<textarea class='ta' id='fta' style='margin-bottom:8px'>"+esc(fResult.question)+"</textarea>"
      +"<div class='tbox' id='fanswerbox' style='cursor:pointer' title='Klicka for att kopiera'>"+esc(answer)+"</div>"
      +"<div class='copy-ok' id='fcopyok' style='text-align:center;margin-bottom:8px'>Kopierat!</div>"
      +"<div style='display:flex;gap:8px;margin-bottom:8px'>"
      +"<button class='sec' id='fagain' style='flex:1'>Sök igen</button>"
      +(isDetailed?"":"<button class='sec ghost' id='fdetail' style='flex:1'>Mer detaljerat</button>")
      +"</div>"
      +"<button class='sec ghost' id='fny' style='width:100%'>Ny fråga</button>";

    b.querySelector("#fanswerbox").onclick=function(){copyText(answer);showCopyOk("fcopyok");};
    b.querySelector("#fagain").onclick=function(){
      var txt=b.querySelector("#fta").value.trim();
      if(!txt)return;
      fResult=null;doFetchForklara(txt,false);
    };
    if(!isDetailed){
      b.querySelector("#fdetail").onclick=function(){doFetchForklara(fResult.question,true);};
    }
    b.querySelector("#fny").onclick=function(){fResult=null;fDraft="";renderForklara();};
    return;
  }
  var hist=fHist.slice(0,5).map(function(h,i){return histRow(h,i,"fidx","");}).join("");
  b.innerHTML="<div class='lbl'>Vad vill du forsta?</div>"
    +"<textarea class='ta' id='fta' placeholder='T.ex. Vad ar inflation? Hur fungerar en motor?'>"+esc(fDraft)+"</textarea>"
    +"<button class='sec' id='ffetch'>Sök</button>"
    +"<div style='margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px'>"
    +"<label style='display:block;padding:10px;background:#0c1119;border:1px dashed #1c2733;border-radius:10px;text-align:center;cursor:pointer;font-size:13px;color:#6b6880'>"
    +"📁 Ladda upp bild"
    +"<input type='file' id='fimgupload' accept='image/*' style='display:none'/></label>"
    +"<button id='fopen-camera-btn' type='button' style='padding:10px;background:#0c1119;border:1px dashed #1c2733;border-radius:10px;text-align:center;cursor:pointer;font-size:13px;color:#6b6880;font-family:inherit;width:100%'>📷 Ta bild</button>"
    +"</div>"
    +"<div id='fcamera-container' style='display:none;margin-top:8px'>"
    +"<video id='fcamera-video' autoplay playsinline style='width:100%;border-radius:10px;max-height:220px;object-fit:cover;background:#000'></video>"
    +"<div style='display:flex;gap:8px;margin-top:8px'>"
    +"<button id='fsnap-btn' type='button' style='flex:1;padding:10px;border-radius:10px;background:#00d4ff;border:none;color:#080a10;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit'>📸 Ta foto</button>"
    +"<button id='fclose-camera-btn' type='button' style='padding:10px 14px;border-radius:10px;background:#0c1119;border:1px solid #1c2733;color:#f87171;font-size:13px;cursor:pointer;font-family:inherit'>✕</button>"
    +"</div>"
    +"</div>"
    +"<canvas id='fsnap-canvas' style='display:none'></canvas>"
    +(hist?"<div class='mt20'><div class='lbl'>Tidigare fragor</div>"+hist+"</div>":"");
  var ta=b.querySelector("#fta");if(ta)ta.oninput=function(){fDraft=ta.value;};
  b.querySelector("#ffetch").onclick=function(){var txt=b.querySelector("#fta").value.trim();if(!txt)return;fDraft=txt;doFetchForklara(txt,false);};
  var fimg=b.querySelector("#fimgupload");
  if(fimg)fimg.onchange=function(){if(fimg.files&&fimg.files[0])doFetchForklaraBild(fimg.files[0]);};

  // Camera for Sök
  var fCamStream=null;
  var fOpenBtn=b.querySelector("#fopen-camera-btn");
  var fCloseBtn=b.querySelector("#fclose-camera-btn");
  var fSnapBtn=b.querySelector("#fsnap-btn");
  var fCamContainer=b.querySelector("#fcamera-container");
  var fCamVideo=b.querySelector("#fcamera-video");
  var fSnapCanvas=b.querySelector("#fsnap-canvas");

  function fStopCamera(){
    if(fCamStream){fCamStream.getTracks().forEach(function(t){t.stop();});fCamStream=null;}
    if(fCamContainer)fCamContainer.style.display="none";
  }

  if(fOpenBtn){
    fOpenBtn.onclick=function(){
      if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){alert("Kameran stöds inte.");return;}
      navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false})
        .then(function(s){fCamStream=s;if(fCamVideo)fCamVideo.srcObject=s;if(fCamContainer)fCamContainer.style.display="block";})
        .catch(function(){
          navigator.mediaDevices.getUserMedia({video:true,audio:false})
            .then(function(s){fCamStream=s;if(fCamVideo)fCamVideo.srcObject=s;if(fCamContainer)fCamContainer.style.display="block";})
            .catch(function(e){alert("Kunde inte starta kameran: "+e.message);});
        });
    };
  }
  if(fCloseBtn)fCloseBtn.onclick=fStopCamera;
  if(fSnapBtn){
    fSnapBtn.onclick=function(){
      if(!fCamVideo||!fSnapCanvas)return;
      fSnapCanvas.width=fCamVideo.videoWidth;fSnapCanvas.height=fCamVideo.videoHeight;
      fSnapCanvas.getContext("2d").drawImage(fCamVideo,0,0);
      fSnapCanvas.toBlob(function(blob){
        fStopCamera();
        var file=new File([blob],"kamera-foto.jpg",{type:"image/jpeg"});
        doFetchForklaraBild(file);
      },"image/jpeg",0.92);
    };
  }

  bindHist(b,"fidx",function(i){fResult=fHist[i];renderForklara();},function(i){fHist.splice(i,1);saveAndSync("sok");renderForklara();});
}

async function doFetchForklara(question,detailed){
  if(detailed)fDetailLoading=true;else fLoading=true;
  renderForklara();
  var sys=detailed
    ?"Du ar en pedagog. Ge en detaljerad och djupgående förklaring av ämnet pa svenska. Svara med ren text, inga JSON-taggar."
    :"Du ar en pedagog. Ge en kort, enkel och lättförståelig förklaring av ämnet pa svenska. Max 3-4 meningar. Svara med ren text, inga JSON-taggar.";
  try{
    var res=await aiCall(sys,"Förklara: "+question,detailed?1500:600);
    var data=await res.json();
    var text=aiText(data)||"Kunde inte hämta förklaring.";
    fResult={id:Date.now(),question:question,text:text,detailed:detailed,explanations:[{level:detailed?"Detaljerad":"Enkel",text:text}],timestamp:new Date().toISOString()};
    if(!detailed){fHist=[fResult].concat(fHist).slice(0,20);saveAndSync("sok");}
  }catch(e){
    fResult={id:Date.now(),question:question,text:"Kunde inte hämta förklaring. Försök igen.",detailed:detailed,explanations:[{level:"Fel",text:"Kunde inte hämta förklaring."}],timestamp:new Date().toISOString()};
  }
  if(detailed)fDetailLoading=false;else fLoading=false;
  renderForklara();
}

async function doFetchForklaraBild(file){
  fLoading=true;renderForklara();
  try{
    var dataUrl=await new Promise(function(res,rej){
      var r=new FileReader();
      r.onload=function(){res(r.result);};
      r.onerror=function(){rej(new Error("Filfel"));};
      r.readAsDataURL(file);
    });
    var res=await fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      model:"anthropic/claude-sonnet-4.6",max_tokens:400,
      messages:[
        {role:"user",content:[
          {type:"image_url",image_url:{url:dataUrl}},
          {type:"text",text:"Du ar en pedagog. Ge en kort, enkel och lättförståelig förklaring pa svenska av vad du ser pa bilden. Max 3-4 meningar."}
        ]}
      ]
    })});
    var data=await res.json();
    var text=aiText(data)||"Kunde inte analysera bilden.";
    if(data.error){text="Fel: "+JSON.stringify(data.error);}
    fResult={id:Date.now(),question:"[Bild: "+file.name+"]",text:text,detailed:false,explanations:[{level:"Enkel",text:text}],timestamp:new Date().toISOString()};
    fHist=[fResult].concat(fHist).slice(0,20);saveAndSync("sok");
  }catch(e){
    fResult={id:Date.now(),question:"[Bild]",text:"Kunde inte analysera bilden: "+e.message,detailed:false,explanations:[{level:"Fel",text:"Kunde inte analysera bilden."}],timestamp:new Date().toISOString()};
  }
  fLoading=false;renderForklara();
}

  if(ti){
    ti.oninput=function(){tInput=ti.value;};
    ti.onkeydown=function(e){if(e.key==="Enter"&&!e.shiftKey&&ti.value.trim()){e.preventDefault();doSendTerapi(ti.value.trim());}};
    if(!tLoading)setTimeout(function(){ti.focus();},50);
  }
  b.querySelector("#tsend").onclick=function(){var v=b.querySelector("#tinp").value.trim();if(v)doSendTerapi(v);};
  if(tMessages.length){
    b.querySelector("#tsave").onclick=function(){
      var summary=tMessages[0]?tMessages[0].content.slice(0,60)+"...":"Samtal";
      tHist=[{id:Date.now(),summary:summary,messages:tMessages.slice(),timestamp:new Date().toISOString()}].concat(tHist).slice(0,20);
      tMessages=[];tInput="";saveAndSync("terapi");renderTerapi();
    };
    b.querySelector("#tclear").onclick=function(){tMessages=[];tInput="";renderTerapi();};
  }
  bindHist(b,"tidx",
    function(i){tMessages=tHist[i].messages.slice();renderTerapi();},
    function(i){tHist.splice(i,1);saveAndSync("terapi");renderTerapi();}
  );
  // Scroll chat to bottom
  var ca=b.querySelector(".chat-area");if(ca)ca.scrollTop=ca.scrollHeight;
}
async function doSendTerapi(text){
  tMessages.push({role:"user",content:text});
  tInput="";tLoading=true;renderTerapi();
  var sys="Du ar en empatisk samtalsstod. Lyssna aktivt, stalla genomtankta foljdfragor och hjalp personen reflektera over sina tankar och ideer. Ge rad nar det frages men fokusera annars pa att hjalpa personen tanka igenom sina egna losningar. Svara pa svenska, var varm. Halla svaren kortfattade (max 3-4 meningar).";
  var history=tMessages.slice(-12).map(function(m){return {role:m.role,content:m.content};});
  try{
    var res=await aiChat(sys,history,600);
    var data=await res.json();
    var reply=data.choices&&data.choices[0]?data.choices[0].message.content||"":"Kunde inte svara. Forsok igen.";
    tMessages.push({role:"assistant",content:reply});
  }catch(e){tMessages.push({role:"assistant",content:"Nagot gick fel. Forsok igen."});}
  tLoading=false;renderTerapi();
}

async function downloadZip(statusEl){
  if(!window.JSZip){if(statusEl)statusEl.innerHTML="<div style='color:#f87171;font-size:13px;margin-top:8px'>JSZip inte laddad.</div>";return;}
  if(statusEl)statusEl.innerHTML="<div style='color:#6b6880;font-size:13px;margin-top:8px'>Skapar ZIP...</div>";
  var zip=new JSZip();
  var date=new Date().toISOString().slice(0,10);

  // JSON files per tab
  var jsonFiles=[
    {path:"Logga/Aktivitet/data.json",data:{logs:logs}},
    {path:"Logga/Samtal/data.json",data:{sentPeople:sentPeople,sentConvs:sentConvs,sentMsgs:sentMsgs}},
    {path:"Logga/Funderingar/data.json",data:{fundHist:fundHist}},
    {path:"Logga/Media/data.json",data:{mediaList:mediaList,mediaFardig:mediaFardig}},
    {path:"Sok/data.json",data:{fHist:fHist}},
    {path:"Text/data.json",data:{kHist:kHist,sHist:sHist,oHist:oHist,synHist:synHist}},
    {path:"Terapi/data.json",data:{tHist:tHist}},
    {path:"Tips/Tips/data.json",data:{tipsHistory:tipsHistory}},
    {path:"Tips/Skamt/data.json",data:{savedJokes:savedJokes}},
    {path:"Historik/Bilder/index.json",data:{images:imageHist.map(function(i){return {id:i.id,logId:i.logId,activity:i.activity,category:i.category,mtype:i.mtype,timestamp:i.timestamp,driveId:i.driveId||null};})}},
    {path:"Installningar/data.json",data:{placePresets:PLACE_PRESETS,actPresets:ACT_PRESETS,catPresets:CAT_PRESETS,fundCatPresets:FUND_CAT_PRESETS}}
  ];
  jsonFiles.forEach(function(f){
    zip.file(f.path,JSON.stringify(f.data,null,2));
  });

  // Images — load from Drive if needed
  var imgCount=0;
  for(var i=0;i<imageHist.length;i++){
    var img=imageHist[i];
    var b64=img.base64;
    if(!b64&&img.driveId){
      if(statusEl)statusEl.innerHTML="<div style='color:#6b6880;font-size:13px;margin-top:8px'>Hämtar bild "+(i+1)+"/"+imageHist.length+"...</div>";
      b64=await loadImageBase64(img);
    }
    if(b64){
      var fname=buildImageFilename(img);
      var binary=atob(b64);
      var bytes=new Uint8Array(binary.length);
      for(var j=0;j<binary.length;j++)bytes[j]=binary.charCodeAt(j);
      zip.file("Historik/Bilder/"+fname,bytes,{binary:true});
      imgCount++;
    }
  }

  if(statusEl)statusEl.innerHTML="<div style='color:#6b6880;font-size:13px;margin-top:8px'>Packar ZIP...</div>";
  var blob=await zip.generateAsync({type:"blob",compression:"DEFLATE"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="AI-Assistent-"+date+".zip";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  if(statusEl)statusEl.innerHTML="<div style='color:#4ade80;font-size:13px;margin-top:8px'>✓ ZIP nedladdad med "+jsonFiles.length+" JSON-filer och "+imgCount+" bilder.</div>";
}
