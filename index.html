function fd(iso){return new Date(iso).toLocaleDateString("sv-SE",{weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function copyText(txt){
  if(navigator.clipboard){navigator.clipboard.writeText(txt).catch(function(){});}
  else{var t=document.createElement("textarea");t.value=txt;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);}
}

function loadLocal(){
  try{
    var d=JSON.parse(localStorage.getItem("akt_data")||"{}");
    logs=d.logs||[];kHist=d.kHist||[];sHist=d.sHist||[];oHist=d.oHist||[];fHist=d.fHist||[];tHist=d.tHist||[];synHist=d.synHist||[];
    driveFileId=localStorage.getItem("drive_fid")||null;
    var ui=localStorage.getItem("user_info");if(ui)userInfo=JSON.parse(ui);
  }catch(e){}
}
function saveLocal(){
  try{localStorage.setItem("akt_data",JSON.stringify({logs:logs,kHist:kHist,sHist:sHist,oHist:oHist,fHist:fHist,tHist:tHist,synHist:synHist}));}catch(e){}
}
function startLogin(){
  var params=new URLSearchParams({client_id:CLIENT_ID,redirect_uri:REDIRECT_URI,response_type:"token",scope:SCOPE,include_granted_scopes:"true",prompt:"select_account"});
  location.href="https://accounts.google.com/o/oauth2/v2/auth?"+params.toString();
}
async function init(){
  loadLocal();
  var savedToken=localStorage.getItem("akt_token");
  var tokenTime=parseInt(localStorage.getItem("token_time")||"0");
  if(savedToken&&(Date.now()-tokenTime)<55*60*1000){
    accessToken=savedToken;
    var ok=await checkToken();
    if(ok){if(!userInfo)await fetchUserInfo();showApp();syncNow();return;}
  }
  localStorage.removeItem("akt_token");localStorage.removeItem("token_time");
  var dbg=document.getElementById("debug-msg");
  if(dbg)dbg.textContent="Redirect URI: "+REDIRECT_URI;
  showLogin();
}
async function checkToken(){
  try{var r=await fetch("https://www.googleapis.com/oauth2/v3/tokeninfo?access_token="+accessToken);var d=await r.json();return !d.error;}catch(e){return false;}
}
async function fetchUserInfo(){
  try{var r=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+accessToken}});userInfo=await r.json();localStorage.setItem("user_info",JSON.stringify(userInfo));}catch(e){}
}
function showLogin(){document.getElementById("login-screen").style.display="block";document.getElementById("main-app").style.display="none";}
function showApp(){
  localStorage.setItem("akt_token",accessToken);localStorage.setItem("token_time",Date.now());
  document.getElementById("login-screen").style.display="none";document.getElementById("main-app").style.display="block";
  renderUserRow();
  document.querySelectorAll(".tab").forEach(function(btn){
    btn.onclick=function(){
      if(btn.dataset.v==="tips"){setView("tips");renderTips();}
      else{setView(btn.dataset.v);render();}
    };
  });
  setTimeout(function(){setSyncBtn("err","Session utgangen");setTimeout(function(){localStorage.removeItem("akt_token");localStorage.removeItem("token_time");accessToken=null;showLogin();},3000);},58*60*1000);
  render();
}
function renderUserRow(){
  var r=document.getElementById("user-row");if(!r||!userInfo)return;
  var name=userInfo.name||userInfo.email||"Inloggad";
  var initials=name.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
  r.innerHTML="<div class='avatar'>"+initials+"</div><span style='color:#c4c0d4;font-size:12px'>"+esc(name)+"</span><span class='signout' onclick='signOut()'>Logga ut</span>";

function signOut(){["akt_token","token_time","user_info","drive_fid"].forEach(function(k){localStorage.removeItem(k);});accessToken=null;userInfo=null;driveFileId=null;showLogin();}
function setSyncBtn(cls,label){var b=document.getElementById("sync-btn");if(!b)return;b.className="sync-btn"+(cls?" "+cls:"");b.textContent=label;}
async function syncNow(){
  if(!accessToken){setSyncBtn("err","Ej inloggad");return;}
  setSyncBtn("","Synkar...");
  try{
    var remote=await driveRead();
    if(remote){var m=mergeData(remote);logs=m.logs;kHist=m.kHist;sHist=m.sHist;oHist=m.oHist;fHist=m.fHist;tHist=m.tHist;synHist=m.synHist;}
    await driveWrite();saveLocal();
    setSyncBtn("ok","Synkad");setTimeout(function(){setSyncBtn("","Synka");},3000);
    hdr();render();
  }catch(e){setSyncBtn("err","Synk misslyckades");setTimeout(function(){setSyncBtn("","Synka");},3000);}
}
function mergeData(remote){
  function mergeArr(a,b){var map=new Map();(a||[]).concat(b||[]).forEach(function(x){map.set(String(x.id||x.timestamp),x);});return Array.from(map.values()).sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});}
  return{logs:mergeArr(logs,remote.logs),kHist:mergeArr(kHist,remote.kHist),sHist:mergeArr(sHist,remote.sHist),oHist:mergeArr(oHist,remote.oHist||[]),fHist:mergeArr(fHist,remote.fHist||[]),tHist:mergeArr(tHist,remote.tHist||[]),synHist:mergeArr(synHist,remote.synHist||[])};
}
async function driveRead(){
  if(!driveFileId){var r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='"+FILE_NAME+"'&fields=files(id)",{headers:{Authorization:"Bearer "+accessToken}});var d=await r.json();if(d.files&&d.files.length>0){driveFileId=d.files[0].id;localStorage.setItem("drive_fid",driveFileId);}else return null;}
  var r2=await fetch("https://www.googleapis.com/drive/v3/files/"+driveFileId+"?alt=media",{headers:{Authorization:"Bearer "+accessToken}});
  if(!r2.ok){driveFileId=null;localStorage.removeItem("drive_fid");return null;}
  return await r2.json();
}
async function driveWrite(){
  var body=JSON.stringify({logs:logs,kHist:kHist,sHist:sHist,oHist:oHist,fHist:fHist,tHist:tHist,synHist:synHist});

}

function ctxChips(list,current,attr){
  return list.map(function(c){return "<button class='ctx-chip"+(c===current?" on":"")+"' data-"+attr+"='"+esc(c)+"'>"+esc(c)+"</button>";}).join("");
}
function bindChips(b,attr,getCurrent,setCurrent){
  b.querySelectorAll("[data-"+attr+"]").forEach(function(btn){btn.onclick=function(){setCurrent(btn.dataset[attr]);b.querySelectorAll("[data-"+attr+"]").forEach(function(x){x.classList.toggle("on",x.dataset[attr]===getCurrent());});};});
}
function histRow(h,i,attr,labelHtml){
  return "<div class='khist' style='display:flex;align-items:flex-start;gap:8px' data-"+attr+"='"+i+"'>"
    +"<div style='flex:1;min-width:0'><div class='kmsg'>"+esc(h.original||h.idea||h.question||h.summary||"")+"</div>"
    +"<div class='kmeta'>"+labelHtml+"<span>"+fd(h.timestamp)+"</span></div></div>"
    +"<button class='delbtn' data-del"+attr+"='"+i+"' style='flex-shrink:0;font-size:18px;padding:0 2px'>x</button>"
    +"</div>";
}
function bindHist(b,attr,clickFn,delFn){
  b.querySelectorAll("[data-"+attr+"]").forEach(function(el){el.onclick=function(e){if(!e.target.dataset["del"+attr])clickFn(Number(el.dataset[attr]));};});
  b.querySelectorAll("[data-del"+attr+"]").forEach(function(btn){btn.onclick=function(e){e.stopPropagation();delFn(Number(btn.dataset["del"+attr]));};});
}

function renderLog(){

  var stats="";
  if(logs.length){stats="<div class='mt20'><div class='lbl'>Kategorier</div>";CATS.forEach(function(c){var n=logs.filter(function(l){return l.category===c.id;}).length;if(n>0)stats+="<div class='srow'><span>"+c.e+"</span><span style='flex:1;font-size:13px;color:#c4c0d4'>"+c.label+"</span><span class='sbadge'>"+n+"</span></div>";});stats+="</div>";}
  b.innerHTML="<div class='lbl'>Kategori</div><div class='chips'>"+catChips+"</div>"
    +"<div class='lbl'>Aktivitet</div>"
    +"<div class='row'><input class='inp' id='ci' placeholder='Vad gjorde du?'/><button class='abtn' id='addbtn'>+</button></div>"
    +"<div class='lbl'>Tid (valfritt)</div>"

    +"<div class='lbl'>Anteckning (valfritt)</div>"
    +"<input class='inp w100' id='ni' placeholder='Egna tankar eller kommentarer...'/>"

  var ci=b.querySelector("#ci");

  b.querySelector("#addbtn").onclick=function(){if(ci.value.trim())addAct(ci.value.trim());};

function addAct(activity){
  var ni=document.querySelector("#ni");
  var ti=document.querySelector("#ti");
  var timeVal=ti?ti.value.trim():"";
  var noteVal=ni?ni.value.trim():"";
  logs.unshift({id:Date.now(),category:cat,activity:activity,time:timeVal,note:noteVal,timestamp:new Date().toISOString()});
  saveAndSync();hdr();renderLog();
  var fz=document.getElementById("fz");
  if(fz){fz.innerHTML="<div class='ok-toast'>Loggad: "+esc(activity)+"</div>";setTimeout(function(){if(fz)fz.innerHTML="";},2200);}
}

// ---- HISTORIK ----
var editingId=null;

function renderHistory(){
  var b=document.getElementById("body");
  if(!logs.length){b.innerHTML="<div class='empty'><div class='eico'>📋</div>Inga aktiviteter annu.</div>";return;}
  b.innerHTML=logs.map(function(log){
    var c=CATS.find(function(x){return x.id===log.category;});
    if(editingId===log.id){
      return "<div class='entry' style='flex-direction:column;gap:10px'>"
        +"<div style='display:flex;align-items:center;gap:10px'>"
        +"<span style='font-size:20px'>"+(c?c.e:"✨")+"</span>"
        +"<div class='etitle' style='flex:1'>"+esc(log.activity)+"</div>"
        +"</div>"
        +"<input class='inp w100' id='edit-time-"+log.id+"' placeholder='Tid (t.ex. 45 min)' value='"+esc(log.time||"")+"'/>"
        +"<input class='inp w100' id='edit-note-"+log.id+"' placeholder='Anteckning...' value='"+esc(log.note||"")+"'/>"
        +"<div style='display:flex;gap:8px'>"
        +"<button class='sec' id='save-edit-"+log.id+"' style='flex:1'>Spara</button>"
        +"<button class='sec ghost' id='cancel-edit-"+log.id+"' style='flex:1'>Avbryt</button>"
        +"</div>"
        +"</div>";
    }
    return "<div class='entry'>"
      +"<span style='font-size:20px'>"+(c?c.e:"✨")+"</span>"
      +"<div style='flex:1'>"
      +"<div class='etitle'>"+esc(log.activity)+"</div>"
      +(log.time?"<div class='enote' style='color:#a78bfa'>"+esc(log.time)+"</div>":"")
      +(log.note?"<div class='enote'>"+esc(log.note)+"</div>":"")
      +"<div class='etime'>"+fd(log.timestamp)+"</div>"
      +"</div>"
      +"<button class='delbtn' data-edit='"+log.id+"' style='color:#6b6880;font-size:14px;padding:2px 6px' title='Redigera'>✏️</button>"
      +"<button class='delbtn' data-id='"+log.id+"'>x</button>"
      +"</div>";
  }).join("");

  b.querySelectorAll(".delbtn[data-id]").forEach(function(btn){
    btn.onclick=function(){logs=logs.filter(function(l){return l.id!==Number(btn.dataset.id);});editingId=null;saveAndSync();hdr();renderHistory();};
  });
  b.querySelectorAll("[data-edit]").forEach(function(btn){
    btn.onclick=function(){editingId=Number(btn.dataset.edit);renderHistory();};
  });
  logs.forEach(function(log){
    var saveBtn=b.querySelector("#save-edit-"+log.id);
    var cancelBtn=b.querySelector("#cancel-edit-"+log.id);
    if(saveBtn){
      saveBtn.onclick=function(){
        var timeVal=b.querySelector("#edit-time-"+log.id).value.trim();
        var noteVal=b.querySelector("#edit-note-"+log.id).value.trim();
        log.time=timeVal;
        log.note=noteVal;
        editingId=null;
        saveAndSync();renderHistory();
      };
    }
    if(cancelBtn){cancelBtn.onclick=function(){editingId=null;renderHistory();};}
  });
}

// ---- KOMMUNIKATION ----
function renderKomm(){
  var b=document.getElementById("body");
  var modes=[
    {id:"klarhet",label:"Klarhet",desc:"Gör tydligare"},
    {id:"svar",label:"Svar",desc:"Svarsförslag"},
    {id:"omforma",label:"Omforma",desc:"Formulera idé"},
    {id:"synonymer",label:"Synonymer",desc:"Hitta synonymer"}
  ];
  var selector="<div class='lbl'>Skrivhjälp</div><div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px'>"
    +modes.map(function(m){return "<button class='mode-btn"+(kommMode===m.id?" on":"")+"' data-mode='"+m.id+"'>"+m.label+"<div class='mode-desc'>"+m.desc+"</div></button>";}).join("")
    +"</div><div id='komm-content'></div>";
  b.innerHTML=selector;
  b.querySelectorAll(".mode-btn").forEach(function(btn){
    btn.onclick=function(){
      if(btn.dataset.mode!==kommMode){kResult=null;sResult=null;oResult=null;}
      kommMode=btn.dataset.mode;renderKommContent();
    };
  });
  renderKommContent();
}
function renderKommContent(){
  var c=document.getElementById("komm-content");
  if(!c)return;
  var inner="";
  if(kommMode==="klarhet")inner=buildKlarhet();
  else if(kommMode==="svar")inner=buildSvar();
  else if(kommMode==="omforma")inner=buildOmforma();
  else if(kommMode==="synonymer")inner=buildSynonymer();
  c.innerHTML=inner;
  var b=document.getElementById("body");
  if(kommMode==="klarhet")bindKlarhet(b);
  else if(kommMode==="svar")bindSvar(b);
  else if(kommMode==="omforma")bindOmforma(b);
  else if(kommMode==="synonymer")bindSynonymer(b);
}

function buildKlarhet(){
  if(kLoading)return spin();

    var cards=kResult.suggestions.map(function(s,i){return "<div class='scard'><div class='stone'>Forslag "+(i+1)+" - "+esc(s.tone)+"</div><div class='stext'>"+esc(s.text)+"</div>"+(s.why?"<div class='swhy'>"+esc(s.why)+"</div>":"")+"</div>";}).join("");
    return "<div class='lbl'>Ditt meddelande</div><div class='orig'>"+esc(kResult.original)+"</div><div class='lbl'>Tydligare formuleringar</div>"+cards+"<button class='sec ghost mt12' id='kny'>Analysera nytt</button>";

function bindKlarhet(b){
  if(kLoading)return;
  if(kResult){var kny=b.querySelector("#kny");if(kny)kny.onclick=function(){kResult=null;kDraft="";renderKomm();};return;}

async function doAnalyseKlarhet(text){
  kLoading=true;renderKommContent();

  try{var res=await aiCall(sys,"Originalmeddelande: "+text,1000);var data=await res.json();var parsed=JSON.parse(aiText(data).replace(/```json|```/g,"").trim());kResult={id:Date.now(),original:text,context:kCtx,suggestions:parsed.suggestions||[],timestamp:new Date().toISOString()};kHist=[kResult].concat(kHist).slice(0,20);saveAndSync();}
  catch(e){kResult={id:Date.now(),original:text,context:kCtx,timestamp:new Date().toISOString(),suggestions:[{tone:"Fel",text:"Kunde inte analysera. Forsok igen.",why:""}]};}

  var b=document.getElementById("body");
  if(fLoading){b.innerHTML=spin();return;}
  if(fResult){
    var cards=fResult.explanations.map(function(e,i){return "<div class='scard' data-foi='"+i+"'><div class='stone'>"+esc(e.level)+"</div><div class='stext'>"+esc(e.text)+"</div><div class='copy-ok' id='fcok"+i+"'>Kopierat!</div></div>";}).join("");
    b.innerHTML="<div class='lbl'>Din fraga</div><div class='orig'>"+esc(fResult.question)+"</div><div class='lbl'>Forklaringar - tryck for att kopiera</div>"+cards+"<button class='sec ghost mt12' id='fny'>Stall en ny fraga</button>";
    b.querySelectorAll("[data-foi]").forEach(function(card){card.onclick=function(){copyText(fResult.explanations[Number(card.dataset.foi)].text);showCopyOk("fcok"+card.dataset.foi);};});
    b.querySelector("#fny").onclick=function(){fResult=null;fDraft="";renderForklara();};return;
  }
  var hist=fHist.slice(0,5).map(function(h,i){return histRow(h,i,"fidx","");}).join("");
  b.innerHTML="<div class='lbl'>Vad vill du forsta?</div><textarea class='ta' id='fta' placeholder='T.ex. Vad ar inflation? Hur fungerar en motor?'>"+esc(fDraft)+"</textarea><button class='sec' id='ffetch'>Forklara for mig</button>"+(hist?"<div class='mt20'><div class='lbl'>Tidigare fragor</div>"+hist+"</div>":"");
  var ta=b.querySelector("#fta");if(ta)ta.oninput=function(){fDraft=ta.value;};
  b.querySelector("#ffetch").onclick=function(){var txt=b.querySelector("#fta").value.trim();if(!txt)return;fDraft=txt;doFetchForklara(txt);};
  bindHist(b,"fidx",function(i){fResult=fHist[i];renderForklara();},function(i){fHist.splice(i,1);saveAndSync();renderForklara();});
}
async function doFetchForklara(question){
  fLoading=true;renderForklara();
  var sys="Du ar en pedagog. Forklara amnet pa tre nivan. Svara BARA med giltig JSON: {\"explanations\":[{\"level\":\"Enkel\",\"text\":\"...\"},{\"level\":\"Mellanniva\",\"text\":\"...\"},{\"level\":\"Detaljerad\",\"text\":\"...\"}]}";
  try{var res=await aiCall(sys,"Forklara: "+question,1500);var data=await res.json();var parsed=JSON.parse(aiText(data).replace(/```json|```/g,"").trim());fResult={id:Date.now(),question:question,explanations:parsed.explanations||[],timestamp:new Date().toISOString()};fHist=[fResult].concat(fHist).slice(0,20);saveAndSync();}
  catch(e){fResult={id:Date.now(),question:question,timestamp:new Date().toISOString(),explanations:[{level:"Fel",text:"Kunde inte hamta forklaring. Forsok igen."}]};}
  fLoading=false;renderForklara();
}

// ---- TERAPI ----
function renderTerapi(){
  var b=document.getElementById("body");
  var chatHtml="";
  if(tMessages.length){
    chatHtml="<div class='chat-area'>"
      +tMessages.map(function(m){
        if(m.role==="user"){
          return "<div style='display:flex;justify-content:flex-end'><div class='bubble-me'>"+esc(m.content)+"</div></div>";
        }
        return "<div style='display:flex;justify-content:flex-start'><div class='bubble-them'>"+esc(m.content)+"</div></div>";
      }).join("")
      +(tLoading?"<div style='display:flex;justify-content:flex-start'><div class='bubble-them' style='color:#6b6880;font-style:italic'>Skriver...</div></div>":"")
      +"</div>";
  } else {
    chatHtml="<div style='text-align:center;padding:32px 0 20px;color:#6b6880;font-size:14px;line-height:1.7'>"
      +"<div style='font-size:36px;margin-bottom:12px'>🧠</div>"
      +"Jag ar har for att lyssna och hjalpa dig reflektera.<br>Dela dina tankar, bekymmer eller ideer.</div>";
  }
  var savedHist="";
  if(tHist.length){
    savedHist="<div class='mt20'><div class='lbl'>Sparade samtal</div>"
      +tHist.slice(0,5).map(function(h,i){return histRow(h,i,"tidx","<span class='kbadge'>"+h.messages.length+" meddelanden</span>");}).join("")
      +"</div>";
  }
  var btns=tMessages.length
    ?"<div style='display:flex;gap:8px;margin-bottom:12px'><button class='sec ghost' id='tsave' style='flex:1'>Spara samtal</button><button class='sec ghost' id='tclear' style='flex:1'>Nytt samtal</button></div>"
    :"";
  b.innerHTML=chatHtml+btns
    +"<div class='row'><input class='inp' id='tinp' placeholder='Skriv dina tankar...' value='"+esc(tInput)+"'/><button class='abtn' id='tsend'>&#8594;</button></div>"
    +savedHist;
  var ti=b.querySelector("#tinp");
  if(ti){
    ti.oninput=function(){tInput=ti.value;};
    ti.onkeydown=function(e){if(e.key==="Enter"&&!e.shiftKey&&ti.value.trim()){e.preventDefault();doSendTerapi(ti.value.trim());}};
    if(!tLoading)setTimeout(function(){ti.focus();},50);
  }
  b.querySelector("#tsend").onclick=function(){var v=b.querySelector("#tinp").value.trim();if(v)doSendTerapi(v);};
  if(tMessages.length){
    b.querySelector("#tsave").onclick=function(){
      var summary=tMessages[0]?tMessages[0].content.slice(0,60)+"...":"Samtal";
      tHist=[{id:Date.now(),summary:summary,messages:tMessages.slice(),timestamp:new Date().toISOString()}].concat(tHist).slice(0,20);
      tMessages=[];tInput="";saveAndSync();renderTerapi();
    };
    b.querySelector("#tclear").onclick=function(){tMessages=[];tInput="";renderTerapi();};
  }
  bindHist(b,"tidx",
    function(i){tMessages=tHist[i].messages.slice();renderTerapi();},
    function(i){tHist.splice(i,1);saveAndSync();renderTerapi();}
  );
  // Scroll chat to bottom
  var ca=b.querySelector(".chat-area");if(ca)ca.scrollTop=ca.scrollHeight;
}
async function doSendTerapi(text){
  tMessages.push({role:"user",content:text});
  tInput="";tLoading=true;renderTerapi();
  var sys="Du ar en empatisk samtalsstod. Lyssna aktivt, stalla genomtankta foljdfragor och hjalp personen reflektera over sina tankar och ideer. Ge rad nar det frages men fokusera annars pa att hjalpa personen tanka igenom sina egna losningar. Svara pa svenska, var varm. Halla svaren kortfattade (max 3-4 meningar).";
  var history=tMessages.slice(-12).map(function(m){return {role:m.role,content:m.content};});
  try{
    var res=await aiChat(sys,history,600);
    var data=await res.json();
    var reply=data.choices&&data.choices[0]?data.choices[0].message.content||"":"Kunde inte svara. Forsok igen.";
    tMessages.push({role:"assistant",content:reply});
  }catch(e){tMessages.push({role:"assistant",content:"Nagot gick fel. Forsok igen."});}
  tLoading=false;renderTerapi();
}

// ---- AI-TIPS ----
function renderTips(){
  var b=document.getElementById("body");
  if(tipsLoading){b.innerHTML=spin();return;}
  if(tipText){
    b.innerHTML="<div class='lbl'>Tips om: "+esc(tipTopic||"dina aktiviteter")+"</div>"
      +"<div class='tbox'>"+esc(tipText)+"</div>"
      +"<button class='sec ghost' id='refbtn'>Fraga om nagot annat</button>";
    b.querySelector("#refbtn").onclick=function(){tipText="";tipTopic="";renderTips();};
    return;
  }
  b.innerHTML="<div class='eico' style='text-align:center;padding-top:20px'>🤖</div>"
    +"<div style='text-align:center;margin:12px 0 20px;font-size:14px;color:#6b6880;line-height:1.6'>Vad vill du ha tips om?<br><span style='font-size:12px'>Kan vara vad som helst - traning, vanor, produktivitet, somn...</span></div>"
    +"<div class='lbl'>Amne</div>"
    +"<textarea class='ta' id='topicin' placeholder='T.ex. hur sover jag battre, tips for att lasa mer...' style='min-height:90px'>"+esc(tipTopic)+"</textarea>"
    +"<button class='sec' id='getbtn'>Ge mig tips</button>";
  var ta=b.querySelector("#topicin");
  if(ta)ta.oninput=function(){tipTopic=ta.value;};
  b.querySelector("#getbtn").onclick=function(){
    var topic=b.querySelector("#topicin").value.trim();
    if(!topic)return;
    tipTopic=topic;fetchTips();
  };
}
async function fetchTips(){
  tipsLoading=true;tipText="";renderTips();
  var sum=logs.slice(0,20).map(function(l){return "["+l.category+"] "+l.activity+(l.note?": "+l.note:"");}).join("\n")||"Inga aktiviteter loggade.";
  var prompt="Tips om: "+tipTopic+"\n\nAktiviteter for kontext:\n"+sum+"\n\nGe 3-5 konkreta, personliga tips pa svenska.";
  try{
    var res=await aiCall("Du ar en coach som ger personliga, konkreta tips pa svenska anpassade till amnet anvandaren fragar om. Hall det kort och actionbart.",prompt,1000);
    var data=await res.json();tipText=aiText(data)||"Kunde inte hamta tips.";
  }catch(e){tipText="Nagot gick fel. Forsok igen.";}
  tipsLoading=false;renderTips();
}

init();
</script>
