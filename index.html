  return await r2.json();
}
async function driveWrite(){
  var body=JSON.stringify({logs:logs,kHist:kHist,sHist:sHist,oHist:oHist,fHist:fHist,tHist:tHist,synHist:synHist,sentMsgs:sentMsgs,sentPeople:sentPeople,sentConvs:sentConvs,fundHist:fundHist});
  if(driveFileId){await fetch("https://www.googleapis.com/upload/drive/v3/files/"+driveFileId+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},body:body});}
  else{var form=new FormData();form.append("metadata",new Blob([JSON.stringify({name:FILE_NAME,parents:["appDataFolder"]})],{type:"application/json"}));form.append("file",new Blob([body],{type:"application/json"}));var r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{method:"POST",headers:{Authorization:"Bearer "+accessToken},body:form});var d2=await r.json();driveFileId=d2.id;localStorage.setItem("drive_fid",driveFileId);}
}
async function saveAndSync(){
  saveLocal();
  try{await driveWrite();setSyncBtn("ok","Sparad");setTimeout(function(){setSyncBtn("","Synka");},2000);}
  catch(e){setSyncBtn("err","Synk misslyckades");setTimeout(function(){setSyncBtn("","Synka");},3000);}
}
async function aiCall(system,userMsg,maxTokens){
  return fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:selectedModel,max_tokens:maxTokens,messages:[{role:"system",content:system},{role:"user",content:userMsg}]})});
}
async function aiChat(system,messages,maxTokens){
  return fetch(PROXY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:selectedModel,max_tokens:maxTokens,messages:[{role:"system",content:system}].concat(messages)})});
}
function aiText(data){
  // Standard OpenAI/Anthropic format
  if(data.choices&&data.choices[0]){
    var msg=data.choices[0].message;
    if(msg){
      // Some models return content as string
      if(typeof msg.content==="string"&&msg.content)return msg.content;
      // Some models (Gemini) return content as array of parts
      if(Array.isArray(msg.content)){
        return msg.content.map(function(p){return p.text||p.content||"";}).join("");
      }
    }
    // Fallback: text field directly on choice
    if(data.choices[0].text)return data.choices[0].text;
  }
  // Gemini native format fallback
  if(data.candidates&&data.candidates[0]){
    var c=data.candidates[0];
    if(c.content&&c.content.parts)return c.content.parts.map(function(p){return p.text||"";}).join("");
  }
  return "";
}

}

async function doAnalyseSkrivstil(scope){
  skrivAnalysScope=scope;skrivAnalysLoading=true;skrivAnalysResult=null;renderLogSkickade();
  var myMsgs;
  if(scope==="conv"){
    myMsgs=sentMsgs.filter(function(m){return m.convId===activeConvId&&m.sender==="me";});
  }else{
    var convIds=sentConvs.filter(function(cv){return cv.personId===activePersonId;}).map(function(cv){return cv.id;});
    myMsgs=sentMsgs.filter(function(m){return convIds.indexOf(m.convId)!==-1&&m.sender==="me";});
  }
  if(!myMsgs.length){skrivAnalysResult="Inga av dina egna meddelanden hittades att analysera.";skrivAnalysLoading=false;renderLogSkickade();return;}
  var sample=myMsgs.slice(0,20).map(function(m,i){return (i+1)+". "+m.text;}).join("\n\n");
  var sys="Du ar en sprakanalytiker. Analysera personens skrivstil baserat pa deras meddelanden. Beskriv tonfall, ordval, meningslangd, vanliga uttryck och monster. Ge konkreta, konstruktiva observationer pa svenska. Hall det kort - max 150 ord.";
  try{
    var res=await aiCall(sys,"Hars meddelandena att analysera:\n\n"+sample,800);
    var data=await res.json();
    skrivAnalysResult=aiText(data)||"Kunde inte analysera. Forsok igen.";
  }catch(e){skrivAnalysResult="Nagot gick fel. Forsok igen.";}
  skrivAnalysLoading=false;renderLogSkickade();
}

function folderRow(label,key,level,openKey,count){
  var isOpen=openKey===key;
  var indent=level===0?0:level===1?12:24;
  var bg=level===0?"#1a1a24":level===1?"#151520":"transparent";
  var border=level===0?"1px solid #2a2a38":level===1?"1px solid #1e1e28":"none";
  return "<div data-folder='"+esc(key)+"' data-level='"+level+"' style='"
    +"display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;"
    +"border-radius:10px;background:"+bg+";border:"+border+";cursor:pointer;"
    +"margin-left:"+indent+"px'>"
    +"<span style='font-size:14px;transition:transform .15s;display:inline-block;"+(isOpen?"transform:rotate(90deg)":"")+"'>▶</span>"
    +"<span style='flex:1;font-size:13px;color:#c4c0d4;font-weight:500'>"+esc(label)+"</span>"
    +"<span class='sbadge'>"+count+"</span>"
    +"</div>";
}

function renderHistory(){
  var b=document.getElementById("body");
  if(!logs.length){b.innerHTML="<div class='empty'><div class='eico'>📋</div>Inga aktiviteter annu.</div>";return;}

  // Group by year -> month -> day
  var byYear={};
  var MONTHS=["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"];
  var DAYS=["Sondag","Mandag","Tisdag","Onsdag","Torsdag","Fredag","Lordag"];

  logs.forEach(function(log){
    var d=new Date(log.timestamp);
    var y=d.getFullYear();
    var mo=d.getMonth();
    var day=d.getDate();
    var dayKey=y+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    var moKey=y+"-"+String(mo+1).padStart(2,"0");
    if(!byYear[y])byYear[y]={};
    if(!byYear[y][moKey])byYear[y][moKey]={month:mo,days:{}};
    if(!byYear[y][moKey].days[dayKey])byYear[y][moKey].days[dayKey]={day:day,weekday:DAYS[d.getDay()],logs:[]};
    byYear[y][moKey].days[dayKey].logs.push(log);
  });

  var html="";
  var years=Object.keys(byYear).sort(function(a,b){return b-a;});

  years.forEach(function(y){
    var yearCount=0;
    Object.keys(byYear[y]).forEach(function(mk){Object.keys(byYear[y][mk].days).forEach(function(dk){yearCount+=byYear[y][mk].days[dk].logs.length;});});
    html+=folderRow(y,"y-"+y,0,"y-"+openYear,yearCount);

    if(openYear==y){
      var months=Object.keys(byYear[y]).sort(function(a,b){return b.localeCompare(a);});
      months.forEach(function(mk){
        var moData=byYear[y][mk];
        var moCount=0;Object.keys(moData.days).forEach(function(dk){moCount+=moData.days[dk].logs.length;});
        var moLabel=MONTHS[moData.month];
        html+=folderRow(moLabel,"m-"+mk,1,"m-"+openMonth,moCount);

        if(openMonth==mk){
          var days=Object.keys(moData.days).sort(function(a,b){return b.localeCompare(a);});
          days.forEach(function(dk){
            var dayData=moData.days[dk];
            var dayLabel=dayData.weekday+" "+dayData.day;
            html+=folderRow(dayLabel,"d-"+dk,2,"d-"+openDay,dayData.logs.length);

            if(openDay==dk){
              dayData.logs.forEach(function(log){html+=logEntry(log);});
            }
          });
        }
      });
    }
  });

  b.innerHTML=html;

  // Folder click handlers
  b.querySelectorAll("[data-folder]").forEach(function(el){
    el.onclick=function(){
      var key=el.dataset.folder;
      var level=Number(el.dataset.level);
      if(level===0){var y=key.replace("y-","");openYear=(openYear==y?null:y);openMonth=null;openDay=null;}
      else if(level===1){var mk=key.replace("m-","");openMonth=(openMonth==mk?null:mk);openDay=null;}
      else if(level===2){var dk=key.replace("d-","");openDay=(openDay==dk?null:dk);}
      editingId=null;renderHistory();
    };
  });

  // Entry action handlers
  b.querySelectorAll(".delbtn[data-id]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();logs=logs.filter(function(l){return l.id!==Number(btn.dataset.id);});editingId=null;saveAndSync();hdr();renderHistory();};
  });
  b.querySelectorAll("[data-edit]").forEach(function(btn){
    btn.onclick=function(e){e.stopPropagation();editingId=Number(btn.dataset.edit);renderHistory();};
  });
  logs.forEach(function(log){
    var saveBtn=b.querySelector("#save-edit-"+log.id);
    var cancelBtn=b.querySelector("#cancel-edit-"+log.id);
    if(saveBtn){
      saveBtn.onclick=function(){
        var timeVal=b.querySelector("#edit-time-"+log.id).value.trim();
        var noteVal=b.querySelector("#edit-note-"+log.id).value.trim();
        log.time=timeVal;log.note=noteVal;editingId=null;saveAndSync();renderHistory();
      };
    }
    if(cancelBtn){cancelBtn.onclick=function(){editingId=null;renderHistory();};}
  });
}

  }
  var hist=fHist.slice(0,5).map(function(h,i){return histRow(h,i,"fidx","");}).join("");
  b.innerHTML="<div class='lbl'>Vad vill du forsta?</div><textarea class='ta' id='fta' placeholder='T.ex. Vad ar inflation? Hur fungerar en motor?'>"+esc(fDraft)+"</textarea><button class='sec' id='ffetch'>Forklara for mig</button>"+(hist?"<div class='mt20'><div class='lbl'>Tidigare fragor</div>"+hist+"</div>":"");
  var ta=b.querySelector("#fta");if(ta)ta.oninput=function(){fDraft=ta.value;};
  b.querySelector("#ffetch").onclick=function(){var txt=b.querySelector("#fta").value.trim();if(!txt)return;fDraft=txt;doFetchForklara(txt);};
  bindHist(b,"fidx",function(i){fResult=fHist[i];renderForklara();},function(i){fHist.splice(i,1);saveAndSync();renderForklara();});
}
async function doFetchForklara(question){
  fLoading=true;renderForklara();
  var sys="Du ar en pedagog. Forklara amnet pa tre nivan. Svara BARA med giltig JSON: {\"explanations\":[{\"level\":\"Enkel\",\"text\":\"...\"},{\"level\":\"Mellanniva\",\"text\":\"...\"},{\"level\":\"Detaljerad\",\"text\":\"...\"}]}";
  try{var res=await aiCall(sys,"Forklara: "+question,1500);var data=await res.json();var parsed=JSON.parse(aiText(data).replace(/```json|```/g,"").trim());fResult={id:Date.now(),question:question,explanations:parsed.explanations||[],timestamp:new Date().toISOString()};fHist=[fResult].concat(fHist).slice(0,20);saveAndSync();}
  catch(e){fResult={id:Date.now(),question:question,timestamp:new Date().toISOString(),explanations:[{level:"Fel",text:"Kunde inte hamta forklaring. Forsok igen."}]};}
  fLoading=false;renderForklara();
}

// ---- TERAPI ----
function renderTerapi(){
  var b=document.getElementById("body");
  var chatHtml="";
  if(tMessages.length){
    chatHtml="<div class='chat-area'>"
      +tMessages.map(function(m){
        if(m.role==="user"){
          return "<div style='display:flex;justify-content:flex-end'><div class='bubble-me'>"+esc(m.content)+"</div></div>";
        }
        return "<div style='display:flex;justify-content:flex-start'><div class='bubble-them'>"+esc(m.content)+"</div></div>";
      }).join("")
      +(tLoading?"<div style='display:flex;justify-content:flex-start'><div class='bubble-them' style='color:#6b6880;font-style:italic'>Skriver...</div></div>":"")
      +"</div>";
  } else {
    chatHtml="<div style='text-align:center;padding:32px 0 20px;color:#6b6880;font-size:14px;line-height:1.7'>"
      +"<div style='font-size:36px;margin-bottom:12px'>🧠</div>"
      +"Jag ar har for att lyssna och hjalpa dig reflektera.<br>Dela dina tankar, bekymmer eller ideer.</div>";
  }
  var savedHist="";
  if(tHist.length){
    savedHist="<div class='mt20'><div class='lbl'>Sparade samtal</div>"
      +tHist.slice(0,5).map(function(h,i){return histRow(h,i,"tidx","<span class='kbadge'>"+h.messages.length+" meddelanden</span>");}).join("")
      +"</div>";
  }
  var btns=tMessages.length
    ?"<div style='display:flex;gap:8px;margin-bottom:12px'><button class='sec ghost' id='tsave' style='flex:1'>Spara samtal</button><button class='sec ghost' id='tclear' style='flex:1'>Nytt samtal</button></div>"
    :"";
  b.innerHTML=chatHtml+btns
    +"<div class='row'><input class='inp' id='tinp' placeholder='Skriv dina tankar...' value='"+esc(tInput)+"'/><button class='abtn' id='tsend'>&#8594;</button></div>"
    +savedHist;
  var ti=b.querySelector("#tinp");
  if(ti){
    ti.oninput=function(){tInput=ti.value;};
    ti.onkeydown=function(e){if(e.key==="Enter"&&!e.shiftKey&&ti.value.trim()){e.preventDefault();doSendTerapi(ti.value.trim());}};
    if(!tLoading)setTimeout(function(){ti.focus();},50);
  }
  b.querySelector("#tsend").onclick=function(){var v=b.querySelector("#tinp").value.trim();if(v)doSendTerapi(v);};
  if(tMessages.length){
    b.querySelector("#tsave").onclick=function(){
      var summary=tMessages[0]?tMessages[0].content.slice(0,60)+"...":"Samtal";
      tHist=[{id:Date.now(),summary:summary,messages:tMessages.slice(),timestamp:new Date().toISOString()}].concat(tHist).slice(0,20);
      tMessages=[];tInput="";saveAndSync();renderTerapi();
    };
    b.querySelector("#tclear").onclick=function(){tMessages=[];tInput="";renderTerapi();};
  }
  bindHist(b,"tidx",
    function(i){tMessages=tHist[i].messages.slice();renderTerapi();},
    function(i){tHist.splice(i,1);saveAndSync();renderTerapi();}
  );
  // Scroll chat to bottom
  var ca=b.querySelector(".chat-area");if(ca)ca.scrollTop=ca.scrollHeight;
}
async function doSendTerapi(text){
  tMessages.push({role:"user",content:text});
  tInput="";tLoading=true;renderTerapi();
  var sys="Du ar en empatisk samtalsstod. Lyssna aktivt, stalla genomtankta foljdfragor och hjalp personen reflektera over sina tankar och ideer. Ge rad nar det frages men fokusera annars pa att hjalpa personen tanka igenom sina egna losningar. Svara pa svenska, var varm. Halla svaren kortfattade (max 3-4 meningar).";
  var history=tMessages.slice(-12).map(function(m){return {role:m.role,content:m.content};});
  try{
    var res=await aiChat(sys,history,600);
    var data=await res.json();
    var reply=data.choices&&data.choices[0]?data.choices[0].message.content||"":"Kunde inte svara. Forsok igen.";
    tMessages.push({role:"assistant",content:reply});
  }catch(e){tMessages.push({role:"assistant",content:"Nagot gick fel. Forsok igen."});}
  tLoading=false;renderTerapi();
}

// ---- AI-TIPS ----
function renderTips(){
  var b=document.getElementById("body");
  if(tipsLoading){b.innerHTML=spin();return;}
  if(tipText){
    b.innerHTML="<div class='lbl'>Tips om: "+esc(tipTopic||"dina aktiviteter")+"</div>"
      +"<div class='tbox'>"+esc(tipText)+"</div>"
      +"<button class='sec ghost' id='refbtn'>Fraga om nagot annat</button>";
    b.querySelector("#refbtn").onclick=function(){tipText="";tipTopic="";renderTips();};
    return;
  }
  b.innerHTML="<div class='eico' style='text-align:center;padding-top:20px'>🤖</div>"
    +"<div style='text-align:center;margin:12px 0 20px;font-size:14px;color:#6b6880;line-height:1.6'>Vad vill du ha tips om?<br><span style='font-size:12px'>Kan vara vad som helst - traning, vanor, produktivitet, somn...</span></div>"
    +"<div class='lbl'>Amne</div>"
    +"<textarea class='ta' id='topicin' placeholder='T.ex. hur sover jag battre, tips for att lasa mer...' style='min-height:90px'>"+esc(tipTopic)+"</textarea>"
    +"<button class='sec' id='getbtn'>Ge mig tips</button>";
  var ta=b.querySelector("#topicin");
  if(ta)ta.oninput=function(){tipTopic=ta.value;};
  b.querySelector("#getbtn").onclick=function(){
    var topic=b.querySelector("#topicin").value.trim();
    if(!topic)return;
    tipTopic=topic;fetchTips();
  };
}
async function fetchTips(){
  tipsLoading=true;tipText="";renderTips();
  var sum=logs.slice(0,20).map(function(l){return "["+l.category+"] "+l.activity+(l.note?": "+l.note:"");}).join("\n")||"Inga aktiviteter loggade.";
  var prompt="Tips om: "+tipTopic+"\n\nAktiviteter for kontext:\n"+sum+"\n\nGe 3-5 konkreta, personliga tips pa svenska.";
  try{
    var res=await aiCall("Du ar en coach som ger personliga, konkreta tips pa svenska anpassade till amnet anvandaren fragar om. Hall det kort och actionbart.",prompt,1000);
    var data=await res.json();tipText=aiText(data)||"Kunde inte hamta tips.";
  }catch(e){tipText="Nagot gick fel. Forsok igen.";}
  tipsLoading=false;renderTips();
}

// ---- INSTALLNINGAR ----
function renderInstallningar(){
  var b=document.getElementById("body");
  var currentModel=MODELS.find(function(m){return m.id===selectedModel;})||MODELS[0];
  b.innerHTML="<div class='lbl'>AI-modell</div>"
    +"<div style='margin-bottom:20px;font-size:13px;color:#6b6880;line-height:1.5'>Vald modell: <span style='color:#a78bfa;font-weight:600'>"+esc(currentModel.name)+"</span></div>"
    +MODELS.map(function(m){
      var active=m.id===selectedModel;
      return "<div data-modelid='"+esc(m.id)+"' style='"
        +"padding:14px 16px;border-radius:12px;border:1px solid "+(active?"#a78bfa":"#2a2a38")+";"
        +"background:"+(active?"#2a2040":"#1a1a24")+";margin-bottom:10px;cursor:pointer'>"
        +"<div style='display:flex;align-items:center;gap:10px'>"
        +"<div style='width:10px;height:10px;border-radius:50%;background:"+(active?"#a78bfa":"#3a3a50")+";flex-shrink:0'></div>"
        +"<div>"
        +"<div style='font-size:14px;font-weight:"+(active?"600":"400")+";color:"+(active?"#e8e6e0":"#c4c0d4")+"'>"+esc(m.name)+"</div>"
        +"<div style='font-size:12px;color:#6b6880;margin-top:2px'>"+esc(m.desc)+"</div>"
        +"</div></div></div>";
    }).join("")
    +"<div style='margin-top:24px;padding:14px;background:#1a1a24;border-radius:12px;border:1px solid #1e1e28;font-size:12px;color:#4a4860;line-height:1.6'>"
    +"Modellen galler for alla AI-funktioner i appen. Opus ar kraftfullast men kan vara langsam. Haiku ar snabbast men enklare.</div>";
  b.querySelectorAll("[data-modelid]").forEach(function(el){
    el.onclick=function(){
      selectedModel=el.dataset.modelid;
      try{localStorage.setItem("selected_model",selectedModel);}catch(e){}
      renderInstallningar();
    };
  });
}


init();
