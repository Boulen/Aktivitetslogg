
<h2 class="sr-only">Aktivitetslogg med Klarhet och Svar — logga aktiviteter, analysera och få svarsförslag</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{width:100%;font-family:var(--font-sans);color:var(--text-primary);}
.hdr{padding:20px 16px 12px;border-bottom:0.5px solid var(--border);}
.hdr-lbl{font-size:11px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:2px;}
.hdr-title{font-size:22px;font-weight:500;}
.tabs{display:flex;border-bottom:0.5px solid var(--border);overflow-x:auto;}
.tab{flex:1;min-width:56px;padding:11px 4px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-size:11px;cursor:pointer;font-family:var(--font-sans);white-space:nowrap;transition:all .15s;}
.tab.on{color:var(--text-accent);font-weight:500;border-bottom-color:var(--fill-accent);}
.body{padding:16px;}
.lbl{font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.chip{padding:6px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface-1);color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font-sans);transition:all .12s;}
.chip.on{background:var(--fill-accent);color:var(--on-accent);border-color:var(--fill-accent);}
.qrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.qbtn{padding:8px 13px;border-radius:var(--radius);background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font-sans);}
.row{display:flex;gap:8px;margin-bottom:10px;}
.inp{flex:1;padding:10px 12px;border-radius:var(--radius);background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-primary);font-size:14px;outline:none;font-family:var(--font-sans);}
.inp::placeholder{color:var(--text-muted);}
.inp:focus{border-color:var(--border-accent);}
.inp.w100{width:100%;flex:none;}
.abtn{padding:10px 16px;border-radius:var(--radius);background:var(--fill-accent);border:none;color:var(--on-accent);font-weight:500;font-size:14px;cursor:pointer;font-family:var(--font-sans);}
.ok{margin-top:12px;padding:10px 14px;border-radius:var(--radius);background:var(--bg-success);border:0.5px solid var(--border-success);color:var(--text-success);font-size:13px;text-align:center;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.srow{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface-1);border-radius:var(--radius);margin-bottom:6px;border:0.5px solid var(--border);}
.sbadge{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--bg-accent);color:var(--text-accent);font-weight:500;}
.entry{padding:12px 14px;background:var(--surface-1);border-radius:12px;border:0.5px solid var(--border);display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.etitle{font-weight:500;font-size:13px;}
.enote{font-size:11px;color:var(--text-muted);margin-top:2px;}
.etime{font-size:10px;color:var(--text-muted);margin-top:3px;}
.delbtn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:0 2px;line-height:1;}
.empty{text-align:center;padding:48px 0;color:var(--text-muted);}
.tbox{padding:16px;background:var(--surface-1);border-radius:12px;border:0.5px solid var(--border-accent);line-height:1.7;font-size:14px;color:var(--text-secondary);white-space:pre-wrap;margin-bottom:12px;}
.spnr{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--border);border-top-color:var(--fill-accent);animation:spin .8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.kta{width:100%;min-height:110px;padding:12px;border-radius:12px;background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-primary);font-size:14px;line-height:1.6;resize:vertical;outline:none;font-family:var(--font-sans);margin-bottom:10px;}
.kta:focus{border-color:var(--border-accent);}
.kta::placeholder{color:var(--text-muted);}
.ctx-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.ctx-chip{padding:6px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface-1);color:var(--text-muted);font-size:12px;cursor:pointer;font-family:var(--font-sans);transition:all .12s;}
.ctx-chip.on{background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent);}
.orig{background:var(--surface-1);border-radius:var(--radius);border-left:3px solid var(--border-strong);padding:10px 12px;font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:16px;font-style:italic;}
.scard{background:var(--surface-1);border-radius:12px;border:0.5px solid var(--border-accent);padding:14px 16px;margin-bottom:10px;}
.stone{font-size:10px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;}
.stext{font-size:14px;color:var(--text-primary);line-height:1.6;margin-bottom:8px;}
.swhy{font-size:12px;color:var(--text-muted);line-height:1.5;font-style:italic;}
.sec{background:var(--fill-accent);border:none;color:var(--on-accent);width:100%;padding:11px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-weight:500;font-family:var(--font-sans);}
.sec.ghost{background:var(--surface-1);border:0.5px solid var(--border-accent);color:var(--text-accent);}
.mt12{margin-top:12px;}
.mt20{margin-top:20px;}
.mt8{margin-top:8px;}

/* Chat bubbles for Svar-fliken */
.chat-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;max-width:88%;}
.bubble.them{background:var(--surface-1);border:0.5px solid var(--border);color:var(--text-primary);align-self:flex-start;border-radius:4px 12px 12px 12px;}
.bubble.you{background:var(--bg-accent);border:0.5px solid var(--border-accent);color:var(--text-primary);align-self:flex-end;border-radius:12px 4px 12px 12px;}
.bubble-lbl{font-size:10px;color:var(--text-muted);margin-bottom:3px;}
.reply-card{background:var(--surface-1);border-radius:12px;border:0.5px solid var(--border);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.reply-card:hover{border-color:var(--border-accent);}
.reply-tone{font-size:10px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;}
.reply-text{font-size:14px;color:var(--text-primary);line-height:1.6;margin-bottom:6px;}
.reply-why{font-size:12px;color:var(--text-muted);font-style:italic;}
.copy-ok{font-size:11px;color:var(--text-success);margin-top:4px;display:none;}
.copy-ok.vis{display:block;}
.khist{padding:12px 14px;background:var(--surface-1);border-radius:12px;border:0.5px solid var(--border);margin-bottom:8px;cursor:pointer;transition:border-color .12s;}
.khist:hover{border-color:var(--border-accent);}
.kmsg{font-size:12px;color:var(--text-secondary);line-height:1.4;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kmeta{font-size:10px;color:var(--text-muted);display:flex;gap:10px;align-items:center;}
.kbadge{padding:2px 7px;border-radius:20px;background:var(--bg-accent);color:var(--text-accent);font-size:10px;font-weight:500;}
</style>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-lbl">Aktivitetslogg</div>
    <div class="hdr-title" id="htitle">Kom igång</div>
  </div>
  <div class="tabs">
    <button class="tab on" data-v="log">Logga</button>
    <button class="tab" data-v="history">Historik</button>
    <button class="tab" data-v="klarhet">Klarhet</button>
    <button class="tab" data-v="svar">Svar</button>
    <button class="tab" data-v="tips">AI-tips</button>
  </div>
  <div class="body" id="body"></div>
</div>

<script>
const CATS=[
  {id:"träning",label:"Träning",e:"🏃"},
  {id:"mat",label:"Mat & kost",e:"🥗"},
  {id:"sömn",label:"Sömn",e:"😴"},
  {id:"mental",label:"Mental hälsa",e:"🧘"},
  {id:"övrigt",label:"Övrigt",e:"✨"},
];
const QUICK={
  träning:["Löpning","Gympass","Cykling","Yoga","Simning","Promenad"],
  mat:["Frukost","Lunch","Middag","Mellanmål","Drack 2L vatten"],
  sömn:["Sov 8h","Sov 6h","Tupplur","Svår natt"],
  mental:["Meditation","Journaling","Socialt umgänge","Naturvistelse"],
  övrigt:["Läste bok","Lärde mig något","Kreativt projekt"],
};
const CTXS=["Vän","Partner","Familj","Kollega"];

let logs=[],kHist=[],svarHist=[];
let view="log",cat="träning",tipText="",tipsLoading=false;
let kCtx="Vän",kResult=null,kLoading=false,kDraft="";
let sCtx="Vän",sResult=null,sLoading=false,sDraft="",sMyCtx="";

function fd(iso){return new Date(iso).toLocaleDateString("sv-SE",{weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

async function load(){
  try{
    const [a,k,s]=await Promise.all([
      window.storage.get("akt"),
      window.storage.get("kh"),
      window.storage.get("sh"),
    ]);
    if(a?.value)logs=JSON.parse(a.value);
    if(k?.value)kHist=JSON.parse(k.value);
    if(s?.value)svarHist=JSON.parse(s.value);
  }catch{}
}
async function saveL(){try{await window.storage.set("akt",JSON.stringify(logs));}catch{}}
async function saveK(){try{await window.storage.set("kh",JSON.stringify(kHist));}catch{}}
async function saveS(){try{await window.storage.set("sh",JSON.stringify(svarHist));}catch{}}

function hdr(){document.getElementById("htitle").textContent=logs.length>0?`${logs.length} aktiviteter`:"Kom igång";}

function renderLog(){
  const b=document.getElementById("body");
  b.innerHTML=`
    <div class="lbl">Kategori</div>
    <div class="chips">${CATS.map(c=>`<button class="chip${c.id===cat?" on":""}" data-cat="${c.id}">${c.e} ${c.label}</button>`).join("")}</div>
    <div class="lbl">Snabbval</div>
    <div class="qrow">${QUICK[cat].map(a=>`<button class="qbtn" data-act="${esc(a)}">${esc(a)}</button>`).join("")}</div>
    <div class="lbl">Egen aktivitet</div>
    <div class="row">
      <input class="inp" id="ci" placeholder="Skriv aktivitet..." />
      <button class="abtn" id="addbtn"><i class="ti ti-plus" aria-hidden="true"></i></button>
    </div>
    <input class="inp w100" id="ni" placeholder="Anteckning (valfritt)..." />
    <div id="fz"></div>
    ${logs.length>0?`<div class="mt20"><div class="lbl">Dina kategorier</div>${CATS.map(c=>{const n=logs.filter(l=>l.category===c.id).length;return n>0?`<div class="srow"><span>${c.e}</span><span style="flex:1;font-size:13px;color:var(--text-secondary)">${c.label}</span><span class="sbadge">${n}</span></div>`:"";}).join("")}</div>`:""}
  `;
  b.querySelectorAll(".chip").forEach(btn=>btn.onclick=()=>{cat=btn.dataset.cat;renderLog();});
  b.querySelectorAll(".qbtn").forEach(btn=>btn.onclick=()=>addAct(btn.dataset.act));
  const ci=b.querySelector("#ci");
  ci.onkeydown=e=>{if(e.key==="Enter"&&ci.value.trim())addAct(ci.value.trim());};
  b.querySelector("#addbtn").onclick=()=>{if(ci.value.trim())addAct(ci.value.trim());};
}

function addAct(activity){
  const ni=document.querySelector("#ni");
  const note=ni?ni.value:"";
  logs.unshift({id:Date.now(),category:cat,activity,note,timestamp:new Date().toISOString()});
  saveL();hdr();renderLog();
  const fz=document.getElementById("fz");
  if(fz){fz.innerHTML=`<div class="ok"><i class="ti ti-check" aria-hidden="true"></i> "${esc(activity)}" loggad!</div>`;setTimeout(()=>{if(fz)fz.innerHTML="";},2200);}
}

function renderHistory(){
  const b=document.getElementById("body");
  if(!logs.length){b.innerHTML=`<div class="empty"><div style="font-size:36px;margin-bottom:10px">📋</div>Inga aktiviteter ännu.<br>Börja på Logga-fliken!</div>`;return;}
  b.innerHTML=logs.map(log=>{
    const c=CATS.find(x=>x.id===log.category);
    return `<div class="entry"><span style="font-size:18px">${c?.e||"✨"}</span><div style="flex:1"><div class="etitle">${esc(log.activity)}</div>${log.note?`<div class="enote">${esc(log.note)}</div>`:""}<div class="etime">${fd(log.timestamp)}</div></div><button class="delbtn" data-id="${log.id}" aria-label="Ta bort">×</button></div>`;
  }).join("");
  b.querySelectorAll(".delbtn").forEach(btn=>btn.onclick=()=>{logs=logs.filter(l=>l.id!==Number(btn.dataset.id));saveL();hdr();renderHistory();});
}

function renderKlarhet(){
  const b=document.getElementById("body");
  if(kLoading){
    b.innerHTML=`<div style="text-align:center;padding:60px 0"><div class="spnr"></div><div style="color:var(--text-muted);font-size:13px;margin-top:14px">Analyserar meddelandet...</div></div>`;
    return;
  }
  if(kResult){
    b.innerHTML=`
      <div class="lbl">Ditt meddelande</div>
      <div class="orig">${esc(kResult.original)}</div>
      <div class="lbl">Tydligare formuleringar</div>
      ${kResult.suggestions.map((s,i)=>`<div class="scard"><div class="stone">Förslag ${i+1} · ${esc(s.tone)}</div><div class="stext">${esc(s.text)}</div>${s.why?`<div class="swhy">💡 ${esc(s.why)}</div>`:""}</div>`).join("")}
      <button class="sec ghost mt12" id="nybtn">Analysera nytt meddelande</button>
    `;
    b.querySelector("#nybtn").onclick=()=>{kResult=null;kDraft="";renderKlarhet();};
    return;
  }
  b.innerHTML=`
    <div class="lbl">Till vem skickar du?</div>
    <div class="ctx-chips">${CTXS.map(c=>`<button class="ctx-chip${c===kCtx?" on":""}" data-ctx="${c}">${c}</button>`).join("")}</div>
    <div class="lbl">Ditt meddelande</div>
    <textarea class="kta" id="kta" placeholder="Klistra in meddelandet du vill göra tydligare...">${esc(kDraft)}</textarea>
    <button class="sec" id="anabtn">Analysera <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    ${kHist.length>0?`<div class="mt20"><div class="lbl">Tidigare analyser</div>${kHist.slice(0,4).map((h,i)=>`<div class="khist" data-idx="${i}"><div class="kmsg">${esc(h.original)}</div><div class="kmeta"><span class="kbadge">${esc(h.context)}</span><span>${fd(h.timestamp)}</span></div></div>`).join("")}</div>`:""}
  `;
  b.querySelectorAll(".ctx-chip").forEach(btn=>btn.onclick=()=>{
    kCtx=btn.dataset.ctx;
    b.querySelectorAll(".ctx-chip").forEach(x=>x.classList.toggle("on",x.dataset.ctx===kCtx));
  });
  const ta=b.querySelector("#kta");
  if(ta)ta.oninput=()=>{kDraft=ta.value;};
  b.querySelector("#anabtn").onclick=()=>{const txt=b.querySelector("#kta").value.trim();if(!txt)return;kDraft=txt;analyseKlarhet(txt);};
  b.querySelectorAll(".khist").forEach(el=>el.onclick=()=>{kResult=kHist[Number(el.dataset.idx)];renderKlarhet();});
}

async function analyseKlarhet(text){
  kLoading=true;renderKlarhet();
  const sys=`Du är en kommunikationscoach som hjälper folk att formulera sig tydligare i meddelanden till ${kCtx.toLowerCase()}.
Svara BARA med giltig JSON (inga backticks) i exakt detta format:
{"suggestions":[{"tone":"Rakt på sak","text":"...","why":"..."},{"tone":"Mjukare","text":"...","why":"..."},{"tone":"Kortfattat","text":"...","why":"..."}]}
Varje "text" = omformulering på svenska som är tydligare. "why" = kort förklaring (max 1 mening).`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:`Originalmeddelande:\n"${text}"`}]})});
    const data=await res.json();
    const raw=data.content?.map(b=>b.text||"").join("")||"{}";
    const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
    kResult={original:text,context:kCtx,suggestions:parsed.suggestions||[],timestamp:new Date().toISOString()};
    kHist=[kResult,...kHist].slice(0,20);
    await saveK();
  }catch{
    kResult={original:text,context:kCtx,timestamp:new Date().toISOString(),suggestions:[{tone:"Fel",text:"Kunde inte analysera. Försök igen.",why:""}]};
  }
  kLoading=false;renderKlarhet();
}

/* ---- SVAR-FLIKEN ---- */
function renderSvar(){
  const b=document.getElementById("body");
  if(sLoading){
    b.innerHTML=`<div style="text-align:center;padding:60px 0"><div class="spnr"></div><div style="color:var(--text-muted);font-size:13px;margin-top:14px">Tar fram svarsförslag...</div></div>`;
    return;
  }
  if(sResult){
    const previews=sResult.replies.map((r,i)=>`
      <div class="reply-card" data-i="${i}">
        <div class="reply-tone">${esc(r.tone)}</div>
        <div class="reply-text">${esc(r.text)}</div>
        <div class="reply-why">${esc(r.why)}</div>
        <div class="copy-ok" id="cok${i}"><i class="ti ti-check" aria-hidden="true"></i> Kopierat!</div>
      </div>`).join("");
    b.innerHTML=`
      <div class="lbl">Deras meddelande</div>
      <div class="chat-wrap">
        <div>
          <div class="bubble-lbl" style="padding-left:2px">${esc(sResult.context)}</div>
          <div class="bubble them">${esc(sResult.original)}</div>
        </div>
      </div>
      <div class="lbl">Svarsförslag — tryck för att kopiera</div>
      ${previews}
      <button class="sec ghost mt12" id="nysvar">Svara på ett nytt meddelande</button>
    `;
    b.querySelectorAll(".reply-card").forEach(card=>{
      card.onclick=()=>{
        const i=Number(card.dataset.i);
        navigator.clipboard.writeText(sResult.replies[i].text).catch(()=>{});
        const ok=document.getElementById("cok"+i);
        if(ok){ok.classList.add("vis");setTimeout(()=>ok.classList.remove("vis"),2000);}
      };
    });
    b.querySelector("#nysvar").onclick=()=>{sResult=null;sDraft="";sMyCtx="";renderSvar();};
    return;
  }

  b.innerHTML=`
    <div class="lbl">Från vem är meddelandet?</div>
    <div class="ctx-chips">${CTXS.map(c=>`<button class="ctx-chip${c===sCtx?" on":""}" data-ctx="${c}">${c}</button>`).join("")}</div>
    <div class="lbl">Deras meddelande</div>
    <textarea class="kta" id="smsg" placeholder="Klistra in meddelandet du fått..." style="min-height:100px">${esc(sDraft)}</textarea>
    <div class="lbl mt8">Vad vill du förmedla med ditt svar? (valfritt)</div>
    <textarea class="kta" id="sctx" placeholder="T.ex. jag vill tacka nej men ändå vara varm..." style="min-height:70px">${esc(sMyCtx)}</textarea>
    <button class="sec" id="svarbtn">Ge mig svarsförslag <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    ${svarHist.length>0?`<div class="mt20"><div class="lbl">Tidigare svar</div>${svarHist.slice(0,4).map((h,i)=>`<div class="khist" data-sidx="${i}"><div class="kmsg">${esc(h.original)}</div><div class="kmeta"><span class="kbadge">${esc(h.context)}</span><span>${fd(h.timestamp)}</span><span>${h.replies.length} förslag</span></div></div>`).join("")}</div>`:""}
  `;
  b.querySelectorAll(".ctx-chip").forEach(btn=>btn.onclick=()=>{
    sCtx=btn.dataset.ctx;
    b.querySelectorAll(".ctx-chip").forEach(x=>x.classList.toggle("on",x.dataset.ctx===sCtx));
  });
  const ta=b.querySelector("#smsg");
  const tc=b.querySelector("#sctx");
  if(ta)ta.oninput=()=>{sDraft=ta.value;};
  if(tc)tc.oninput=()=>{sMyCtx=tc.value;};
  b.querySelector("#svarbtn").onclick=()=>{
    const msg=b.querySelector("#smsg").value.trim();
    const ctx=b.querySelector("#sctx").value.trim();
    if(!msg)return;
    sDraft=msg;sMyCtx=ctx;
    fetchSvar(msg,ctx);
  };
  b.querySelectorAll("[data-sidx]").forEach(el=>el.onclick=()=>{sResult=svarHist[Number(el.dataset.sidx)];renderSvar();});
}

async function fetchSvar(msg,myIntent){
  sLoading=true;renderSvar();
  const intentPart=myIntent?`\nVad jag vill förmedla med mitt svar: "${myIntent}"`:"";
  const sys=`Du är en kommunikationscoach som hjälper folk svara tydligt och på ett bra sätt på meddelanden från ${sCtx.toLowerCase()}.
Svara BARA med giltig JSON (inga backticks) i exakt detta format:
{"replies":[{"tone":"Varm och personlig","text":"...","why":"..."},{"tone":"Tydlig och direkt","text":"...","why":"..."},{"tone":"Kortfattad","text":"...","why":"..."},{"tone":"Lekfull","text":"...","why":"..."}]}
Varje "text" = ett komplett svarsmeddande på svenska. "why" = kort förklaring av stilen (max 1 mening). Anpassa alla svar till relationen och eventuell avsikt.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1200,system:sys,messages:[{role:"user",content:`Deras meddelande:\n"${msg}"${intentPart}`}]})});
    const data=await res.json();
    const raw=data.content?.map(b=>b.text||"").join("")||"{}";
    const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
    sResult={original:msg,context:sCtx,intent:myIntent,replies:parsed.replies||[],timestamp:new Date().toISOString()};
    svarHist=[sResult,...svarHist].slice(0,20);
    await saveS();
  }catch{
    sResult={original:msg,context:sCtx,intent:myIntent,timestamp:new Date().toISOString(),replies:[{tone:"Fel",text:"Kunde inte generera svar. Försök igen.",why:""}]};
  }
  sLoading=false;renderSvar();
}

function renderTips(){
  const b=document.getElementById("body");
  if(tipsLoading){
    b.innerHTML=`<div style="text-align:center;padding:60px 0"><div class="spnr"></div><div style="color:var(--text-muted);font-size:13px;margin-top:14px">Analyserar dina aktiviteter...</div></div>`;
    return;
  }
  if(tipText){
    b.innerHTML=`<div class="lbl">Personliga tips</div><div class="tbox">${esc(tipText)}</div><button class="sec ghost" id="refbtn">Hämta nya tips</button>`;
    b.querySelector("#refbtn").onclick=fetchTips;
    return;
  }
  b.innerHTML=`<div class="empty"><div style="font-size:36px;margin-bottom:10px">🤖</div><div style="margin-bottom:20px;font-size:14px">AI-coachen analyserar dina aktiviteter och ger personliga råd.</div><button class="sec" id="getbtn" style="max-width:220px;margin:0 auto">Hämta mina tips</button></div>`;
  b.querySelector("#getbtn").onclick=fetchTips;
}

async function fetchTips(){
  tipsLoading=true;tipText="";setView("tips");renderTips();
  const sum=logs.slice(0,20).map(l=>`[${l.category}] ${l.activity}${l.note?": "+l.note:""}`).join("\n")||"Inga aktiviteter loggade ännu.";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:"Du är en vänlig hälsocoach som ger personliga, konkreta tips på svenska. Håll det kort, positivt och actionbart. Använd emoji sparsamt.",messages:[{role:"user",content:`Baserat på mina senaste aktiviteter, ge mig 3 personliga tips:\n\n${sum}`}]})});
    const data=await res.json();
    tipText=data.content?.map(b=>b.text||"").join("")||"Kunde inte hämta tips.";
  }catch{tipText="Något gick fel. Försök igen.";}
  tipsLoading=false;renderTips();
}

function setView(v){
  view=v;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.v===v));
}
function render(){
  hdr();
  if(view==="log")renderLog();
  else if(view==="history")renderHistory();
  else if(view==="klarhet")renderKlarhet();
  else if(view==="svar")renderSvar();
  else if(view==="tips")renderTips();
}

document.querySelectorAll(".tab").forEach(btn=>btn.onclick=()=>{
  if(btn.dataset.v==="tips"){setView("tips");fetchTips();}
  else{setView(btn.dataset.v);render();}
});

load().then(()=>render());
</script>
